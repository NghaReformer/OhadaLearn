name: Keep Supabase Awake

# Supabase free-tier projects auto-pause after ~7 days of DB inactivity.
# This workflow fires a lightweight PostgREST query every 3 days, which
# counts as real DB activity and resets the timer. Also dispatchable manually.

on:
  schedule:
    # 13:17 UTC every 3 days (jittered minute to avoid contention with other crons).
    - cron: '17 13 */3 * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/keep-supabase-alive.ts
            package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx --yes tsx scripts/keep-supabase-alive.ts
