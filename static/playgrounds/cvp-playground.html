      'scenario.coffee.title': 'Coffee Shop Startup',
      'scenario.coffee.desc': 'Maria is opening a small coffee shop. Her average latte costs $1.80 in ingredients and she sells it for $5.50. Monthly rent, utilities, and staff cost $8,500. How many lattes must she sell per month to break even?',
      'scenario.coffee.solution': 'CM = $5.50 \u2013 $1.80 = $3.70 per latte. BEP = $8,500 \u00f7 $3.70 = 2,297 lattes. At 2,500 lattes/month, she makes ($3.70 \u00d7 2,500) \u2013 $8,500 = $750 profit. Margin of Safety = (2,500 \u2013 2,297) \u00f7 2,500 = 8.1%.',
      'scenario.factory.title': 'Factory Expansion Decision',
      'scenario.factory.desc': 'A manufacturing plant produces widgets at $35 variable cost and sells them for $120 each. Fixed overhead is $425,000 per year. Management wants to know how many units are needed to earn $100,000 after 25% tax. Should they expand capacity?',
      'scenario.factory.solution': 'CM = $120 \u2013 $35 = $85 per unit. BEP = $425,000 \u00f7 $85 = 5,000 units. Pre-tax target = $100,000 \u00f7 (1 \u2013 0.25) = $133,333. Target units = ($425,000 + $133,333) \u00f7 $85 = 6,569 units. At 6,000 units, profit before tax = ($85 \u00d7 6,000) \u2013 $425,000 = $85,000; after tax = $63,750.',
      'scenario.pricing.title': 'Pricing Strategy Analysis',
      'scenario.pricing.desc': 'A retailer sells a product at $50 with $20 variable cost and $150,000 fixed costs. They are considering a price drop to boost volume. At what volume does the current price generate $80,000 profit after 20% tax?',
      'scenario.pricing.solution': 'CM = $50 \u2013 $20 = $30. BEP = $150,000 \u00f7 $30 = 5,000 units. Pre-tax target = $80,000 \u00f7 (1 \u2013 0.20) = $100,000. Target units = ($150,000 + $100,000) \u00f7 $30 = 8,333 units. At 7,000 units, profit before tax = ($30 \u00d7 7,000) \u2013 $150,000 = $60,000; after tax = $48,000. CM Ratio = 60%.',
      'scenario.lease.title': 'Lease vs Buy Equipment',
      'scenario.lease.desc': 'A company can lease equipment for $80,000/year (fixed) or buy and incur $120,000 fixed costs. Variable cost is $45/unit and selling price is $80. At 5,000 units, which option earns more after 25% tax?',
      'scenario.lease.solution': 'CM = $80 \u2013 $45 = $35. Lease BEP = $80,000 \u00f7 $35 = 2,286 units. Pre-tax target = $60,000 \u00f7 (1 \u2013 0.25) = $80,000. Target units = ($80,000 + $80,000) \u00f7 $35 = 4,571 units. At 5,000 units, lease profit before tax = ($35 \u00d7 5,000) \u2013 $80,000 = $95,000; after tax = $71,250. MoS = (5,000 \u2013 2,286) \u00f7 5,000 = 54.3%.',
      'scenario.restaurant.title': 'Restaurant Break-Even',
      'scenario.restaurant.desc': 'A casual restaurant averages $25 per meal with $10 in food and variable labor costs. Monthly fixed costs (rent, insurance, salaried staff) are $45,000. The owner wants $30,000 monthly profit after 20% tax.',
      'scenario.restaurant.solution': 'CM = $25 \u2013 $10 = $15 per meal. BEP = $45,000 \u00f7 $15 = 3,000 meals. Pre-tax target = $30,000 \u00f7 (1 \u2013 0.20) = $37,500. Target meals = ($45,000 + $37,500) \u00f7 $15 = 5,500 meals. At 4,000 meals, profit before tax = ($15 \u00d7 4,000) \u2013 $45,000 = $15,000; after tax = $12,000.',
      'scenario.saas.title': 'SaaS Subscription Model',
      'scenario.saas.desc': 'A SaaS company charges $29/month per user with only $1.20 in variable server costs per user. Fixed costs (dev team, infrastructure, marketing) total $180,000/month. They target $50,000 after-tax profit at 25% tax rate.',
      'scenario.saas.solution': 'CM = $29 \u2013 $1.20 = $27.80 per user. BEP = $180,000 \u00f7 $27.80 = 6,475 users. Pre-tax target = $50,000 \u00f7 (1 \u2013 0.25) = $66,667. Target users = ($180,000 + $66,667) \u00f7 $27.80 = 8,873 users. CM Ratio = 95.9%. At 8,000 users, profit before tax = ($27.80 \u00d7 8,000) \u2013 $180,000 = $42,400; after tax = $31,800.',
      'scenario.icecream.title': 'Seasonal Ice Cream Stand',
      'scenario.icecream.desc': 'An ice cream stand operates 5 months per year. Each cone sells for $6 with $2.50 in variable costs. Seasonal fixed costs (permits, equipment, labor) are $36,000. The owner wants $20,000 profit after 15% tax.',
      'scenario.icecream.solution': 'CM = $6 \u2013 $2.50 = $3.50 per cone. BEP = $36,000 \u00f7 $3.50 = 10,286 cones. Pre-tax target = $20,000 \u00f7 (1 \u2013 0.15) = $23,529. Target cones = ($36,000 + $23,529) \u00f7 $3.50 = 17,008 cones. At 15,000 cones, profit before tax = ($3.50 \u00d7 15,000) \u2013 $36,000 = $16,500; after tax = $14,025. MoS = (15,000 \u2013 10,286) \u00f7 15,000 = 31.4%.',
      'scenario.aftertax.title': 'After-Tax Profit Target',
      'scenario.aftertax.desc': 'A distributor sells goods at $75 with $30 variable cost and $200,000 in fixed costs. The board demands $100,000 net income after 30% corporate tax. How many units must be sold, and what is the degree of operating leverage?',
      'scenario.aftertax.solution': 'CM = $75 \u2013 $30 = $45. BEP = $200,000 \u00f7 $45 = 4,444 units. Pre-tax target = $100,000 \u00f7 (1 \u2013 0.30) = $142,857. Target units = ($200,000 + $142,857) \u00f7 $45 = 7,619 units. At 6,000 units, profit before tax = ($45 \u00d7 6,000) \u2013 $200,000 = $70,000; after tax = $49,000. DOL = ($45 \u00d7 6,000) \u00f7 $70,000 = 3.86.',
      'scenario.bakery.title': 'Neighborhood Bakery',
      'scenario.bakery.desc': 'A bakery sells artisan bread loaves at $12 each with $4 in ingredients and variable costs. Monthly fixed costs are $25,000. The baker aims for $15,000 profit after 20% tax. Is the current volume of 5,000 loaves enough?',
      'scenario.bakery.solution': 'CM = $12 \u2013 $4 = $8 per loaf. BEP = $25,000 \u00f7 $8 = 3,125 loaves. Pre-tax target = $15,000 \u00f7 (1 \u2013 0.20) = $18,750. Target loaves = ($25,000 + $18,750) \u00f7 $8 = 5,469 loaves. At 5,000 loaves, profit before tax = ($8 \u00d7 5,000) \u2013 $25,000 = $15,000; after tax = $12,000. Short by 469 loaves.',
      'scenario.ohada.title': 'OHADA Zone Manufacturer',
      'scenario.ohada.desc': 'A SYSCOHADA-compliant manufacturer in the CEMAC zone sells units at 2,500 FCFA with 1,500 FCFA of charges variables. Charges fixes total 5,000,000 FCFA. The target is a r\u00e9sultat net of 3,000,000 FCFA after 30% imp\u00f4t sur les soci\u00e9t\u00e9s.',
      'scenario.ohada.solution': 'MCV = 2,500 \u2013 1,500 = 1,000 FCFA. Seuil de rentabilit\u00e9 = 5,000,000 \u00f7 1,000 = 5,000 unit\u00e9s. Cible avant imp\u00f4t = 3,000,000 \u00f7 (1 \u2013 0.30) = 4,285,714 FCFA. Unit\u00e9s cibles = (5,000,000 + 4,285,714) \u00f7 1,000 = 9,286 unit\u00e9s. \u00c0 8,000 unit\u00e9s, r\u00e9sultat avant imp\u00f4t = (1,000 \u00d7 8,000) \u2013 5,000,000 = 3,000,000; r\u00e9sultat net = 2,100,000 FCFA. Marge de s\u00e9curit\u00e9 = (8,000 \u2013 5,000) \u00f7 8,000 = 37.5%.',

  /* ─── 4. CURRENCY FORMATTING ─── */
  var CURRENCIES = {
    USD: { symbol: '$',    locale: 'en-US',  decimals: 2 },
    EUR: { symbol: '€',    locale: 'fr-FR',  decimals: 2 },
    GBP: { symbol: '£',    locale: 'en-GB',  decimals: 2 },
    XOF: { symbol: 'CFA',  locale: 'fr-FR',  decimals: 0 },
    XAF: { symbol: 'FCFA', locale: 'fr-FR',  decimals: 0 },
    JPY: { symbol: '¥',    locale: 'ja-JP',  decimals: 0 },
    CHF: { symbol: 'Fr',   locale: 'de-CH',  decimals: 2 },
    CAD: { symbol: '$',    locale: 'en-CA',  decimals: 2 },
    AUD: { symbol: '$',    locale: 'en-AU',  decimals: 2 },
    CNY: { symbol: '¥',    locale: 'zh-CN',  decimals: 2 },
    INR: { symbol: '₹',    locale: 'en-IN',  decimals: 2 },
    BRL: { symbol: 'R$',   locale: 'pt-BR',  decimals: 2 },
    ZAR: { symbol: 'R',    locale: 'en-ZA',  decimals: 2 },
    NGN: { symbol: '₦',    locale: 'en-NG',  decimals: 2 },
    KES: { symbol: 'KSh',  locale: 'en-KE',  decimals: 2 },
    MAD: { symbol: 'MAD',  locale: 'fr-MA',  decimals: 2 }
  };

  function fmtCurrency(val) {
    var c = CURRENCIES[state.currency] || CURRENCIES.USD;
    try {
      return new Intl.NumberFormat(c.locale, {
        style: 'currency',
        currency: state.currency,
        minimumFractionDigits: c.decimals,
        maximumFractionDigits: c.decimals
      }).format(val);
    } catch (e) {
      return c.symbol + fmtNumber(val, c.decimals);
    }
  }

  function fmtNumber(val, decimals) {
    if (!isFinite(val)) return val > 0 ? '\u221e' : val < 0 ? '-\u221e' : '\u2014';
    var d = (decimals !== undefined) ? decimals : 0;
    try {
      var c = CURRENCIES[state.currency] || CURRENCIES.USD;
      return new Intl.NumberFormat(c.locale, {
        minimumFractionDigits: d,
        maximumFractionDigits: d
      }).format(val);
    } catch (e) {
      return Number(val).toFixed(d);
    }
  }

  function getCurrencyDecimals() {
    return (CURRENCIES[state.currency] || CURRENCIES.USD).decimals;
  }

  function fmtPct(val, decimals) {
    if (!isFinite(val)) return '\u2014';
    var d = (decimals !== undefined) ? decimals : 1;
    return Number(val).toFixed(d) + '%';
  }

  function fmtUnits(val) {
    if (!isFinite(val)) return '\u221e ' + T('general.units');
    return fmtNumber(val, 2) + ' ' + T('general.units');
  }

  function fmtUnitsCeil(val) {
    if (!isFinite(val)) return '\u221e ' + T('general.units');
    var exact = val;
    var ceil = Math.ceil(val - 0.0001); // tolerance for floating point
    if (ceil < 0) ceil = 0;
    if (exact % 1 === 0) {
      return fmtNumber(exact, 0) + ' ' + T('general.units');
    }
    return fmtNumber(exact, 2) + ' → ' + fmtNumber(ceil, 0) + ' ' + T('general.units');
  }

  /* ─── Locale-aware number parser ─── */
  function parseLocaleNumber(str) {
    if (typeof str !== 'string') return parseFloat(str) || 0;
    // Normalize whitespace and trim
    var s = str.replace(/\s/g, '').trim();
    if (s === '') return 0;
    // Detect format: if both comma and dot exist, the last one is the decimal separator
    var hasComma = s.indexOf(',') !== -1;
    var hasDot = s.indexOf('.') !== -1;
    if (hasComma && hasDot) {
      // e.g. "1,234.56" or "1.234,56" — last separator is decimal
      if (s.lastIndexOf(',') > s.lastIndexOf('.')) {
        // Comma is decimal: "1.234,56"
        s = s.replace(/\./g, '').replace(',', '.');
      } else {
        // Dot is decimal: "1,234.56"
        s = s.replace(/,/g, '');
      }
    } else if (hasComma) {
      // Could be thousands (1,000) or decimal (1,5)
      // If single comma with <= 2 digits after it and no grouping pattern, treat as decimal
      var parts = s.split(',');
      if (parts.length === 2 && parts[1].length <= 2) {
        s = s.replace(',', '.');
      } else {
        // Thousands separator: "1,000,000"
        s = s.replace(/,/g, '');
      }
    }
    // Strip anything remaining except digits, dot, minus
    s = s.replace(/[^\d.\-]/g, '');
    var num = parseFloat(s);
    return isNaN(num) ? 0 : num;
  }

  /* ─── 5. DOM HELPERS ─── */
  function $(sel, parent) {
    return (parent || document).querySelector(sel);
  }

  function $$(sel, parent) {
    return Array.prototype.slice.call((parent || document).querySelectorAll(sel));
  }

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function(key) {
        if (key === 'class') {
          node.className = attrs[key];
        } else if (key === 'style' && typeof attrs[key] === 'object') {
          Object.keys(attrs[key]).forEach(function(prop) {
            node.style[prop] = attrs[key][prop];
          });
        } else if (key.indexOf('on') === 0) {
          node.addEventListener(key.slice(2).toLowerCase(), attrs[key]);
        } else if (key === 'html') {
          node.innerHTML = attrs[key];
        } else if (key === 'text') {
          node.textContent = attrs[key];
        } else {
          node.setAttribute(key, attrs[key]);
        }
      });
    }
    if (children) {
      (Array.isArray(children) ? children : [children]).forEach(function(child) {
        if (typeof child === 'string') {
          node.appendChild(document.createTextNode(child));
        } else if (child && child.nodeType) {
          node.appendChild(child);
        }
      });
    }
    return node;
  }

  /* ─── 6. COMPUTED RESULTS CACHE ─── */
  var results = {};
  var whatIfResults = {};
  var multiResults = null;

  function compute() {
    results = CVPCore.calcSingle(
      state.price, state.variableCost, state.fixedCosts, state.volume,
      state.targetProfit, state.taxRate
    );
    whatIfResults = CVPCore.applyWhatIf(
      {
        price: state.price,
        variableCost: state.variableCost,
        fc: state.fixedCosts,
        volume: state.volume,
        targetProfit: state.targetProfit,
        taxRate: state.taxRate
      },
      state.whatIf.price, state.whatIf.volume,
      state.whatIf.variableCost, state.whatIf.fixedCosts
    );
    if (state.multiProduct && state.products.length > 1) {
      multiResults = CVPCore.calcMulti(state.products, state.fixedCosts, state.targetProfit, state.taxRate);
    } else {
      multiResults = null;
    }
  }

  function buildScenarios() {
    var c = $('.scenarios-container');
    if (!c) return;

    var html = '';

    /* Hero section */
    html += '<div class="scenarios-hero">';
    html += '<h2>' + T('scenarios.title') + '</h2>';
    html += '<p>' + T('scenarios.sub') + '</p>';
    html += '</div>';

    /* Card grid */
    html += '<div class="scenario-grid">';

    SCENARIOS.forEach(function(sc, idx) {
      var num = idx + 1;
      html += '<div class="scenario-card" id="sc-' + sc.id + '">';
      html += '<span class="scenario-badge" style="background:rgba(128,128,128,0.1);background:color-mix(in srgb, ' + sc.badgeColor + ' 15%, transparent);color:' + sc.badgeColor + ';border-color:rgba(128,128,128,0.2);border-color:color-mix(in srgb, ' + sc.badgeColor + ' 30%, transparent);">#' + num + '</span>';
      html += '<h3>' + T('scenario.' + sc.id + '.title') + '</h3>';
      html += '<p class="scenario-desc">' + T('scenario.' + sc.id + '.desc') + '</p>';
      html += '<div class="scenario-actions">';
      html += '<button class="btn-load" data-sc-idx="' + idx + '">' + T('scenarios.load') + '</button>';
      html += '<button class="btn-toggle-solution" data-sc-idx="' + idx + '">' + T('scenarios.showSolution') + '</button>';
      html += '</div>';
      html += '<div class="scenario-solution" id="sol-' + sc.id + '">' + T('scenario.' + sc.id + '.solution') + '</div>';
      html += '</div>';
    });

    html += '</div>';
    c.innerHTML = html;

    /* Event delegation: Load & Solve */
    c.addEventListener('click', function(e) {
      var loadBtn = e.target.closest('.btn-load');
      if (loadBtn) {
        var idx = parseInt(loadBtn.getAttribute('data-sc-idx'), 10);
        var sc = SCENARIOS[idx];
        // Hard-reset transient state so presets are deterministic
        state.whatIf = { price: 0, volume: 0, variableCost: 0, fixedCosts: 0 };
        state.overlays = { bep: true, target: false, mos: false, dol: false };
        state.multiProduct = false;
        state.products = [{ name: 'Product 1', price: 50, variableCost: 30, mixPct: 100 }];
        state.indifference = { fcA: 80000, vA: 45, fcB: 200000, vB: 25 };
        state.sensitivity = { targetMetric: 'operatingIncome', rowVar: 'price', colVar: 'volume', pctRange: 20, numSteps: 7 };
        state.rightTab = 'whatif';
        state.chartView = 'classic';
        state.tableTab = 'results';
        // Apply scenario params
        Object.assign(state, sc.params);
        if (sc.currency) state.currency = sc.currency;
        if (sc.mode) state.mode = sc.mode;
        if (sc.rightTab) state.rightTab = sc.rightTab;
        if (sc.indifference) state.indifference = Object.assign({}, sc.indifference);
        state.page = 'page-play';
        $$('.nav-tab').forEach(function(t) { t.classList.toggle('active', t.getAttribute('data-page') === 'page-play'); });
        $$('.page').forEach(function(p) { p.classList.toggle('active', p.id === 'page-play'); });
        // Update mode toggle buttons
        $$('[data-mode]').forEach(function(btn) { btn.classList.toggle('active', btn.getAttribute('data-mode') === state.mode); });
        var currSel = $('#currency-select');
        if (currSel) currSel.value = state.currency;
        buildAll();
        saveState();
        return;
      }

      var togBtn = e.target.closest('.btn-toggle-solution');
      if (togBtn) {
        var idx2 = parseInt(togBtn.getAttribute('data-sc-idx'), 10);
        var sc2 = SCENARIOS[idx2];
        var solEl = document.getElementById('sol-' + sc2.id);
        if (solEl) {
          var isVisible = solEl.classList.toggle('visible');
          togBtn.textContent = isVisible ? T('scenarios.hideSolution') : T('scenarios.showSolution');
        }
      }
    });
  }

    buildChartToolbar();
    buildChart();
    buildTableHeader();
    buildResultsTable();
    buildSensitivityTable();
    buildRightPanel();
  }

  function buildChartToolbar() {
    var toolbar = $('#chart-toolbar');
    if (!toolbar) return;
    toolbar.innerHTML = '';

    // View toggle buttons
    var views = [
      { key: 'classic', label: 'chart.classic' },
      { key: 'pv', label: 'chart.pv' },
      { key: 'stack', label: 'chart.stack' }
    ];
    views.forEach(function(view) {
      var btn = el('button', {
        class: 'chart-view-btn' + (state.chartView === view.key ? ' active' : ''),
        text: T(view.label),
        onClick: function() {
          state.chartView = view.key;
          buildChartToolbar();
          buildChart();
          saveState();
        }
      });
      toolbar.appendChild(btn);
    });

    // Separator
    var sep = el('div', {
      style: {
        width: '1px', height: '16px', background: 'var(--border)',
        margin: '0 6px', flexShrink: '0'
      }
    });
    toolbar.appendChild(sep);

    // Overlay toggle buttons
    var overlayDefs = [
      { key: 'bep', label: 'overlay.bep', color: 'var(--accent)' },
      { key: 'target', label: 'overlay.target', color: 'var(--amber)' },
      { key: 'mos', label: 'overlay.mos', color: 'var(--lavender)' },
      { key: 'dol', label: 'overlay.dol', color: 'var(--lavender)' }
    ];
    overlayDefs.forEach(function(ov) {
      var isOn = state.overlays[ov.key];
      var btn = el('button', {
        class: 'overlay-toggle' + (isOn ? ' on' : ''),
        text: T(ov.label),
        style: { color: isOn ? ov.color : '' },
        onClick: function() {
          state.overlays[ov.key] = !state.overlays[ov.key];
          buildChartToolbar();
          buildChart();
          saveState();
        }
      });
      toolbar.appendChild(btn);
    });

    // Export PNG button (Teacher mode only)
    if (state.teacher) {
      var pngBtn = el('button', {
        class: 'export-png-btn',
        text: T('chart.exportPNG'),
        onClick: function() { exportChartPNG(); }
      });
      toolbar.appendChild(pngBtn);
    }

    // Expand button
    var expandBtn = el('button', {
      class: 'expand-btn',
      text: state.fullscreen ? T('chart.collapse') : T('chart.expand'),
      onClick: function() {
        toggleFullscreen();
      }
    });
    toolbar.appendChild(expandBtn);
  }

  function buildChart() {
    var container = $('#chart-area');
    if (!container) return;

    // Guard: if BEP is not finite (CM <= 0), charts cannot render meaningfully
    if (results && !isFinite(results.bepUnits)) {
      container.innerHTML = '';
      var msg = document.createElement('div');
      msg.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;padding:32px;text-align:center;';
      var icon = document.createElement('div');
      icon.style.cssText = 'font-size:36px;opacity:0.5;';
      icon.textContent = '\u26a0';
      var title = document.createElement('div');
      title.style.cssText = 'font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--amber);';
      title.textContent = state.lang === 'fr' ? 'Pas de seuil de rentabilité' : 'No Break-Even Point';
      var detail = document.createElement('div');
      detail.style.cssText = 'font-size:12px;color:var(--text-secondary);max-width:320px;line-height:1.6;';
      if (results.cm < 0) {
        detail.textContent = state.lang === 'fr'
          ? 'La marge sur coût variable est négative (' + fmtCurrency(results.cm) + '/unité). Chaque unité vendue augmente la perte. Augmentez le prix ou réduisez le coût variable.'
          : 'Contribution margin is negative (' + fmtCurrency(results.cm) + '/unit). Every unit sold increases the loss. Raise the price or reduce variable cost.';
      } else {
        detail.textContent = state.lang === 'fr'
          ? 'La marge sur coût variable est nulle. Les ventes couvrent uniquement les coûts variables — les charges fixes ne sont jamais récupérées.'
          : 'Contribution margin is zero. Sales cover only variable costs — fixed costs are never recovered.';
      }
      msg.appendChild(icon);
      msg.appendChild(title);
      msg.appendChild(detail);
      container.appendChild(msg);
      container.setAttribute('role', 'img');
      container.setAttribute('aria-label', title.textContent + '. ' + detail.textContent);
      return;
    }

    var drawFn;
    if (state.chartView === 'pv') drawFn = CVPCharts.drawPV;
    else if (state.chartView === 'stack') drawFn = CVPCharts.drawStack;
    else drawFn = CVPCharts.drawClassic;
    var currSym = (CURRENCIES[state.currency] || CURRENCIES.USD).symbol;
    drawFn(container, results, state.overlays, T, whatIfResults, currSym);
    // Accessibility: add role and summary to chart
    container.setAttribute('role', 'img');
    var chartDesc = results ? (state.lang === 'fr'
      ? 'Graphique CVP : seuil de rentabilité à ' + fmtNumber(results.bepUnits, 0) + ' unités, résultat ' + fmtCurrency(results.operatingIncome)
      : 'CVP chart: break-even at ' + fmtNumber(results.bepUnits, 0) + ' units, operating income ' + fmtCurrency(results.operatingIncome))
      : (state.lang === 'fr' ? 'Graphique CVP' : 'CVP Chart');
    container.setAttribute('aria-label', chartDesc);
  }

  /* ─── PANEL RESIZING ─── */
  function initResizers() {
    var body = document.body;

    function makeDrag(onMove, onEnd) {
      var move = function(e) { e.preventDefault(); onMove(e); };
      var up = function() {
        body.style.cursor = '';
        body.style.userSelect = '';
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', up);
        if (onEnd) onEnd();
      };
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
    }

    /* Left panel horizontal resizer */
    var resizerLeft = $('#resizer-left');
    var leftPanel = $('#left-panel');
    if (resizerLeft && leftPanel) {
      resizerLeft.addEventListener('mousedown', function(e) {
        e.preventDefault();
        var startX = e.clientX;
        var startW = leftPanel.getBoundingClientRect().width;
        body.style.cursor = 'col-resize';
        body.style.userSelect = 'none';
        makeDrag(function(ev) {
          var w = Math.min(400, Math.max(180, startW + (ev.clientX - startX)));
          leftPanel.style.width = w + 'px';
          leftPanel.style.minWidth = w + 'px';
          state.leftWidth = w;
        }, function() {
          saveState();
        });
      });
    }

    /* Right panel horizontal resizer */
    var resizerRight = $('#resizer-right');
    var rightPanel = $('#right-panel');
    if (resizerRight && rightPanel) {
      resizerRight.addEventListener('mousedown', function(e) {
        e.preventDefault();
        var startX = e.clientX;
        var startW = rightPanel.getBoundingClientRect().width;
        body.style.cursor = 'col-resize';
        body.style.userSelect = 'none';
        makeDrag(function(ev) {
          var w = Math.min(360, Math.max(180, startW - (ev.clientX - startX)));
          rightPanel.style.width = w + 'px';
          rightPanel.style.minWidth = w + 'px';
          state.rightWidth = w;
        }, function() {
          saveState();
        });
      });
    }

    /* Chart / table vertical divider */
    var dividerH = $('#divider-h');
    var chartArea = $('#chart-area');
    var centerPanel = $('#center-panel');
    if (dividerH && chartArea && centerPanel) {
      dividerH.addEventListener('mousedown', function(e) {
        e.preventDefault();
        var startY = e.clientY;
        var containerH = centerPanel.getBoundingClientRect().height;
        var startChartH = chartArea.getBoundingClientRect().height;
        body.style.cursor = 'row-resize';
        body.style.userSelect = 'none';
        makeDrag(function(ev) {
          var newH = Math.max(100, startChartH + (ev.clientY - startY));
          var maxH = containerH - 100 - 4; /* 4px divider */
          newH = Math.min(maxH, newH);
          chartArea.style.flex = '0 0 ' + newH + 'px';
          state.chartRatio = newH / containerH;
        }, function() {
          saveState();
        });
      });
    }
  }

  function toggleFullscreen() {
    state.fullscreen = !state.fullscreen;
    var playground = $('#playground-container');
    if (playground) {
      playground.classList.toggle('fullscreen', state.fullscreen);
    }
    buildLeftPanel();
    buildChartToolbar();
    buildRightPanel();
    saveState();
  }

  function buildResultsTable() {
    var container = $('#results-content');
    container.innerHTML = '';

    var d = results;
    var table = el('table', { class: 'results-table' });

    // Thead
    var thead = el('thead');
    var hrow = el('tr');
    [T('res.metric'), T('res.perUnit'), T('res.total'), T('res.ratio')].forEach(function(h) {
      hrow.appendChild(el('th', { text: h }));
    });
    thead.appendChild(hrow);
    table.appendChild(thead);

    var tbody = el('tbody');

    // CM income statement title row (M9)
    var titleRow = el('tr');
    var titleTd = el('td', {
      colspan: '4',
      style: { fontSize: '9px', fontWeight: '700', letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--text-muted)', paddingBottom: '4px' },
      text: T('res.tableTitle')
    });
    titleRow.appendChild(titleTd);
    tbody.appendChild(titleRow);

    // Negative CM warning (H6)
    if (d.cm < 0) {
      var warnRow = el('tr');
      var warnTd = el('td', {
        colspan: '4',
        style: { fontSize: '10px', color: 'var(--loss)', padding: '6px 16px', background: 'var(--loss-glow)', borderLeft: '3px solid var(--loss)' },
        text: state.lang === 'fr' ? T('warn.negativeCMFr') : T('warn.negativeCM')
      });
      warnRow.appendChild(warnTd);
      tbody.appendChild(warnRow);
    }

    // Helper to create a seekable cell with visible goal-seek button
    function seekCell(val, fmt, cssClass, metricKey) {
      var td = el('td', { class: (cssClass || '') + ' seekable' });
      var span = el('span', { text: fmt });
      td.appendChild(span);
      var seekBtn = el('button', {
        class: 'seek-btn',
        text: '\u2295',
        title: state.lang === 'fr' ? 'Recherche de valeur cible' : 'Goal Seek',
        'aria-label': 'Goal Seek ' + metricKey
      });
      seekBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        showGoalSeekMenu(e, metricKey, val);
      });
      td.appendChild(seekBtn);
      td.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        showGoalSeekMenu(e, metricKey, val);
      });
      return td;
    }

    // Revenue row (H7: removed tautological 100% ratio)
    var revRow = el('tr');
    revRow.appendChild(el('td', { text: T('res.revenue') }));
    revRow.appendChild(seekCell(d.price, fmtNumber(d.price, getCurrencyDecimals()), 'val-profit', 'revenue'));
    revRow.appendChild(seekCell(d.totalRevenue, fmtCurrency(d.totalRevenue), 'val-profit', 'revenue'));
    revRow.appendChild(el('td', { class: 'val-muted', text: '\u2014' }));
    tbody.appendChild(revRow);

    // Variable costs (H1: per-unit without parentheses; total in parens is standard deduction format)
    var vcRow = el('tr');
    vcRow.appendChild(el('td', { text: T('res.vc') }));
    vcRow.appendChild(seekCell(d.variableCost, fmtNumber(d.variableCost, getCurrencyDecimals()), 'val-loss', 'variableCost'));
    vcRow.appendChild(seekCell(d.totalVC, '(' + fmtCurrency(d.totalVC) + ')', 'val-loss', 'variableCost'));
    vcRow.appendChild(el('td', { class: 'val-muted', text: d.price > 0 ? fmtPct((d.variableCost / d.price) * 100) : '\u2014' }));
    tbody.appendChild(vcRow);

    // Contribution Margin (subtotal)
    var cmRow = el('tr', { class: 'subtotal' });
    cmRow.appendChild(el('td', { style: { color: 'var(--accent)', fontWeight: '700' }, text: T('res.cm') }));
    cmRow.appendChild(seekCell(d.cm, fmtNumber(d.cm, getCurrencyDecimals()), 'val-accent val-bold', 'cm'));
    cmRow.appendChild(seekCell(d.totalCM, fmtCurrency(d.totalCM), 'val-accent val-bold', 'cm'));
    cmRow.appendChild(el('td', { class: 'val-accent val-bold', text: fmtPct(d.cmRatio * 100) }));
    tbody.appendChild(cmRow);

    // Fixed costs (H2: per-unit stays dash; total in parens is standard deduction format)
    var fcRow = el('tr');
    fcRow.appendChild(el('td', { text: T('res.fc') }));
    fcRow.appendChild(el('td', { class: 'val-muted', text: '\u2014' }));
    fcRow.appendChild(seekCell(d.fc, '(' + fmtCurrency(d.fc) + ')', 'val-amber', 'fixedCosts'));
    fcRow.appendChild(el('td', { class: 'val-muted', text: d.totalRevenue > 0 ? fmtPct((d.fc / d.totalRevenue) * 100) : '\u2014' }));
    tbody.appendChild(fcRow);

    // Operating Income (subtotal)
    var oiRow = el('tr', { class: 'subtotal' });
    var oiClass = d.isProfit ? 'val-profit val-bold' : 'val-loss val-bold';
    oiRow.appendChild(el('td', { style: { color: d.isProfit ? 'var(--profit)' : 'var(--loss)', fontWeight: '700' }, text: T('res.oi') }));
    oiRow.appendChild(seekCell(d.oiPerUnit, fmtNumber(d.oiPerUnit, getCurrencyDecimals()), oiClass, 'operatingIncome'));
    oiRow.appendChild(seekCell(d.operatingIncome, fmtCurrency(d.operatingIncome), oiClass, 'operatingIncome'));
    oiRow.appendChild(el('td', { class: oiClass, text: fmtPct(d.oiRatio * 100) }));
    tbody.appendChild(oiRow);

    // Tax expense and Net income (shown when tax rate > 0 or advanced mode)
    if (state.mode === 'advanced' || d.taxRate > 0) {
      var taxRow = el('tr');
      taxRow.appendChild(el('td', { text: state.lang === 'fr' ? 'Charge d\'impôt' : 'Tax Expense' }));
      taxRow.appendChild(el('td', { class: 'val-muted', text: '\u2014' }));
      taxRow.appendChild(el('td', { class: 'val-loss', text: d.taxExpense > 0 ? '(' + fmtCurrency(d.taxExpense) + ')' : fmtCurrency(0) }));
      taxRow.appendChild(el('td', { class: 'val-muted', text: fmtPct(d.taxRate) }));
      tbody.appendChild(taxRow);

      var niRow = el('tr', { class: 'subtotal' });
      var niClass = d.netIncome >= 0 ? 'val-profit val-bold' : 'val-loss val-bold';
      niRow.appendChild(el('td', { style: { color: d.netIncome >= 0 ? 'var(--profit)' : 'var(--loss)', fontWeight: '700' }, text: state.lang === 'fr' ? 'Résultat net' : 'Net Income' }));
      niRow.appendChild(el('td', { class: 'val-muted', text: '\u2014' }));
      niRow.appendChild(el('td', { class: niClass, text: fmtCurrency(d.netIncome) }));
      niRow.appendChild(el('td', { class: 'val-muted', text: d.totalRevenue > 0 ? fmtPct((d.netIncome / d.totalRevenue) * 100) : '\u2014' }));
      tbody.appendChild(niRow);
    }

    // Divider
    var divRow = el('tr', { class: 'divider' });
    divRow.appendChild(el('td', { colspan: '4' }));
    tbody.appendChild(divRow);

    // Break-even (M3: add rounding note for fractional BEP)
    var bepRow = el('tr');
    var bepLabel = T('res.bep');
    if (isFinite(d.bepUnits) && d.bepUnits % 1 !== 0) {
      bepLabel += ' <span class="metric-hint">' + T('res.bepNote') + '</span>';
    }
    bepRow.appendChild(el('td', { html: bepLabel }));
    var bepTd = seekCell(d.bepUnits, fmtUnitsCeil(d.bepUnits), 'val-accent val-bold', 'bepUnits');
    bepTd.colSpan = 2;
    bepRow.appendChild(bepTd);
    bepRow.appendChild(el('td', { class: 'val-muted', text: fmtCurrency(d.bepRevenue) }));
    tbody.appendChild(bepRow);

    // Target profit volume (C3: clarified label)
    var tpRow = el('tr');
    tpRow.appendChild(el('td', { html: T('res.targetVolPretax') + ' <span class="metric-hint">' + T('input.pretax') + '</span>' }));
    var tpTd = seekCell(d.targetUnits, fmtUnitsCeil(d.targetUnits), 'val-amber', 'targetUnits');
    tpTd.colSpan = 2;
    tpRow.appendChild(tpTd);
    tpRow.appendChild(el('td', { class: 'val-muted', text: fmtCurrency(d.targetRevenue) }));
    tbody.appendChild(tpRow);

    // After-tax target (Advanced only)
    if (state.mode === 'advanced') {
      var atRow = el('tr');
      atRow.appendChild(el('td', { html: T('res.targetVolAftertax') + ' <span class="metric-hint">@ ' + fmtNumber(d.taxRate, 0) + '%</span>' }));
      var atTd = seekCell(d.afterTaxUnits, fmtUnitsCeil(d.afterTaxUnits), 'val-amber', 'afterTaxUnits');
      atTd.colSpan = 2;
      atRow.appendChild(atTd);
      atRow.appendChild(el('td', { class: 'val-muted', text: fmtCurrency(d.afterTaxRevenue) }));
      tbody.appendChild(atRow);
    }

    // Margin of safety
    var mosRow = el('tr');
    mosRow.appendChild(el('td', { text: T('res.mos') }));
    if (isNaN(d.mosPct)) {
      // Zero volume: MoS is undefined, not zero
      var mosTd = el('td', { class: 'val-muted', text: state.lang === 'fr' ? 'N/D (volume nul)' : 'N/A (zero volume)' });
      mosTd.colSpan = 3;
      mosRow.appendChild(mosTd);
    } else {
      var mosClass = d.mosPct >= 0 ? 'val-amber' : 'val-loss';
      mosRow.appendChild(seekCell(d.mosUnits, fmtUnits(d.mosUnits), mosClass, 'mosUnits'));
      mosRow.appendChild(seekCell(d.mosRevenue, fmtCurrency(d.mosRevenue), mosClass, 'mosRevenue'));
      mosRow.appendChild(el('td', { class: mosClass + ' val-bold', text: fmtPct(d.mosPct) }));
    }
    tbody.appendChild(mosRow);

    // DOL (Advanced only — suppress when OI <= 0 as DOL is not meaningful below break-even)
    if (state.mode === 'advanced') {
      var dolRow = el('tr');
      var dolLabelHtml = T('res.dol') + ' <span class="metric-hint">' + (state.lang === 'fr' ? 'Degré de levier opérationnel' : 'Degree of Operating Leverage') + '</span>';
      dolRow.appendChild(el('td', { html: dolLabelHtml }));

      if (d.operatingIncome <= 0) {
        // DOL is not meaningful at or below break-even
        var dolWarning = state.lang === 'fr'
          ? 'Non significatif (résultat ≤ 0)'
          : 'Not meaningful (OI ≤ 0)';
        var dolTd = el('td', { class: 'val-muted', text: dolWarning });
        dolTd.colSpan = 2;
        dolRow.appendChild(dolTd);
        dolRow.appendChild(el('td', { class: 'val-muted', style: { fontSize: '8px' }, text: state.lang === 'fr' ? 'DOL instable sous le seuil de rentabilité' : 'DOL is unstable below break-even' }));
      } else {
        var dolText = isFinite(d.dol) ? fmtNumber(d.dol, 2) + '\u00d7' : '\u221e (undefined at BEP)';
        var dolTd = el('td', { class: 'val-lavender val-bold', text: dolText });
        dolTd.colSpan = 2;
        dolRow.appendChild(dolTd);
        var dolHint = isFinite(d.dol) ? '\u00b110% vol \u2248 \u00b1' + fmtNumber(Math.abs(d.dol * 10), 1) + '% OI' : '\u2014';
        dolRow.appendChild(el('td', { class: 'val-muted', style: { fontSize: '8px' }, text: dolHint }));
      }
      tbody.appendChild(dolRow);
    }

    /* Multi-product results section */
    if (state.multiProduct && state.products.length > 1 && multiResults) {
      if (multiResults.error) {
        var errRow = el('tr');
        var errMsg = multiResults.errorType === 'mixTotal'
          ? (state.lang === 'fr'
            ? 'Le mix total est de ' + fmtNumber(multiResults.totalMixPct, 1) + '% — doit être exactement 100% pour calculer.'
            : 'Mix total is ' + fmtNumber(multiResults.totalMixPct, 1) + '% — must equal exactly 100% to calculate.')
          : (state.lang === 'fr' ? 'Erreur dans les données produit.' : 'Error in product data.');
        var errTd = el('td', {
          colspan: '4',
          style: { fontSize: '11px', color: 'var(--loss)', padding: '10px 16px', background: 'var(--loss-glow)', borderLeft: '3px solid var(--loss)' },
          text: errMsg
        });
        errRow.appendChild(errTd);
        tbody.appendChild(errRow);
      } else {
        buildMultiProductResults(tbody, multiResults);
      }
    }

    table.appendChild(tbody);
    container.appendChild(table);
  }

  /**
   * buildMultiProductResults — appends weighted-avg and per-product rows to tbody.
   */
  function buildMultiProductResults(tbody, mr) {
    /* Section divider */
    var divRow2 = el('tr', { class: 'divider' });
    divRow2.appendChild(el('td', { colspan: '4' }));
    tbody.appendChild(divRow2);

    /* Section header */
    var headerRow = el('tr');
    var headerTd = el('td', {
      colspan: '4',
      style: { color: 'var(--profit)', fontWeight: '700', fontSize: '10px', letterSpacing: '0.05em', paddingTop: '6px' },
      text: '\u25b8 ' + T('product.perProduct')
    });
    headerRow.appendChild(headerTd);
    tbody.appendChild(headerRow);

    /* Weighted average CM */
    var wCMRow = el('tr');
    wCMRow.appendChild(el('td', { style: { fontWeight: '600' }, text: T('product.weightedCM') }));
    wCMRow.appendChild(el('td', { class: 'val-accent val-bold', text: fmtNumber(mr.weightedCM) }));
    var wCMTotalTd = el('td', { class: 'val-muted', text: '\u2014' });
    wCMRow.appendChild(wCMTotalTd);
    wCMRow.appendChild(el('td', { class: 'val-accent val-bold', text: fmtPct(mr.weightedCMRatio * 100) }));
    tbody.appendChild(wCMRow);

    /* Total BEP */
    var bepRow = el('tr');
    bepRow.appendChild(el('td', { style: { fontWeight: '600' }, text: T('product.bepTotal') }));
    var bepTd = el('td', { class: 'val-accent val-bold', text: fmtUnitsCeil(mr.bepTotalUnits) });
    bepTd.colSpan = 2;
    bepRow.appendChild(bepTd);
    bepRow.appendChild(el('td', { class: 'val-muted', text: fmtCurrency(mr.bepTotalRevenue) }));
    tbody.appendChild(bepRow);

    /* Target profit volume (multi-product) */
    var tpRow = el('tr');
    tpRow.appendChild(el('td', { style: { fontWeight: '600' }, html: T('res.targetVol') + ' <span class="metric-hint">' + T('input.pretax') + '</span>' }));
    var tpTd = el('td', { class: 'val-amber', text: fmtUnitsCeil(mr.targetTotalUnits) });
    tpTd.colSpan = 2;

  function showGoalSeekMenu(event, metricKey, currentValue) {
    // Guard: cannot goal-seek on infinite/NaN values
    if (!isFinite(currentValue)) {
      alert(T('goalseek.header') + ': Current value is \u221e. Adjust inputs first.');
      return;
    }
    // Remove any existing menu
    var existing = $('#ctx-menu-overlay');
    if (existing) existing.remove();

    var overlay = el('div', {
      id: 'ctx-menu-overlay',
      style: { position: 'fixed', inset: '0', zIndex: '999' },
      onclick: function() { overlay.remove(); }
    });

    var menu = el('div', { class: 'ctx-menu', style: { position: 'fixed', left: '-9999px', top: '-9999px', visibility: 'hidden' } });

    menu.appendChild(el('div', { class: 'ctx-header', text: T('goalseek.header') + ': ' + (T('res.' + metricKey) || metricKey) }));

    // Solvable variables
    var solvable = ['price', 'variableCost', 'fixedCosts', 'volume'];
    solvable.forEach(function(varKey) {
      var item = el('div', { class: 'ctx-item', onclick: function(e) {
        e.stopPropagation();
        overlay.remove();
        runGoalSeek(metricKey, currentValue, varKey);
      }});
      var icons = { price: 'p', variableCost: 'v', fixedCosts: 'FC', volume: 'Q' };
      var colors = { price: 'var(--profit)', variableCost: 'var(--loss)', fixedCosts: 'var(--amber)', volume: 'var(--accent)' };
      var i18nKey = { price: 'price', variableCost: 'vc', fixedCosts: 'fc', volume: 'volume' };
      item.appendChild(el('span', { class: 'icon', style: { color: colors[varKey] }, text: icons[varKey] }));
      item.appendChild(document.createTextNode(T('goalseek.solveFor') + ' ' + T('goalseek.' + i18nKey[varKey])));
      menu.appendChild(item);
    });

    menu.appendChild(el('div', { class: 'ctx-sep' }));

    // Edit target value
    menu.appendChild(el('div', { class: 'ctx-item', onclick: function(e) {
      e.stopPropagation();
      overlay.remove();
      promptGoalSeekTarget(metricKey);
    }, html: '<span class="icon">\u270e</span>' + T('goalseek.editTarget') }));

    // Copy value
    menu.appendChild(el('div', { class: 'ctx-item', onclick: function(e) {
      e.stopPropagation();
      overlay.remove();
      navigator.clipboard && navigator.clipboard.writeText(String(currentValue));
    }, html: '<span class="icon">\u2398</span>' + T('goalseek.copyValue') }));

    overlay.appendChild(menu);
    document.body.appendChild(overlay);

    // Position menu with bounds checking to prevent viewport clipping
    requestAnimationFrame(function() {
      var rect = menu.getBoundingClientRect();
      var vw = window.innerWidth;
      var vh = window.innerHeight;
      var x = event.clientX;
      var y = event.clientY;
      // Flip horizontally if overflowing right
      if (x + rect.width > vw - 8) x = Math.max(8, vw - rect.width - 8);
      // Flip vertically if overflowing bottom
      if (y + rect.height > vh - 8) y = Math.max(8, vh - rect.height - 8);
      menu.style.left = x + 'px';
      menu.style.top = y + 'px';
      menu.style.visibility = 'visible';
    });
  }

  var GOALSEEK_METRIC_MAP = {
    revenue: function(p, v, fc, q, tp, tr) { return CVPCore.calcSingle(p, v, fc, q, tp, tr).totalRevenue; },
    variableCost: function(p, v, fc, q, tp, tr) { return CVPCore.calcSingle(p, v, fc, q, tp, tr).totalVC; },
    cm: function(p, v, fc, q, tp, tr) { return CVPCore.calcSingle(p, v, fc, q, tp, tr).totalCM; },
    fixedCosts: function(p, v, fc, q) { return fc; },
    operatingIncome: function(p, v, fc, q, tp, tr) { return CVPCore.calcSingle(p, v, fc, q, tp, tr).operatingIncome; },
    bepUnits: function(p, v, fc, q, tp, tr) { return CVPCore.calcSingle(p, v, fc, q, tp, tr).bepUnits; },
    targetUnits: function(p, v, fc, q, tp, tr) { return CVPCore.calcSingle(p, v, fc, q, tp, tr).targetUnits; },
    afterTaxUnits: function(p, v, fc, q, tp, tr) { return CVPCore.calcSingle(p, v, fc, q, tp, tr).afterTaxUnits; },
    mosUnits: function(p, v, fc, q, tp, tr) { return CVPCore.calcSingle(p, v, fc, q, tp, tr).mosUnits; },
    mosRevenue: function(p, v, fc, q, tp, tr) { return CVPCore.calcSingle(p, v, fc, q, tp, tr).mosRevenue; },
    mosPct: function(p, v, fc, q, tp, tr) { return CVPCore.calcSingle(p, v, fc, q, tp, tr).mosPct; }
  };

  function runGoalSeek(metricKey, currentValue, varKey) {
    var i18nKey = { price: 'price', variableCost: 'vc', fixedCosts: 'fc', volume: 'volume' };
    var metricLabel = T('res.' + metricKey) || metricKey;
    var varLabel = T('goalseek.' + (i18nKey[varKey] || varKey));
    var input = prompt(
      metricLabel + ' \u2014 ' + T('goalseek.solveFor') + ' ' + varLabel
      + '\n\n' + (state.lang === 'fr' ? 'Valeur cible souhaitée :' : 'Enter desired target value:'),
      String(Math.round(currentValue * 100) / 100)
    );
    if (input === null) return;
    var target = parseLocaleNumber(input);
    if (target === 0 && input.trim() !== '0') return; // user cancelled or bad input
    if (!isFinite(target)) return;

    var idxMap = { price: 0, variableCost: 1, fixedCosts: 2, volume: 3 };
    var evaluate = function(val) {
      var args = [state.price, state.variableCost, state.fixedCosts, state.volume];
      args[idxMap[varKey]] = val;
      return (GOALSEEK_METRIC_MAP[metricKey] || GOALSEEK_METRIC_MAP.operatingIncome)(args[0], args[1], args[2], args[3], state.targetProfit, state.taxRate);
    };

    var result = CVPGoalSeek.solve({ evaluate: evaluate, target: target, variable: varKey });
    if (result.success) {
      state[varKey] = Math.round(result.value * 100) / 100;
      buildAll();
      saveState();
    } else {
      alert(state.lang === 'fr' ? 'Aucune solution trouvée. Essayez une autre valeur cible.' : 'No solution found. Try a different target value.');
    }
  }

  function promptGoalSeekTarget(metricKey) {
    // Determine which variable to solve for based on metric context
    var varOptions = { bepUnits: 'fixedCosts', bepRevenue: 'fixedCosts', targetUnits: 'price', operatingIncome: 'price', mosPct: 'volume', dol: 'price' };
    var solveVar = varOptions[metricKey] || 'price';
    var varLabel = T('sens.' + solveVar) || solveVar;
    var promptMsg = state.lang === 'fr'
      ? (T('res.' + metricKey) || metricKey) + ' \u2014 Entrez la valeur cible (résolution via ' + varLabel + ') :'
      : (T('res.' + metricKey) || metricKey) + ' \u2014 Enter target value (solving via ' + varLabel + '):';
    var input = prompt(promptMsg);
    if (input !== null) {
      var target = parseLocaleNumber(input);
      if (isFinite(target)) {
        var evaluate = function(val) {
          var p = solveVar === 'price' ? val : state.price;
          var v = solveVar === 'variableCost' ? val : state.variableCost;
          var fc = solveVar === 'fixedCosts' ? val : state.fixedCosts;
          var q = solveVar === 'volume' ? val : state.volume;
          return CVPCore.calcSingle(p, v, fc, q, state.targetProfit, state.taxRate)[metricKey];
        };
        var result = CVPGoalSeek.solve({ evaluate: evaluate, target: target, variable: solveVar });
        if (result.success) {
          state[solveVar] = Math.round(result.value * 100) / 100;
          buildAll();
          saveState();
        } else {
          alert(state.lang === 'fr' ? 'Aucune solution trouvée. Essayez une autre valeur cible.' : 'No solution found. Try a different target value.');
        }
      }
    }
  }

  /* ─── Sensitivity Table ─── */

  function buildSensitivityTable() {
    var pane = $('#tab-sensitivity');
    pane.innerHTML = '';

    // Controls bar
    var controls = el('div', { class: 'sensitivity-controls' });

    // Target metric selector
    controls.appendChild(el('span', { class: 'sens-label', text: T('sens.target') }));
    var targetSelect = el('select', { class: 'sens-select', onchange: function(e) {
      state.sensitivity.targetMetric = e.target.value;
      buildSensitivityTable(); saveState();
    }});
    ['operatingIncome', 'totalCM', 'bepUnits', 'mosPct'].forEach(function(m) {
      var opt = el('option', { value: m, text: T('sens.' + m) });
      if (state.sensitivity.targetMetric === m) opt.selected = true;
      targetSelect.appendChild(opt);
    });
    controls.appendChild(targetSelect);

    // Row variable
    controls.appendChild(el('span', { class: 'sens-label', text: T('sens.row') }));
    var rowSelect = el('select', { class: 'sens-select', onchange: function(e) {
      state.sensitivity.rowVar = e.target.value;
      buildSensitivityTable(); saveState();
    }});
    ['price', 'volume', 'variableCost', 'fixedCosts'].forEach(function(v) {
      var opt = el('option', { value: v, text: T('sens.' + v) });
      if (state.sensitivity.rowVar === v) opt.selected = true;
      rowSelect.appendChild(opt);
    });
    controls.appendChild(rowSelect);

    // Column variable (exclude the currently selected row variable)
    controls.appendChild(el('span', { class: 'sens-label', text: T('sens.col') }));
    var colSelect = el('select', { class: 'sens-select', onchange: function(e) {
      state.sensitivity.colVar = e.target.value;
      buildSensitivityTable(); saveState();
    }});
    ['volume', 'price', 'variableCost', 'fixedCosts'].forEach(function(v) {
      if (v === state.sensitivity.rowVar) return; // prevent same variable on both axes
      var opt = el('option', { value: v, text: T('sens.' + v) });
      if (state.sensitivity.colVar === v) opt.selected = true;
      colSelect.appendChild(opt);
    });
    // If current colVar was excluded, auto-select first available
    if (state.sensitivity.colVar === state.sensitivity.rowVar) {
      var available = ['volume', 'price', 'variableCost', 'fixedCosts'].filter(function(v) { return v !== state.sensitivity.rowVar; });
      state.sensitivity.colVar = available[0];
      colSelect.querySelector('option').selected = true;
    }
    controls.appendChild(colSelect);

    controls.appendChild(el('span', { class: 'sens-range', text: '\u00b1' + state.sensitivity.pctRange + '% in ' + state.sensitivity.numSteps + ' steps' }));
    pane.appendChild(controls);

    // Compute sensitivity data
    var varToState = { price: state.price, volume: state.volume, variableCost: state.variableCost, fixedCosts: state.fixedCosts };
    var rowBase = varToState[state.sensitivity.rowVar];
    var colBase = varToState[state.sensitivity.colVar];
    var rowSteps = CVPCore.generateSteps(rowBase, state.sensitivity.pctRange, state.sensitivity.numSteps);
    var colSteps = CVPCore.generateSteps(colBase, state.sensitivity.pctRange, state.sensitivity.numSteps);

    var baseParams = { p: state.price, v: state.variableCost, fc: state.fixedCosts, q: state.volume, targetProfit: state.targetProfit, taxRate: state.taxRate };
    var sensData = CVPCore.calcSensitivityTable(baseParams, state.sensitivity.rowVar, state.sensitivity.colVar, state.sensitivity.targetMetric, { rowValues: rowSteps, colValues: colSteps });

    // Find min/max for heat-map scaling
    var allVals = sensData.rows.reduce(function(acc, row) { return acc.concat(row); }, []).filter(function(v) { return isFinite(v); });
    var minVal = Math.min.apply(null, allVals);
    var maxVal = Math.max.apply(null, allVals);

    // Build table
    var tableContent = el('div', { class: 'table-content' });
    var table = el('table', { class: 'sensitivity-grid' });

    // Thead
    var thead = el('thead');
    var hrow = el('tr');

    // Corner cell
    var corner = el('th', { class: 'corner', style: { position: 'relative', minWidth: '70px' } });
    corner.appendChild(el('span', { class: 'corner-top', text: T('sens.' + state.sensitivity.colVar) + ' \u2192' }));
    corner.appendChild(el('span', { class: 'corner-bottom', text: T('sens.' + state.sensitivity.rowVar) + ' \u2193' }));
    hrow.appendChild(corner);

    // Column headers
    var currentColIdx = -1;
    var colTol = colBase !== 0 ? Math.abs(colBase * 0.001) : 0.001;
    for (var ci = 0; ci < colSteps.length; ci++) {
      if (Math.abs(colSteps[ci] - colBase) < colTol) { currentColIdx = ci; break; }
    }
    colSteps.forEach(function(cv, i) {
      var th = el('th', { class: 'col-header', text: fmtSensValue(cv, state.sensitivity.colVar) });
      if (i === currentColIdx) th.style.color = 'var(--text-primary)';
      hrow.appendChild(th);
    });
    thead.appendChild(hrow);
    table.appendChild(thead);

    // Tbody
    var tbody = el('tbody');
    var currentRowIdx = -1;
    for (var ri = 0; ri < rowSteps.length; ri++) {
      var rowTol = rowBase !== 0 ? Math.abs(rowBase * 0.001) : 0.001;
      if (Math.abs(rowSteps[ri] - rowBase) < rowTol) { currentRowIdx = ri; break; }
    }

    sensData.rows.forEach(function(row, ri) {
      var tr = el('tr');
      var th = el('th', { text: fmtSensValue(rowSteps[ri], state.sensitivity.rowVar) });
      if (ri === currentRowIdx) th.style.color = 'var(--text-primary)';
      tr.appendChild(th);

      row.forEach(function(val, ci) {
        var td = el('td', { text: fmtSensCell(val, state.sensitivity.targetMetric) });
        td.className = getHeatClass(val, minVal, maxVal, state.sensitivity.targetMetric);
        if (ri === currentRowIdx && ci === currentColIdx) td.classList.add('current-cell');

        // Click to Goal Seek
        td.addEventListener('click', (function(cellVal) {
          return function() {
            showGoalSeekMenu({ clientX: td.getBoundingClientRect().left, clientY: td.getBoundingClientRect().bottom }, state.sensitivity.targetMetric, cellVal);
          };
        })(val));
        td.style.cursor = 'pointer';
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    tableContent.appendChild(table);
    pane.appendChild(tableContent);

    // Footer
    var footer = el('div', { class: 'sensitivity-footer' });
    [
      { label: T('chart.loss'), color: 'rgba(240,96,94,0.25)' },
      { label: T('sens.current'), color: 'rgba(124,127,255,0.15)', outline: true },
      { label: T('chart.profit'), color: 'rgba(45,212,160,0.22)' }
    ].forEach(function(leg) {
      var item = el('div', { class: 'legend-item' });
      var swatch = el('div', { class: 'legend-swatch', style: { background: leg.color } });
      if (leg.outline) swatch.style.outline = '1px solid var(--accent)';
      item.appendChild(swatch);
      item.appendChild(document.createTextNode(leg.label));
      footer.appendChild(item);
    });
    footer.appendChild(el('span', { style: { marginLeft: 'auto', fontSize: '8px', color: 'var(--text-muted)' }, text: T('sens.clickHint') }));
    pane.appendChild(footer);
  }

  function fmtSensValue(val, varKey) {
    if (varKey === 'volume') return Math.round(val).toLocaleString();
    if (varKey === 'fixedCosts' || varKey === 'price' || varKey === 'variableCost') return fmtCurrency(val);
    return fmtNumber(val);
  }

  function fmtSensCell(val, metric) {
    if (!isFinite(val)) return '\u221e';
    if (metric === 'mosPct') return fmtPct(val, 1);
    if (metric === 'dol') return fmtNumber(val, 2) + '\u00d7';
    if (metric === 'bepUnits') return Math.round(val).toLocaleString();
    // operatingIncome, totalCM
    if (val < 0) return '(' + fmtCurrency(Math.abs(val)) + ')';
    return fmtCurrency(val);
  }

  function getHeatClass(val, min, max, metric) {
    // For metrics where higher = better (OI, CM, MoS%), use green for high
    // For BEP, lower = better so invert
    // For DOL, neither better nor worse — use neutral intensity (H3)
    var invertMetrics = ['bepUnits'];
    var neutralMetrics = ['dol'];
    var isInverted = invertMetrics.indexOf(metric) >= 0;
    var isNeutral = neutralMetrics.indexOf(metric) >= 0;

    var normalized;
    if (max === min) {
      normalized = 0.5;
    } else {
      normalized = (val - min) / (max - min);
      if (isInverted) normalized = 1 - normalized;
    }

    // DOL: use neutral intensity coloring (higher = more intense, no good/bad)
    if (isNeutral) {
      if (normalized < 0.2) return 'heat-zero';
      if (normalized < 0.4) return 'heat-zero';
      if (normalized < 0.6) return 'heat-zero';
      if (normalized < 0.8) return 'heat-zero';
      return 'heat-zero';
    }

    // For OI/CM: negative values are always loss
    if ((metric === 'operatingIncome' || metric === 'totalCM') && val < 0) {
      return normalized < 0.33 ? 'heat-loss-3' : normalized < 0.67 ? 'heat-loss-2' : 'heat-loss-1';
    }

    if (normalized < 0.15) return isInverted ? 'heat-profit-3' : 'heat-loss-3';
    if (normalized < 0.3) return isInverted ? 'heat-profit-2' : 'heat-loss-2';
    if (normalized < 0.45) return isInverted ? 'heat-profit-1' : 'heat-loss-1';
    if (normalized < 0.55) return 'heat-zero';
    if (normalized < 0.7) return isInverted ? 'heat-loss-1' : 'heat-profit-1';
    if (normalized < 0.85) return isInverted ? 'heat-loss-2' : 'heat-profit-2';
    return isInverted ? 'heat-loss-3' : 'heat-profit-3';
  }

  function buildWhatIfPanel(panel) {

      track.appendChild(thumb);

      var input = el('input', {

      })(key));

    // Impact card

    var metrics = [
      { label: T('impact.newBep'), base: d.bepUnits, newVal: wi.bepUnits, fmt: function(v) { return Math.round(v).toLocaleString(); }, isLower: true },
      { label: T('impact.newMos'), base: d.mosPct, newVal: wi.mosPct, fmt: function(v) { return fmtPct(v); }, isLower: false },
      { label: T('impact.newProfit'), base: d.operatingIncome, newVal: wi.operatingIncome, fmt: function(v) { return fmtCurrency(v); }, isLower: false },
      { label: T('impact.newDol'), base: d.dol, newVal: wi.dol, fmt: function(v) { return fmtNumber(v, 2) + '\u00d7'; }, isLower: null }
    ];

    metrics.forEach(function(m) {
      var row = el('div', { class: 'impact-row' });
      row.appendChild(el('span', { class: 'impact-label', text: m.label }));

      var pctChange = m.base !== 0 ? ((m.newVal - m.base) / Math.abs(m.base)) * 100 : 0;
      var isBetter = m.isLower === null ? false : (m.isLower ? m.newVal < m.base : m.newVal > m.base);
      var isWorse = m.isLower === null ? false : (m.isLower ? m.newVal > m.base : m.newVal < m.base);
      var deltaColor = isBetter ? 'var(--profit)' : isWorse ? 'var(--loss)' : 'var(--text-muted)';
      var valColor = isBetter ? 'val-profit' : isWorse ? 'val-loss' : '';

      var valSpan = el('span', { class: 'impact-value ' + valColor });
      valSpan.textContent = m.fmt(m.newVal);
      if (Math.abs(pctChange) > 0.1) {
        valSpan.appendChild(el('span', { class: 'impact-delta', style: { color: deltaColor }, text: ' ' + (pctChange > 0 ? '+' : '') + fmtNumber(pctChange, 1) + '%' }));
      }
      row.appendChild(valSpan);
      impact.appendChild(row);
    });

    panel.appendChild(impact);
  }

  function buildComparePanel(panel) {
    var ind = state.indifference;

    ['A', 'B'].forEach(function(struct) {
      var section = el('div', { style: { marginBottom: '14px' } });
      var dotColor = struct === 'A' ? 'var(--accent)' : 'var(--amber)';

      vcInput.addEventListener('change', (function(s) {

          buildRightPanel();
          saveState();
        };
      })(struct));
      vcField.appendChild(vcInput);
      section.appendChild(vcField);

    });

    // Compute indifference
    var result = CVPCore.calcIndifference(ind.fcA, ind.vA, ind.fcB, ind.vB);

    var resultCard = el('div', { class: 'impact-card' });
    resultCard.appendChild(el('div', { class: 'impact-title', text: T('compare.indifference') }));

    if (result.parallel) {
      var parallelMsg = result.dominated
        ? (state.lang === 'fr'
          ? 'Coûts variables identiques — Structure ' + result.dominator + ' est toujours moins chère (charges fixes inférieures)'
          : 'Equal variable costs — Structure ' + result.dominator + ' is always cheaper (lower fixed costs)')
        : (state.lang === 'fr' ? 'Pas d\'intersection (droites de coût parallèles, coûts identiques)' : 'No intersection (parallel cost lines, identical costs)');
      resultCard.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--text-secondary)' }, text: parallelMsg }));
    } else if (result.dominated) {
      var domMsg = state.lang === 'fr'
        ? 'Structure ' + result.dominator + ' est toujours moins chère pour tout volume positif (pas de point d\'indifférence dans la plage utile)'
        : 'Structure ' + result.dominator + ' is always cheaper for all positive volumes (no indifference point in feasible range)';
      resultCard.appendChild(el('div', { style: { fontSize: '11px', color: 'var(--amber)' }, text: domMsg }));
    } else {
      resultCard.appendChild(el('div', { class: 'impact-row', html: '<span class="impact-label">' + T('compare.indifference') + '</span><span class="impact-value val-accent">' + fmtUnitsCeil(result.volume) + '</span>' }));
      resultCard.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--text-secondary)', marginTop: '6px', lineHeight: '1.6' }, text: result.cheaperBelow + ' ' + T('compare.cheaperBelow') + ' ' + Math.round(result.volume).toLocaleString() + ' ' + T('compare.units') }));
      resultCard.appendChild(el('div', { style: { fontSize: '9px', color: 'var(--text-secondary)' }, text: result.cheaperAbove + ' ' + T('compare.cheaperAbove') + ' ' + Math.round(result.volume).toLocaleString() + ' ' + T('compare.units') }));
    }
    panel.appendChild(resultCard);
  }

  /**
   * makeField — creates a single input field with label, hint, and formatted value.
   * @param {string} key   - state property name
   * @param {string} label - i18n key for the label text
   * @param {string} hint  - i18n key for the hint (formula symbol)
   * @param {number} value - current numeric value
   * @returns {HTMLElement}
   */
  function makeField(key, label, hint, value) {
    var decimals = (key === 'taxRate') ? 1 : (key === 'volume') ? 0 : getCurrencyDecimals();

    var hintSpan = el('span', { class: 'field-hint', text: T(hint) });
    var labelDiv = el('div', { class: 'field-label' }, [
      document.createTextNode(T(label)),
      hintSpan
    ]);

    var labelText = T(label);
    var input = el('input', {
      class: 'field-input',
      type: 'text',
      inputmode: 'decimal',
      autocomplete: 'off',
      'aria-label': labelText,
      value: fmtNumber(value, decimals)
    });

    input.addEventListener('focus', function() {
      this.value = (key === 'taxRate') ? String(state[key]) : String(state[key]);
      this.select();
    });

    input.addEventListener('blur', function() {
      var num = parseLocaleNumber(this.value);
      if (key === 'taxRate') {
        if (num < 0) num = 0;
        if (num >= 100) {
          num = 99;
          alert(state.lang === 'fr'
            ? 'Taux d\'imposition plafonné à 99%. Un taux de 100% rendrait le bénéfice après impôt impossible.'
            : 'Tax rate capped at 99%. A 100% rate makes after-tax profit impossible.');
        }
      } else if (key === 'price') {
        if (num < 0) num = 0;
      } else if (key === 'variableCost' || key === 'fixedCosts') {
        if (num < 0) num = 0;
      } else if (key === 'volume') {
        if (num < 0) num = 0;
      }
      state[key] = num;
      this.value = fmtNumber(num, decimals);
      buildAll();
      saveState();
    });

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        this.blur();
      }
    });

    var field = el('div', { class: 'field' }, [labelDiv, input]);
    return field;
  }

  /* ─── 8. SWITCHING HELPERS ─── */
  function switchPage(pageId) {
    state.page = pageId;
    $$('.page').forEach(function(p) { p.classList.remove('active'); });
    $$('.nav-tab[data-page]').forEach(function(t) { t.classList.remove('active'); });
    var target = document.getElementById(pageId);
    if (target) target.classList.add('active');
    $$('.nav-tab[data-page]').forEach(function(t) {
      if (t.getAttribute('data-page') === pageId) t.classList.add('active');
    });
    // Rebuild the newly visible page with current computed data

    else if (pageId === 'page-scenarios') buildScenarios();
    else buildPlayground();
    saveState();

  /* ─── 9. PERSISTENCE ─── */
  var STORAGE_KEY = 'cvpPlayground_v1';

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) { /* quota exceeded — silently ignore */ }
  }

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      var saved = JSON.parse(raw);
      /* Deep-merge: only overwrite keys that exist in default state */
      Object.keys(state).forEach(function(key) {
        if (saved.hasOwnProperty(key)) {
          if (state[key] !== null && typeof state[key] === 'object' && !Array.isArray(state[key])
              && saved[key] !== null && typeof saved[key] === 'object' && !Array.isArray(saved[key])) {
            /* One level deep merge for sub-objects */
            Object.keys(state[key]).forEach(function(subKey) {
              if (saved[key].hasOwnProperty(subKey)) {
                state[key][subKey] = saved[key][subKey];
              }
            });
          } else {
            state[key] = saved[key];
          }
        }
      });
    } catch (e) { /* corrupt data — use defaults */ }
    syncDOMToState();
  }

  function syncDOMToState() {
    /* Page tabs */
    $$('.nav-tab[data-page]').forEach(function(t) {
      t.classList.toggle('active', t.getAttribute('data-page') === state.page);
    });
    $$('.page').forEach(function(p) {
      p.classList.toggle('active', p.id === state.page);
    });
    /* Mode pills */
    $$('.nav-pill-btn[data-mode]').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-mode') === state.mode);
    });
    /* Language pills */
    $$('.nav-pill-btn[data-lang]').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-lang') === state.lang);
    });
    /* Currency select */
    var currSel = $('#currency-select');
    if (currSel) currSel.value = state.currency;
    /* Teacher button */
    var teacherBtn = $('.teacher-btn');
    if (teacherBtn) teacherBtn.classList.toggle('active', state.teacher);
  }

  /* ─── URL STATE SHARING ─── */

  function encodeStateToURL() {
    var params = {
      p: state.price,
      v: state.variableCost,
      fc: state.fixedCosts,
      q: state.volume,
      tp: state.targetProfit,
      tr: state.taxRate,
      m: state.mode,
      l: state.lang,
      c: state.currency,
      cv: state.chartView
    };
    if (state.multiProduct && state.products.length > 1) {
      params.mp = 1;
      params.pr = state.products;
    }
    var json = JSON.stringify(params);
    var encoded = btoa(encodeURIComponent(json).replace(/%([0-9A-F]{2})/g, function(_, p1) { return String.fromCharCode(parseInt(p1, 16)); }));
    return window.location.origin + window.location.pathname + '?s=' + encoded;
  }

  function decodeStateFromURL() {
    var params = new URLSearchParams(window.location.search);
    var s = params.get('s');
    if (!s) return false;
    try {
      var json = decodeURIComponent(atob(s).split('').map(function(c) { return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2); }).join(''));
      var p = JSON.parse(json);
      if (p.p !== undefined) state.price = p.p;
      if (p.v !== undefined) state.variableCost = p.v;
      if (p.fc !== undefined) state.fixedCosts = p.fc;
      if (p.q !== undefined) state.volume = p.q;
      if (p.tp !== undefined) state.targetProfit = p.tp;
      if (p.tr !== undefined) state.taxRate = p.tr;
      if (p.m) state.mode = p.m;
      if (p.l) state.lang = p.l;
      if (p.c) state.currency = p.c;
      if (p.cv) state.chartView = p.cv;
      if (p.mp && p.pr && Array.isArray(p.pr)) {
        // Validate product schema before accepting
        var validProducts = p.pr.filter(function(prod) {
          return prod && typeof prod.price === 'number' && typeof prod.variableCost === 'number' &&
                 typeof prod.mixPct === 'number' && typeof prod.name === 'string' &&
                 isFinite(prod.price) && isFinite(prod.variableCost) && isFinite(prod.mixPct);
        });
        if (validProducts.length > 0) {
          state.multiProduct = true;
          state.products = validProducts;
        }
      }
      /* Clean URL without reload */
      window.history.replaceState({}, '', window.location.pathname);
      return true;
    } catch (e) {
      return false;
    }
  }

  /* ─── PNG EXPORT ─── */

  function exportChartPNG() {
    var svg = $('#chart-area svg');
    if (!svg) return;
    // Clone SVG and set explicit pixel dimensions from viewBox
    var svgClone = svg.cloneNode(true);
    var vb = (svg.getAttribute('viewBox') || '0 0 560 280').split(/\s+/);
    var svgW = parseFloat(vb[2]) || 560;
    var svgH = parseFloat(vb[3]) || 280;
    // Replace percentage dimensions with explicit pixels so Image loads at correct size
    svgClone.setAttribute('width', svgW);
    svgClone.setAttribute('height', svgH);
    svgClone.removeAttribute('style');
    // Add dark background
    var bgRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bgRect.setAttribute('width', '100%');
    bgRect.setAttribute('height', '100%');
    bgRect.setAttribute('fill', '#07090f');
    svgClone.insertBefore(bgRect, svgClone.firstChild);
    // Inline font fallbacks so exported PNG doesn't depend on loaded web fonts
    var textEls = svgClone.querySelectorAll('text');
    for (var ti = 0; ti < textEls.length; ti++) {
      var ff = textEls[ti].getAttribute('font-family') || '';
      if (ff.indexOf('JetBrains') >= 0) textEls[ti].setAttribute('font-family', 'monospace');
      if (ff.indexOf('DM Sans') >= 0) textEls[ti].setAttribute('font-family', 'sans-serif');
      if (ff.indexOf('Fraunces') >= 0) textEls[ti].setAttribute('font-family', 'serif');
    }
    // Add xmlns if missing (required for standalone SVG in data URL)
    if (!svgClone.getAttribute('xmlns')) {
      svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    }
    var svgData = new XMLSerializer().serializeToString(svgClone);
    var scale = 3; // 3x for crisp export (1680x840)
    var canvas = document.createElement('canvas');
    canvas.width = svgW * scale;
    canvas.height = svgH * scale;
    var ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    var img = new Image();
    img.onload = function() {
      ctx.drawImage(img, 0, 0, svgW, svgH);
      canvas.toBlob(function(blob) {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'cvp-chart.png';
        a.click();
      });
    };
    img.src = 'data:image/svg+xml;base64,' + btoa(encodeURIComponent(svgData).replace(/%([0-9A-F]{2})/g, function(_, p1) { return String.fromCharCode(parseInt(p1, 16)); }));
  }

  /* ─── 8. INIT ─── */
  function init() {
    /* Wire page tabs */
    $$('.nav-tab[data-page]').forEach(function(tab) {
      tab.addEventListener('click', function() {
        switchPage(this.getAttribute('data-page'));
      });
    });

    /* Wire mode toggle */
    $$('.nav-pill-btn[data-mode]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        $$('.nav-pill-btn[data-mode]').forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        state.mode = this.getAttribute('data-mode');
        buildAll();
        saveState();
      });
    });

    /* Wire language toggle */
    $$('.nav-pill-btn[data-lang]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        $$('.nav-pill-btn[data-lang]').forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        state.lang = this.getAttribute('data-lang');
        buildAll();
        saveState();
      });
    });

    /* Wire currency select */
    var currSel = $('#currency-select');
    if (currSel) {
      currSel.addEventListener('change', function() {
        state.currency = this.value;
        buildAll();
        saveState();
      });
    }

    /* Wire teacher button */
    var teacherBtn = $('.teacher-btn');
    if (teacherBtn) {
      teacherBtn.addEventListener('click', function() {
        state.teacher = !state.teacher;
        this.classList.toggle('active', state.teacher);
        buildAll();
        saveState();
      });
    }

    /* Wire presentation mode button */
    var presBtn = $('#pres-btn');
    if (presBtn) {
      presBtn.addEventListener('click', function() {
        document.body.classList.toggle('presentation-mode');
        var active = document.body.classList.contains('presentation-mode');
        presBtn.style.background = active ? 'var(--accent)' : 'none';
        presBtn.style.color = active ? '#fff' : 'var(--text-secondary)';
        presBtn.style.borderColor = active ? 'var(--accent)' : 'var(--border)';
      });
    }

    /* Wire share button */
    var shareBtn = $('#share-btn');
    if (shareBtn) {
      shareBtn.addEventListener('click', function() {
        var url = encodeStateToURL();
        navigator.clipboard.writeText(url).then(function() {
          shareBtn.textContent = '\u2713 ' + T('nav.copied');
          shareBtn.classList.add('copied');
          setTimeout(function() {
            shareBtn.textContent = '\ud83d\udd17 ' + T('nav.share');
            shareBtn.classList.remove('copied');
          }, 2000);
        }).catch(function() {
          /* Fallback: select from prompt */
          prompt(T('nav.share'), url);
        });
      });
    }

    /* Decode URL state BEFORE loadState — URL params take priority */
    var fromURL = decodeStateFromURL();

    /* Load persisted state (skipped if URL state was decoded) */
    if (!fromURL) {
      loadState();
    } else {
      syncDOMToState();
    }

    /* Restore persisted panel sizes */
    if (state.leftWidth) {
      var lp = document.getElementById('left-panel');
      if (lp) { lp.style.width = state.leftWidth + 'px'; lp.style.minWidth = state.leftWidth + 'px'; }
    }
    if (state.rightWidth) {
      var rp = document.getElementById('right-panel');
      if (rp) { rp.style.width = state.rightWidth + 'px'; rp.style.minWidth = state.rightWidth + 'px'; }
    }
    if (state.chartRatio) {
      var ca = document.getElementById('chart-area');
      var cp = document.getElementById('center-panel');
      if (ca && cp) {
        var cpH = cp.getBoundingClientRect().height;
        if (cpH > 0) {
          ca.style.flex = '0 0 ' + (state.chartRatio * cpH) + 'px';
        }
      }
    }

    buildAll();
    initResizers();
  }

  /* ─── 10. PUBLIC API ─── */
  var api = {
    state: state,
    T: T,
    fmtCurrency: fmtCurrency,
    fmtNumber: fmtNumber,
    fmtPct: fmtPct,
    fmtUnits: fmtUnits,
    fmtUnitsCeil: fmtUnitsCeil,
    $: $,
    $$: $$,
    el: el,
    compute: compute,
    buildAll: buildAll,
    results: function() { return results; },
    whatIfResults: function() { return whatIfResults; },
    multiResults: function() { return multiResults; },
    saveState: saveState,
    encodeStateToURL: encodeStateToURL,
    exportChartPNG: exportChartPNG
  };

  /* ─── 11. AUTO-INIT ─── */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  return api;
})();
</script>

</body>
