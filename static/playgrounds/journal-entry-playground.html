<script>
const JEStatements = (() => {
  'use strict';

  function sumByFsLine(tb, fsLines, accountType) {
    let total = 0;
    tb.forEach(row => {
      if (fsLines.includes(row.account.fsLine) && (!accountType || row.account.type === accountType)) {
        total += row.balance;
      }
    });
    return total;
  }

  function sumByType(tb, type) {
    let total = 0;
    tb.forEach(row => {
      if (row.account.type === type) total += row.balance;
    });
    return total;
  }

  function sumByFsLineDetailed(tb, fsLine) {
    const lines = [];
    tb.forEach(row => {
      if (row.account.fsLine === fsLine && row.balance !== 0) {
        lines.push({ accountKey: row.accountKey, account: row.account, amount: row.balance });
      }
    });
    return lines;
  }

  /* ─── INCOME STATEMENT ─── */
  function buildIncomeStatement(tb, fw) {
    const revenue = sumByType(tb, 'revenue');
    const expenses = sumByType(tb, 'expense');
    const netIncome = revenue - expenses;

    if (fw === 'ohada' || fw === 'pcg') {
      /* SYSCOHADA / PCG cascade */
      const sales = sumByFsLine(tb, ['revenue']);
      const prodStockVar = sumByFsLine(tb, ['prodStockVar']);
      const subsidies = sumByFsLine(tb, ['subsidies']);
      const otherOpRev = sumByFsLine(tb, ['otherOpRev']);
      const cogs = sumByFsLine(tb, ['cogs']);
      const otherOpex = sumByFsLine(tb, ['otherOpex']);
      const staffCosts = sumByFsLine(tb, ['staffCosts']);
      const depreciation = sumByFsLine(tb, ['depreciation']);
      const provisions = sumByFsLine(tb, ['provisions']);
      const financeIncome = sumByFsLine(tb, ['financeIncome']);
      const financeCosts = sumByFsLine(tb, ['financeCosts']);
      const exceptionalIncome = sumByFsLine(tb,['exceptional'], 'revenue');
      const exceptionalExpense = sumByFsLine(tb,['exceptional'], 'expense');
      const exceptionalResult = exceptionalIncome - exceptionalExpense;
      const incomeTax = sumByFsLine(tb, ['incomeTax']);

      const turnover = sales + prodStockVar + subsidies + otherOpRev;
      const grossMargin = turnover - cogs;
      const valueAdded = grossMargin - otherOpex;
      const ebitda = valueAdded - staffCosts;
      const ebit = ebitda - depreciation - provisions;
      const financialResult = financeIncome - financeCosts;
      const ordinaryResult = ebit + financialResult;
      const profitBeforeTax = ordinaryResult + exceptionalResult;
      const netResult = profitBeforeTax - incomeTax;

      return {
        format: 'cascade',
        sections: [
          { label: 'Chiffre d\'affaires', labelEn: 'Turnover', amount: turnover, type: 'subtotal' },
          { label: 'Achats consommés', labelEn: 'Cost of Sales', amount: -cogs, type: 'line', indent: true },
          { label: 'Marge brute', labelEn: 'Gross Margin', amount: grossMargin, type: 'subtotal' },
          { label: 'Autres charges externes', labelEn: 'Other Operating Expenses', amount: -otherOpex, type: 'line', indent: true },
          { label: 'Valeur ajoutée', labelEn: 'Value Added', amount: valueAdded, type: 'subtotal' },
          { label: 'Charges de personnel', labelEn: 'Staff Costs', amount: -staffCosts, type: 'line', indent: true },
          { label: 'EBE / EBITDA', labelEn: 'EBITDA', amount: ebitda, type: 'subtotal' },
          { label: 'Dotations aux amort./prov.', labelEn: 'Depreciation & Provisions', amount: -(depreciation + provisions), type: 'line', indent: true },
          { label: 'Résultat d\'exploitation', labelEn: 'Operating Result (EBIT)', amount: ebit, type: 'subtotal' },
          { label: 'Produits financiers', labelEn: 'Finance Income', amount: financeIncome, type: 'line', indent: true },
          { label: 'Charges financières', labelEn: 'Finance Costs', amount: -financeCosts, type: 'line', indent: true },
          { label: 'Résultat financier', labelEn: 'Financial Result', amount: financialResult, type: 'subtotal' },
          { label: 'Résultat des activités ordinaires', labelEn: 'Ordinary Result', amount: ordinaryResult, type: 'subtotal' },
          { label: 'Produits HAO', labelEn: 'Exceptional Income', amount: exceptionalIncome, type: 'line', indent: true },
          { label: 'Charges HAO', labelEn: 'Exceptional Expenses', amount: -exceptionalExpense, type: 'line', indent: true },
          { label: 'Résultat HAO', labelEn: 'Exceptional Result', amount: exceptionalResult, type: 'subtotal' },
          { label: 'Résultat avant impôt', labelEn: 'Profit Before Tax', amount: profitBeforeTax, type: 'subtotal' },
          { label: 'Impôt sur le bénéfice', labelEn: 'Income Tax', amount: -incomeTax, type: 'line', indent: true },
          { label: 'Résultat net', labelEn: 'Net Result', amount: netResult, type: 'grand-total' }
        ],
        netIncome: netResult
      };
    } else {
      /* IFRS / US GAAP by-function */
      const totalRevenue = revenue;
      const cogsAmt = sumByFsLine(tb, ['cogs']);
      const grossProfit = totalRevenue - cogsAmt;
      const opex = sumByFsLine(tb, ['otherOpex', 'staffCosts']);
      const depr = sumByFsLine(tb, ['depreciation', 'provisions']);
      const opProfit = grossProfit - opex - depr;
      const finIncome = sumByFsLine(tb, ['financeIncome']);
      const finCosts = sumByFsLine(tb, ['financeCosts']);
      const otherIncome = sumByFsLine(tb,['exceptional'], 'revenue');
      const otherExpense = sumByFsLine(tb,['exceptional'], 'expense');
      const pbt = opProfit + finIncome - finCosts + otherIncome - otherExpense;
      const tax = sumByFsLine(tb, ['incomeTax']);
      const ni = pbt - tax;

      const sections = [
        { label: 'Revenue', labelEn: 'Revenue', amount: totalRevenue, type: 'subtotal' },
        { label: 'Cost of Sales', labelEn: 'Cost of Sales', amount: -cogsAmt, type: 'line', indent: true },
        { label: 'Gross Profit', labelEn: 'Gross Profit', amount: grossProfit, type: 'subtotal' },
        { label: 'Operating Expenses', labelEn: 'Operating Expenses', amount: -opex, type: 'line', indent: true },
        { label: 'Depreciation & Amortisation', labelEn: 'Depreciation & Amortisation', amount: -depr, type: 'line', indent: true },
        { label: 'Operating Profit', labelEn: 'Operating Profit', amount: opProfit, type: 'subtotal' },
        { label: 'Finance Income', labelEn: 'Finance Income', amount: finIncome, type: 'line', indent: true },
        { label: 'Finance Costs', labelEn: 'Finance Costs', amount: -finCosts, type: 'line', indent: true },
      ];
      if (otherIncome > 0 || otherExpense > 0) {
        sections.push({ label: 'Other Income', labelEn: 'Other Income', amount: otherIncome, type: 'line', indent: true });
        sections.push({ label: 'Other Expenses', labelEn: 'Other Expenses', amount: -otherExpense, type: 'line', indent: true });
      }
      sections.push(
        { label: 'Profit Before Tax', labelEn: 'Profit Before Tax', amount: pbt, type: 'subtotal' },
        { label: 'Income Tax', labelEn: 'Income Tax', amount: -tax, type: 'line', indent: true },
        { label: 'Net Income', labelEn: 'Net Income', amount: ni, type: 'grand-total' }
      );

      return {
        format: 'by-function',
        sections,
        netIncome: ni
      };
    }
  }

  /* ─── BALANCE SHEET ─── */
  function buildBalanceSheet(tb, netIncome, fw) {
    const ncAssets = [], cAssets = [], ncLiab = [], cLiab = [], equity = [];
    tb.forEach(row => {
      const a = row.account;
      if (a.type === 'revenue' || a.type === 'expense') return;
      const item = { accountKey: row.accountKey, account: a, amount: row.balance };
      if (a.type === 'asset') {
        if (a.subType === 'noncurrent') ncAssets.push(item);
        else cAssets.push(item);
      } else if (a.type === 'liability') {
        if (a.subType === 'noncurrent') ncLiab.push(item);
        else cLiab.push(item);
      } else if (a.type === 'equity') {
        equity.push(item);
      }
    });

    const totalNcAssets = ncAssets.reduce((s, i) => s + i.amount, 0);
    const totalCAssets = cAssets.reduce((s, i) => s + i.amount, 0);
    const totalAssets = totalNcAssets + totalCAssets;

    const totalNcLiab = ncLiab.reduce((s, i) => s + i.amount, 0);
    const totalCLiab = cLiab.reduce((s, i) => s + i.amount, 0);
    const totalEquity = equity.reduce((s, i) => s + i.amount, 0) + netIncome;
    const totalLiabEquity = totalNcLiab + totalCLiab + totalEquity;

    return {
      ncAssets, cAssets, totalNcAssets, totalCAssets, totalAssets,
      ncLiab, cLiab, totalNcLiab, totalCLiab,
      equity, netIncome, totalEquity,
      totalLiabEquity,
      balanced: Math.abs(totalAssets - totalLiabEquity) < 0.005
    };
  }

  /* ─── CASH FLOW STATEMENT ─── */
  function buildCashFlow(entries, fw) {
    const operating = [], investing = [], financing = [];
    let totalOp = 0, totalInv = 0, totalFin = 0;

    entries.forEach(entry => {
      const hasCash = entry.lines.some(l => JECore.isCashAccount(l.accountKey));
      if (!hasCash) return;

      entry.lines.forEach(line => {
        if (JECore.isCashAccount(line.accountKey)) return;
        const acct = JECore.getAccount(line.accountKey, fw);
        if (!acct) return;
        /* Cash inflow = credit to non-cash account (because debit to cash), outflow = debit to non-cash */
        const amount = (parseFloat(line.credit) || 0) - (parseFloat(line.debit) || 0);
        const cfClass = acct.cfClass || entry.cfClassification || 'operating';
        const item = { account: acct, description: entry.description, amount, date: entry.date };
        if (cfClass === 'investing') { investing.push(item); totalInv += amount; }
        else if (cfClass === 'financing') { financing.push(item); totalFin += amount; }
        else { operating.push(item); totalOp += amount; }
      });
    });

    return {
      operating, investing, financing,
      totalOperating: totalOp,
      totalInvesting: totalInv,
      totalFinancing: totalFin,
      netChange: totalOp + totalInv + totalFin
    };
  }

  /* ─── ACCOUNTING EQUATION ─── */
  function getAccountingEquation(bs) {
    return {
      assets: bs.totalAssets,
      liabilities: bs.totalNcLiab + bs.totalCLiab,
      equity: bs.totalEquity,
      balanced: bs.balanced
    };
  }

  return { buildIncomeStatement, buildBalanceSheet, buildCashFlow, getAccountingEquation };
})();
</script>

<!-- ═══════════════════════════════════════════════════════════
     MODULE: JECharts — Pure SVG Renderers
     ═══════════════════════════════════════════════════════════ -->
<script>
const JECharts = (() => {
  'use strict';

  const SVG_NS = 'http://www.w3.org/2000/svg';
  function el(tag, attrs, text) {
    const e = document.createElementNS(SVG_NS, tag);
    if (attrs) Object.entries(attrs).forEach(([k, v]) => e.setAttribute(k, v));
    if (text !== undefined) e.textContent = text;
    return e;
  }

  function createSVG(w, h) {
    const svg = el('svg', { width: '100%', height: h, viewBox: `0 0 ${w} ${h}`, preserveAspectRatio: 'xMidYMid meet' });
    return svg;
  }

  /* ─── T-ACCOUNT RENDERER ─── */
  function renderTAccount(container, tAccountData, lang, fmt) {
    container.innerHTML = '';
    if (!tAccountData) {
      container.innerHTML = '<div class="empty-state" style="padding:20px"><p style="color:var(--text-muted);font-size:11px">Select an account to view its T-Account</p></div>';
      return;
    }

    const w = 320, h = 240;
    const svg = createSVG(w, h);
    const acct = tAccountData.account;
    const title = lang === 'fr' ? acct.name : acct.nameEn;
    const codeLabel = acct.code !== '-' ? acct.code + ' ' : '';

    /* Title */
    svg.appendChild(el('text', { x: w / 2, y: 20, 'text-anchor': 'middle', fill: '#e2e8f0', 'font-size': '13', 'font-weight': '700', 'font-family': 'DM Sans, sans-serif' }, codeLabel + title));

    /* T shape */
    svg.appendChild(el('line', { x1: 20, y1: 35, x2: w - 20, y2: 35, stroke: '#7c7fff', 'stroke-width': '2' }));
    svg.appendChild(el('line', { x1: w / 2, y1: 35, x2: w / 2, y2: h - 30, stroke: '#7c7fff', 'stroke-width': '2' }));

    /* Headers */
    svg.appendChild(el('text', { x: w / 4, y: 52, 'text-anchor': 'middle', fill: '#60a5fa', 'font-size': '10', 'font-weight': '700', 'font-family': 'DM Sans, sans-serif' }, 'DEBIT'));
    svg.appendChild(el('text', { x: 3 * w / 4, y: 52, 'text-anchor': 'middle', fill: '#34d399', 'font-size': '10', 'font-weight': '700', 'font-family': 'DM Sans, sans-serif' }, 'CREDIT'));

    /* Entries */
    const maxShow = 5;
    const debits = tAccountData.debits.slice(0, maxShow);
    const credits = tAccountData.credits.slice(0, maxShow);

    debits.forEach((e, i) => {
      const y = 70 + i * 22;
      svg.appendChild(el('text', { x: 30, y, fill: '#94a3b8', 'font-size': '10', 'font-family': 'DM Sans, sans-serif' }, e.description.slice(0, 15)));
      svg.appendChild(el('text', { x: w / 2 - 12, y, 'text-anchor': 'end', fill: '#e2e8f0', 'font-size': '11', 'font-weight': '600', 'font-family': 'JetBrains Mono, monospace' }, fmt(e.debit)));
    });

    credits.forEach((e, i) => {
      const y = 70 + i * 22;
      svg.appendChild(el('text', { x: w / 2 + 12, y, fill: '#94a3b8', 'font-size': '10', 'font-family': 'DM Sans, sans-serif' }, e.description.slice(0, 15)));
      svg.appendChild(el('text', { x: w - 30, y, 'text-anchor': 'end', fill: '#e2e8f0', 'font-size': '11', 'font-weight': '600', 'font-family': 'JetBrains Mono, monospace' }, fmt(e.credit)));
    });

    /* Totals line */
    const tY = h - 50;
    svg.appendChild(el('line', { x1: 20, y1: tY, x2: w / 2 - 5, y2: tY, stroke: '#374151', 'stroke-width': '1', 'stroke-dasharray': '4,2' }));
    svg.appendChild(el('line', { x1: w / 2 + 5, y1: tY, x2: w - 20, y2: tY, stroke: '#374151', 'stroke-width': '1', 'stroke-dasharray': '4,2' }));
    svg.appendChild(el('text', { x: w / 2 - 12, y: tY + 16, 'text-anchor': 'end', fill: '#60a5fa', 'font-size': '12', 'font-weight': '700', 'font-family': 'JetBrains Mono, monospace' }, fmt(tAccountData.debitTotal)));
    svg.appendChild(el('text', { x: w - 30, y: tY + 16, 'text-anchor': 'end', fill: '#34d399', 'font-size': '12', 'font-weight': '700', 'font-family': 'JetBrains Mono, monospace' }, fmt(tAccountData.creditTotal)));

    /* Balance */
    const balColor = tAccountData.balance >= 0 ? (tAccountData.normalBalance === 'debit' ? '#60a5fa' : '#34d399') : '#f06070';
    const balSide = tAccountData.normalBalance === 'debit' ? w / 4 : 3 * w / 4;
    svg.appendChild(el('rect', { x: balSide - 50, y: h - 28, width: 100, height: 22, rx: 6, fill: balColor + '22', stroke: balColor, 'stroke-width': '1' }));
    svg.appendChild(el('text', { x: balSide, y: h - 13, 'text-anchor': 'middle', fill: balColor, 'font-size': '11', 'font-weight': '700', 'font-family': 'JetBrains Mono, monospace' }, fmt(Math.abs(tAccountData.balance))));

    container.appendChild(svg);
  }

  /* ─── PIPELINE FLOW DIAGRAM ─── */
  function renderPipelineFlow(container, activeStage, counts) {
    container.innerHTML = '';
    const stages = [
      { key: 'journal', label: 'Journal', icon: '📝', color: '#7c7fff' },
      { key: 'ledger', label: 'Gen. Ledger', icon: '📒', color: '#f5a623' },
      { key: 'trialBalance', label: 'Trial Balance', icon: '⚖️', color: '#34d399' },
      { key: 'incomeStatement', label: 'Income Stmt', icon: '📊', color: '#22d3ee' },
      { key: 'balanceSheet', label: 'Balance Sheet', icon: '🏛️', color: '#a78bfa' },
      { key: 'cashFlow', label: 'Cash Flow', icon: '💰', color: '#f59e0b' }
    ];

    const w = 900, h = 100;
    const svg = createSVG(w, h);
    const boxW = 110, boxH = 56;
    const gap = (w - stages.length * boxW) / (stages.length + 1);

    /* Defs for arrow animation */
    const defs = el('defs');
    stages.forEach((s, i) => {
      if (i < stages.length - 1) {
        const grad = el('linearGradient', { id: `arrow-grad-${i}`, x1: '0%', y1: '0%', x2: '100%', y2: '0%' });
        grad.appendChild(el('stop', { offset: '0%', 'stop-color': stages[i].color }));
        grad.appendChild(el('stop', { offset: '100%', 'stop-color': stages[i + 1].color }));
        defs.appendChild(grad);
      }
    });
    svg.appendChild(defs);

    stages.forEach((s, i) => {
      const x = gap + i * (boxW + gap);
      const y = (h - boxH) / 2;
      const isActive = s.key === activeStage;

      /* Box */
      const g = el('g', { class: 'pipeline-stage-box', 'data-stage': s.key, style: 'cursor:pointer' });
      g.appendChild(el('rect', {
        x, y, width: boxW, height: boxH, rx: 10,
        fill: isActive ? s.color + '22' : '#151823',
        stroke: isActive ? s.color : '#232840',
        'stroke-width': isActive ? '2' : '1'
      }));
      if (isActive) {
        g.appendChild(el('rect', {
          x: x - 2, y: y - 2, width: boxW + 4, height: boxH + 4, rx: 12,
          fill: 'none', stroke: s.color, 'stroke-width': '1', opacity: '0.3'
        }));
      }
      g.appendChild(el('text', { x: x + boxW / 2, y: y + 22, 'text-anchor': 'middle', fill: isActive ? s.color : '#94a3b8', 'font-size': '11', 'font-weight': '700', 'font-family': 'DM Sans, sans-serif' }, s.label));
      const count = counts[s.key] || 0;
      if (count > 0) {
        g.appendChild(el('text', { x: x + boxW / 2, y: y + 42, 'text-anchor': 'middle', fill: '#64748b', 'font-size': '9', 'font-weight': '600', 'font-family': 'JetBrains Mono, monospace' }, String(count)));
      }
      svg.appendChild(g);

      /* Arrow to next */
      if (i < stages.length - 1) {
        const arrowX1 = x + boxW + 4;
        const arrowX2 = gap + (i + 1) * (boxW + gap) - 4;
        const arrowY = h / 2;
        const arrow = el('line', {
          x1: arrowX1, y1: arrowY, x2: arrowX2, y2: arrowY,
          stroke: `url(#arrow-grad-${i})`, 'stroke-width': '2',
          'stroke-dasharray': '6,4',
          style: 'animation: dashFlow 1s linear infinite'
        });
        svg.appendChild(arrow);
        /* Arrowhead */
        svg.appendChild(el('polygon', {
          points: `${arrowX2},${arrowY - 4} ${arrowX2 + 6},${arrowY} ${arrowX2},${arrowY + 4}`,
          fill: stages[i + 1].color
        }));
      }
    });

    container.appendChild(svg);
  }

  /* ─── EQUATION BAR ─── */
  function renderEquationBar(container, eq, fmtFn) {
    if (!container) return;
    /* Use fmtFn (rename to avoid shadowing) for display */
    const aVal = eq.assets || 0;
    const lVal = eq.liabilities || 0;
    const eVal = eq.equity || 0;

    container.setAttribute('data-a', aVal);
    container.setAttribute('data-l', lVal);
    container.setAttribute('data-e', eVal);

    /* Flex proportions: log scale prevents one segment from dominating */
    const logScale = v => Math.max(Math.log10(Math.max(Math.abs(v), 1) + 1), 0.3);
    const aFlex = logScale(aVal);
    const lFlex = logScale(lVal);
    const eFlex = logScale(eVal);

    container.innerHTML = `
      <span class="equation-label">A</span>
      <div class="equation-segment assets" style="flex:${aFlex}">${fmtFn(aVal)}</div>
      <span class="equation-equals">=</span>
      <span class="equation-label">L</span>
      <div class="equation-segment liabilities" style="flex:${lFlex}">${fmtFn(lVal)}</div>
      <span class="equation-plus">+</span>
      <span class="equation-label">E</span>
      <div class="equation-segment equity" style="flex:${eFlex}">${fmtFn(eVal)}</div>
      <span class="equation-check ${eq.balanced ? 'balanced' : 'unbalanced'}">${eq.balanced ? '✓' : '✗'}</span>
    `;
  }

  return { renderTAccount, renderPipelineFlow, renderEquationBar, el, createSVG };
})();
</script>

      solution: 'Debit Dividends Payable (liability ↓). Credit Bank (asset ↓). Both sides of the BS decrease. This is a BS-only transaction.',
      solutionFr: 'Débit Dividendes à payer (passif ↓). Crédit Banque (actif ↓). Les deux côtés du bilan diminuent. Transaction bilan uniquement.',
      teachingPoint: 'Paying dividends reduces both a liability and an asset. Like paying any payable, the equity reduction was already recorded at declaration — no income statement impact.',
      teachingPointFr: 'Payer les dividendes réduit un passif et un actif. La réduction des capitaux propres a déjà été constatée lors de la déclaration — aucun impact sur le compte de résultat.',
      relatedStandards: ['IAS 10', 'SYSCOHADA Art. 30']
    }
  ];

  /* ─── DIFFICULTY & PREREQUISITES ─── */
  const DIFFICULTY_MAP = {
    1: 1, 2: 1, 3: 1, 4: 1, 5: 1, 6: 1, 25: 1,
    7: 2, 8: 2, 9: 2, 10: 2, 11: 2, 12: 2, 13: 2,
    14: 2, 15: 2, 16: 2, 18: 2, 19: 2, 20: 2, 21: 2, 22: 2,
    27: 2, 30: 2, 31: 2, 32: 2, 33: 2,
    17: 3, 23: 3, 24: 3, 26: 3, 28: 3, 29: 3, 34: 3, 35: 3, 36: 3
  };
  const PREREQUISITE_MAP = {
    7: [1, 2], 8: [1], 9: [8],
    10: [2], 11: [10], 12: [10], 13: [10],
    14: [6], 15: [14], 16: [14],
    17: [14, 15],
    18: [7], 19: [18],
    20: [5], 21: [20], 22: [20],
    23: [7], 24: [2, 23],
    25: [1],
    26: [14],
    27: [5],
    28: [7], 29: [28],
    30: [5], 31: [2], 32: [7], 33: [7],
    34: [6], 35: [34], 36: [35]
  };
  SCENARIOS.forEach(s => {
    s.difficulty = DIFFICULTY_MAP[s.id] || 1;
    s.prerequisite = PREREQUISITE_MAP[s.id] || null;
  });

  const LEARNING_PATH = [
    { label: 'Basic (1-6)', labelFr: 'Base (1-6)', ids: [1, 2, 3, 4, 5, 6] },
    { label: 'Revenue (7-9)', labelFr: 'Revenus (7-9)', ids: [7, 8, 9] },
    { label: 'Inventory (10-13)', labelFr: 'Stocks (10-13)', ids: [10, 11, 12, 13] },
    { label: 'Fixed Assets (14-16)', labelFr: 'Immobilisations (14-16)', ids: [14, 15, 16] },
    { label: 'Provisions (18-19)', labelFr: 'Provisions (18-19)', ids: [18, 19] },
    { label: 'Payroll (20-22)', labelFr: 'Paie (20-22)', ids: [20, 21, 22] },
    { label: 'FX (23-24)', labelFr: 'Devises (23-24)', ids: [23, 24] },
    { label: 'Year-End (30-33)', labelFr: 'Clôture (30-33)', ids: [30, 31, 32, 33] },
    { label: 'Equity (34-36)', labelFr: 'Capitaux propres (34-36)', ids: [34, 35, 36] }
  ];

  function getAll() { return SCENARIOS; }
  function getByCategory(cat) {
    if (!cat || cat === 'all') return SCENARIOS;
    return SCENARIOS.filter(s => s.category === cat);
  }
  function getByDifficulty(diff) {
    if (!diff || diff === 0) return SCENARIOS;
    return SCENARIOS.filter(s => s.difficulty === diff);
  }
  function getById(id) { return SCENARIOS.find(s => s.id === id); }

  return { SCENARIOS, CATEGORIES, LEARNING_PATH, getAll, getByCategory, getByDifficulty, getById };
})();
</script>

<!-- ═══════════════════════════════════════════════════════════
     MODULE: JECoA — Chart of Accounts Browsing & Management
     ═══════════════════════════════════════════════════════════ -->
<script>
const JECoA = (() => {
  'use strict';

  /* ═══════════════════════════════════════════════════════════
     DATA FUNCTIONS
     ═══════════════════════════════════════════════════════════ */

  function searchAccounts(query, fw) {
    const all = JECore.getAllAccounts(fw);
    if (!query || !query.trim()) return all;
    const q = query.toLowerCase().trim();
    return all.filter(a =>
      a.code.toLowerCase().includes(q) ||
      a.name.toLowerCase().includes(q) ||
      a.nameFr.toLowerCase().includes(q) ||
      a.type.toLowerCase().includes(q)
    );
  }

  function getAccountDetail(key, fw) {
    const acct = JECore.getAccount(key, fw);
    if (!acct) return null;
    return {
      key: acct.key, code: acct.code, name: acct.name, nameFr: acct.nameFr,
      type: acct.type, normalBalance: acct.normalBalance,
      subType: acct.subType, fsLine: acct.fsLine, cfClass: acct.cfClass,
      parent: acct.parent, isCustom: key.startsWith('custom_')
    };
  }

  function compareAccountAcrossFrameworks(key) {
    const frameworks = ['ohada', 'pcg', 'ifrs', 'usgaap'];
    const labels = { ohada: 'OHADA / SYSCOHADA', pcg: 'French PCG', ifrs: 'IFRS / IAS', usgaap: 'US GAAP' };
    const ohada = JECore.getAccount(key, 'ohada');
    if (!ohada) return null;
    return frameworks.map(fw => {
      const acct = JECore.getAccount(key, fw);
      if (!acct) return { fw, label: labels[fw], code: '—', name: '—', nameFr: '—', note: null };
      const isIdentical = fw !== 'ohada' && acct.code === ohada.code && acct.name === ohada.name;
      return {
        fw, label: labels[fw],
        code: acct.code === '-' ? '—' : acct.code,
        name: acct.name, nameFr: acct.nameFr,
        note: isIdentical ? 'sameAsOhada' : (acct.code === '-' ? 'noCode' : null)
      };
    });
  }

  function countEntriesUsing(key) {
    const entries = JEUI.state.playground.entries;
    let count = 0;
    entries.forEach(e => { if (e.lines.some(l => l.accountKey === key)) count++; });
    return count;
  }

  /* ═══════════════════════════════════════════════════════════
     CUSTOM ACCOUNT CRUD
     ═══════════════════════════════════════════════════════════ */

  const SUBTYPE_OPTIONS = {
    asset: [['ppe','Property, Plant & Equipment'],['intangibles','Intangible Assets'],['tradeReceivables','Trade Receivables'],['otherReceivables','Other Receivables'],['inventory','Inventory'],['cashEquiv','Cash & Equivalents'],['noncurrent','Non-Current Asset']],
    liability: [['ltDebt','Long-Term Debt'],['tradePayables','Trade Payables'],['otherPayables','Other Payables'],['noncurrent','Non-Current Liability']],
    equity: [['equity','Equity']],
    revenue: [['revenue','Revenue'],['otherOpRev','Other Operating Revenue'],['financeIncome','Finance Income'],['exceptional','Exceptional Income']],
    expense: [['cogs','Cost of Goods Sold'],['staffCosts','Staff Costs'],['otherOpex','Other Operating Expense'],['depreciation','Depreciation'],['provisions','Provisions'],['financeCosts','Finance Costs'],['exceptional','Exceptional Expense'],['incomeTax','Income Tax']]
  };

  const FSLINE_OPTIONS = {
    asset: [['ppe','Fixed Assets — PPE'],['intangibles','Fixed Assets — Intangibles'],['tradeReceivables','Current Assets — Trade Receivables'],['otherReceivables','Current Assets — Other Receivables'],['inventory','Current Assets — Inventory'],['cashEquiv','Current Assets — Cash']],
    liability: [['ltDebt','Non-Current — Long-Term Debt'],['tradePayables','Current — Trade Payables'],['otherPayables','Current — Other Payables']],
    equity: [['equity','Equity']],
    revenue: [['revenue','Revenue'],['otherOpRev','Other Operating Revenue'],['financeIncome','Finance Income'],['exceptional','Exceptional Income']],
    expense: [['cogs','Cost of Goods Sold'],['staffCosts','Staff Costs'],['otherOpex','Other Operating Expense'],['depreciation','Depreciation & Amortization'],['provisions','Provisions'],['financeCosts','Finance Costs'],['exceptional','Exceptional Expense'],['incomeTax','Income Tax']]
  };

  function validateCustomAccount(data) {
    const errors = [];
    if (!data.code || !data.code.trim()) errors.push('Code is required');
    if (!data.nameEn || !data.nameEn.trim()) errors.push('English name is required');
    if (!data.nameFr || !data.nameFr.trim()) errors.push('French name is required');
    if (!data.type) errors.push('Type is required');
    if (!data.normalBalance) errors.push('Normal balance is required');
    const allAccounts = JECore.getAllAccounts('ohada');
    const existing = allAccounts.find(a => a.code === data.code.trim() && a.key !== data.existingKey);
    if (existing) errors.push(`Code "${data.code}" is already used by "${existing.name}"`);
    return errors;
  }

  function createCustomAccount(data) {
    const errors = validateCustomAccount(data);
    if (errors.length > 0) return { ok: false, errors };
    const key = 'custom_' + data.code.replace(/[^a-zA-Z0-9]/g, '_');
    JECore.addCustomAccount(key, [
      data.code.trim(), data.nameFr.trim(), data.nameEn.trim(),
      data.type, data.normalBalance,
      data.subType || 'noncurrent', data.fsLine || 'otherOpex',
      data.cfClass || null, ''
    ]);
    return { ok: true, key };
  }

  function editCustomAccount(oldKey, data) {
    const errors = validateCustomAccount({ ...data, existingKey: oldKey });
    if (errors.length > 0) return { ok: false, errors };
    JECore.removeCustomAccount(oldKey);
    const newKey = 'custom_' + data.code.replace(/[^a-zA-Z0-9]/g, '_');
    JECore.addCustomAccount(newKey, [
      data.code.trim(), data.nameFr.trim(), data.nameEn.trim(),
      data.type, data.normalBalance,
      data.subType || 'noncurrent', data.fsLine || 'otherOpex',
      data.cfClass || null, ''
    ]);
    if (newKey !== oldKey) {
      JEUI.state.playground.entries.forEach(e => {
        e.lines.forEach(l => { if (l.accountKey === oldKey) l.accountKey = newKey; });
      });
    }
    return { ok: true, key: newKey };
  }

  function deleteCustomAccount(key) { JECore.removeCustomAccount(key); }
  function resetToDefaults() { JECore.setCustomAccounts({}); }

  /* ═══════════════════════════════════════════════════════════
     TEACHER MODE NOTES
     ═══════════════════════════════════════════════════════════ */

  const TEACHER_NOTES = {
    asset: { en: 'Assets increase on the debit side and decrease on the credit side. They represent resources owned by or owed to the business.', fr: 'Les actifs augmentent au débit et diminuent au crédit. Ils représentent les ressources détenues par l\'entreprise.' },
    liability: { en: 'Liabilities increase on the credit side and decrease on the debit side. They represent obligations the business owes to others.', fr: 'Les passifs augmentent au crédit et diminuent au débit. Ils représentent les obligations de l\'entreprise envers des tiers.' },
    equity: { en: 'Equity increases on the credit side. It represents the owner\'s residual interest after subtracting liabilities from assets.', fr: 'Les capitaux propres augmentent au crédit. Ils représentent l\'intérêt résiduel du propriétaire après déduction des passifs.' },
    revenue: { en: 'Revenue increases on the credit side. It represents income earned from the business\'s primary activities.', fr: 'Les produits augmentent au crédit. Ils représentent les revenus tirés des activités principales de l\'entreprise.' },
    expense: { en: 'Expenses increase on the debit side. They represent the cost of resources consumed to generate revenue.', fr: 'Les charges augmentent au débit. Elles représentent le coût des ressources consommées pour générer des revenus.' }
  };

  /* ═══════════════════════════════════════════════════════════
     RENDERING
     ═══════════════════════════════════════════════════════════ */

  function render(container) {
    const T = JEUI.T;
    const st = JEUI.state.coa;
    const fw = JEUI.state.framework;
    const filtered = searchAccounts(st.searchFilter, fw);
    const tree = JECore.getAccountTree(fw);

    let html = `<h2 style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text-primary);margin:0 0 18px">${T('coa.title')}</h2>`;
    html += renderToolbar(T, st);

    if (st.showAddForm) html += renderAddForm(T, st, fw);

    const filteredKeys = new Set(filtered.map(a => a.key));
    const hasFilter = st.searchFilter && st.searchFilter.trim().length > 0;

    const classKeys = Object.keys(tree).sort();
    let hasAnyMatch = false;
    classKeys.forEach(cls => {
      const group = tree[cls];
      const classAccounts = hasFilter
        ? group.accounts.filter(a => filteredKeys.has(a.key))
        : group.accounts;

      if (hasFilter && classAccounts.length === 0) return;
      hasAnyMatch = true;

      const isOpen = st.expandedClasses.includes(cls) || (hasFilter && classAccounts.length > 0);
      const lang = JEUI.state.lang;
      const label = lang === 'fr' ? group.labelFr : group.label;

      html += `<div class="coa-class-accordion${isOpen ? ' open' : ''}" data-class="${cls}">
        <div class="coa-class-header" data-class="${cls}">
          <span>${label}</span>
          <span style="display:flex;align-items:center;gap:8px">
            <span class="coa-class-count">${classAccounts.length}</span>
            <span class="coa-chevron">▶</span>
          </span>
        </div>
        <div class="coa-class-body">`;

      if (classAccounts.length === 0) {
        html += `<div class="coa-no-results" style="padding:16px;font-size:11px">${T('coa.empty')}</div>`;
      } else {
        classAccounts.forEach(acct => {
          html += renderAccountRow(acct, fw, st, T);
          if (st.expandedAccount === acct.key) html += renderInlineDetail(acct.key, fw, st, T);
        });
      }
      html += `</div></div>`;
    });

    if (!hasAnyMatch && hasFilter) html += `<div class="coa-no-results">${T('coa.noResults')}</div>`;

    container.innerHTML = html;
  }

  function renderToolbar(T, st) {
    return `<div class="coa-toolbar">
      <input type="text" class="coa-search" id="coaSearch" placeholder="${T('coa.search')}" value="${st.searchFilter ? st.searchFilter.replace(/"/g, '&quot;') : ''}">
      <button class="coa-btn${st.compareMode ? ' active' : ''}" id="coaCompareToggle">${T('coa.compare')}</button>
      <button class="coa-btn primary" id="coaAddBtn">${T('coa.addAccount')}</button>
      <button class="coa-btn danger" id="coaResetBtn">${T('coa.reset')}</button>
    </div>`;
  }

  function renderAccountRow(acct, fw, st, T) {
    const lang = JEUI.state.lang;
    const name = lang === 'fr' ? acct.nameFr : acct.name;
    const code = acct.code === '-' ? '—' : acct.code;
    const isCustom = acct.key.startsWith('custom_');
    const isExpanded = st.expandedAccount === acct.key;
    const nbLabel = acct.normalBalance === 'debit' ? 'Dr' : 'Cr';

    let actionsHtml = '';
    if (isCustom) {
      actionsHtml = `<span class="coa-row-actions">
        <button class="edit" data-key="${acct.key}" title="${T('coa.edit')}">✎</button>
        <button class="delete" data-key="${acct.key}" title="${T('coa.delete')}">✕</button>
      </span>`;
    }

    return `<div class="coa-row${isExpanded ? ' expanded' : ''}" data-key="${acct.key}">
      <span class="coa-row-code">${code}</span>
      <span class="coa-row-name">${name}</span>
      <span class="coa-row-type ${acct.type}">${acct.type}</span>
      <span class="coa-row-nb ${acct.normalBalance}">${nbLabel}</span>
      ${actionsHtml}
    </div>`;
  }

  function renderInlineDetail(key, fw, st, T) {
    const detail = getAccountDetail(key, fw);
    if (!detail) return '';
    const lang = JEUI.state.lang;

    if (st.compareMode) return renderCompareTable(key, T, lang);

    let html = `<div class="coa-detail"><div class="coa-detail-grid">
      <div class="coa-detail-item"><div class="coa-detail-label">${T('coa.type')}</div><div class="coa-detail-value">${detail.type}</div></div>
      <div class="coa-detail-item"><div class="coa-detail-label">${T('coa.normalBal')}</div><div class="coa-detail-value">${detail.normalBalance === 'debit' ? 'Debit' : 'Credit'}</div></div>
      <div class="coa-detail-item"><div class="coa-detail-label">${T('coa.subType')}</div><div class="coa-detail-value">${detail.subType || '—'}</div></div>
      <div class="coa-detail-item"><div class="coa-detail-label">${T('coa.fsLine')}</div><div class="coa-detail-value">${detail.fsLine || '—'}</div></div>
      <div class="coa-detail-item"><div class="coa-detail-label">${T('coa.cfClass')}</div><div class="coa-detail-value">${detail.cfClass || '—'}</div></div>
      <div class="coa-detail-item"><div class="coa-detail-label">${T('coa.parent')}</div><div class="coa-detail-value">${detail.parent || '—'}</div></div>
    </div>`;

    if (JEUI.state.teacherMode) {
      const note = TEACHER_NOTES[detail.type];
      if (note) {
        html += `<div class="coa-teacher-note"><strong>${T('coa.teacherNote')}</strong>${lang === 'fr' ? note.fr : note.en}</div>`;
      }
    }
    html += `</div>`;
    return html;
  }

  function renderCompareTable(key, T, lang) {
    const rows = compareAccountAcrossFrameworks(key);
    if (!rows) return '';
    let html = `<div class="coa-detail"><table class="coa-compare-table">
      <thead><tr><th>${T('coa.framework')}</th><th>${T('coa.code')}</th><th>${T('coa.accountName')}</th></tr></thead><tbody>`;
    rows.forEach(r => {
      const name = lang === 'fr' ? (r.nameFr || r.name) : r.name;
      const noteText = r.note ? ` <span class="fw-note">${T('coa.' + r.note)}</span>` : '';
      html += `<tr><td class="fw-name">${r.label}</td><td class="fw-code">${r.code}</td><td>${name}${noteText}</td></tr>`;
    });
    html += `</tbody></table></div>`;
    return html;
  }

  function renderAddForm(T, st, fw) {
    const isEdit = !!st.editingAccount;
    const title = isEdit ? T('coa.editTitle') : T('coa.addTitle');
    let pf = { code: '', nameEn: '', nameFr: '', type: 'asset', normalBalance: 'debit', subType: '', fsLine: '', cfClass: '' };

    if (isEdit) {
      const d = getAccountDetail(st.editingAccount, fw);
      if (d) pf = { code: d.code, nameEn: d.name, nameFr: d.nameFr, type: d.type, normalBalance: d.normalBalance, subType: d.subType || '', fsLine: d.fsLine || '', cfClass: d.cfClass || '' };
    }

    const opt = (arr, sel) => arr.map(([v, l]) => `<option value="${v}"${sel === v ? ' selected' : ''}>${l}</option>`).join('');
    const typeOpts = ['asset','liability','equity','revenue','expense'].map(t => `<option value="${t}"${pf.type === t ? ' selected' : ''}>${t.charAt(0).toUpperCase() + t.slice(1)}</option>`).join('');
    const nbOpts = ['debit','credit'].map(n => `<option value="${n}"${pf.normalBalance === n ? ' selected' : ''}>${n.charAt(0).toUpperCase() + n.slice(1)}</option>`).join('');
    const cfOpts = [['','None'],['operating','Operating'],['investing','Investing'],['financing','Financing']].map(([v, l]) => `<option value="${v}"${(pf.cfClass || '') === v ? ' selected' : ''}>${l}</option>`).join('');

    return `<div class="coa-form"><div class="coa-form-title">${title}</div>
      <div class="coa-form-grid">
        <div class="coa-form-group"><label class="coa-form-label">${T('coa.code')}</label><input type="text" class="ctrl-input" id="coaFormCode" value="${pf.code}"></div>
        <div class="coa-form-group"><label class="coa-form-label">${T('coa.type')}</label><select class="ctrl-select" id="coaFormType">${typeOpts}</select></div>
        <div class="coa-form-group"><label class="coa-form-label">${T('coa.name')} (EN)</label><input type="text" class="ctrl-input" id="coaFormNameEn" value="${pf.nameEn}"></div>
        <div class="coa-form-group"><label class="coa-form-label">${T('coa.name')} (FR)</label><input type="text" class="ctrl-input" id="coaFormNameFr" value="${pf.nameFr}"></div>
        <div class="coa-form-group"><label class="coa-form-label">${T('coa.normalBal')}</label><select class="ctrl-select" id="coaFormNormalBal">${nbOpts}</select></div>
        <div class="coa-form-group"><label class="coa-form-label">${T('coa.subType')}</label><select class="ctrl-select" id="coaFormSubType">${opt(SUBTYPE_OPTIONS[pf.type] || [], pf.subType)}</select></div>
        <div class="coa-form-group"><label class="coa-form-label">${T('coa.fsLine')}</label><select class="ctrl-select" id="coaFormFsLine">${opt(FSLINE_OPTIONS[pf.type] || [], pf.fsLine)}</select></div>
        <div class="coa-form-group"><label class="coa-form-label">${T('coa.cfClass')}</label><select class="ctrl-select" id="coaFormCfClass">${cfOpts}</select></div>
      </div>
      <div id="coaFormError" style="color:var(--error);font-size:11px;margin-top:8px;display:none"></div>
      <div class="coa-form-actions">
        <button class="coa-btn" id="coaFormCancel">${T('coa.cancel')}</button>
        <button class="coa-btn primary" id="coaFormSave">${T('coa.save')}</button>
      </div></div>`;
  }

  /* ═══════════════════════════════════════════════════════════
     EVENT BINDING
     ═══════════════════════════════════════════════════════════ */

  function bindEvents(container) {
    const st = JEUI.state.coa;
    const rerender = () => { render(container); bindEvents(container); };

    /* Search */
    const searchEl = document.getElementById('coaSearch');
    if (searchEl) {
      searchEl.addEventListener('input', e => {
        const pos = e.target.selectionStart;
        st.searchFilter = e.target.value;
        rerender();
        const el = document.getElementById('coaSearch');
        if (el) { el.focus(); el.selectionStart = el.selectionEnd = pos; }
      });
    }

    /* Compare toggle */
    const compareBtn = document.getElementById('coaCompareToggle');
    if (compareBtn) compareBtn.addEventListener('click', () => { st.compareMode = !st.compareMode; rerender(); saveCoaState(); });

    /* Add account button */
    const addBtn = document.getElementById('coaAddBtn');
    if (addBtn) addBtn.addEventListener('click', () => { st.showAddForm = !st.showAddForm; st.editingAccount = null; rerender(); });

    /* Reset button */
    const resetBtn = document.getElementById('coaResetBtn');
    if (resetBtn) resetBtn.addEventListener('click', () => {
      const n = Object.keys(JECore.getCustomAccounts()).length;
      if (n === 0) return;
      if (confirm(JEUI.T('coa.confirmReset').replace('{n}', n))) { resetToDefaults(); rerender(); saveCoaState(); }
    });

    /* Class accordion headers */
    container.querySelectorAll('.coa-class-header').forEach(h => {
      h.addEventListener('click', () => {
        const cls = h.dataset.class;
        const idx = st.expandedClasses.indexOf(cls);
        if (idx >= 0) st.expandedClasses.splice(idx, 1); else st.expandedClasses.push(cls);
        rerender();
      });
    });

    /* Account row click → expand/collapse */
    container.querySelectorAll('.coa-row').forEach(row => {
      row.addEventListener('click', e => {
        if (e.target.closest('.coa-row-actions')) return;
        const key = row.dataset.key;
        st.expandedAccount = st.expandedAccount === key ? null : key;
        rerender();
      });
    });

    /* Edit custom account */
    container.querySelectorAll('.coa-row-actions .edit').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); st.editingAccount = btn.dataset.key; st.showAddForm = true; rerender(); });
    });

    /* Delete custom account */
    container.querySelectorAll('.coa-row-actions .delete').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const key = btn.dataset.key;
        const used = countEntriesUsing(key);
        let msg = JEUI.T('coa.confirmDel');
        if (used > 0) msg += '\n\n' + JEUI.T('coa.usedInEntries').replace('{n}', used);
        if (confirm(msg)) { deleteCustomAccount(key); if (st.expandedAccount === key) st.expandedAccount = null; rerender(); saveCoaState(); }
      });
    });

    /* Form: type change → auto-update normal balance + dropdowns */
    const formType = document.getElementById('coaFormType');
    if (formType) formType.addEventListener('change', () => {
      const type = formType.value;
      const nb = document.getElementById('coaFormNormalBal');
      if (nb) nb.value = ['asset', 'expense'].includes(type) ? 'debit' : 'credit';
      const stEl = document.getElementById('coaFormSubType');
      if (stEl) stEl.innerHTML = (SUBTYPE_OPTIONS[type] || []).map(([v, l]) => `<option value="${v}">${l}</option>`).join('');
      const flEl = document.getElementById('coaFormFsLine');
      if (flEl) flEl.innerHTML = (FSLINE_OPTIONS[type] || []).map(([v, l]) => `<option value="${v}">${l}</option>`).join('');
    });

    /* Form: cancel */
    const cancelBtn = document.getElementById('coaFormCancel');
    if (cancelBtn) cancelBtn.addEventListener('click', () => { st.showAddForm = false; st.editingAccount = null; rerender(); });

    /* Form: save */
    const saveBtn = document.getElementById('coaFormSave');
    if (saveBtn) saveBtn.addEventListener('click', () => {
      const data = {
        code: (document.getElementById('coaFormCode').value || '').trim(),
        nameEn: (document.getElementById('coaFormNameEn').value || '').trim(),
        nameFr: (document.getElementById('coaFormNameFr').value || '').trim(),
        type: document.getElementById('coaFormType').value,
        normalBalance: document.getElementById('coaFormNormalBal').value,
        subType: document.getElementById('coaFormSubType').value,
        fsLine: document.getElementById('coaFormFsLine').value,
        cfClass: document.getElementById('coaFormCfClass').value || null
      };
      const result = st.editingAccount ? editCustomAccount(st.editingAccount, data) : createCustomAccount(data);
      if (!result.ok) {
        const errEl = document.getElementById('coaFormError');
        if (errEl) { errEl.textContent = result.errors.join('. '); errEl.style.display = 'block'; }
        return;
      }
      st.showAddForm = false; st.editingAccount = null;
      rerender(); saveCoaState();
    });
  }

  function saveCoaState() { JEUI.saveState(); }

  /* ═══════════════════════════════════════════════════════════
     PUBLIC API
     ═══════════════════════════════════════════════════════════ */

  return { render, bindEvents, resetToDefaults };
})();
</script>
