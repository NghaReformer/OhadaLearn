     ═══════════════════════════════════════════════════════════ */
  function showFlash(msg, type) {
    const el = document.createElement('div');
    el.className = 'flash-msg';
    if (type === 'success') el.style.background = 'var(--green)';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 2000);
  }

  /* ═══════════════════════════════════════════════════════════
     HELPERS
     ═══════════════════════════════════════════════════════════ */
  function T(key) { return (I18N[state.lang] && I18N[state.lang][key]) || I18N.en[key] || key; }

  let _nfCache = null, _nfLang = null;
  function fmt(n) {
    if (n === 0 || n === undefined || n === null) return '—';
    if (_nfLang !== state.lang) {
      _nfLang = state.lang;
      _nfCache = new Intl.NumberFormat(state.lang === 'fr' ? 'fr-FR' : 'en-US', { maximumFractionDigits: 0 });
    }
    const abs = Math.abs(n);
    return (n < 0 ? '-' : '') + _nfCache.format(abs);
  }

  function fmtCurrency(n) {
    if (n === 0 || n === undefined || n === null) return '—';
    return fmt(n) + ' ' + state.currency;
  }

  function acctName(acct) {
    if (!acct) return '';
    return state.lang === 'fr' ? acct.name : acct.nameEn;
  }

  function acctLabel(acct) {
    if (!acct) return '';
    const name = acctName(acct);
    if (state.mode === 'advanced' && acct.code !== '-') return acct.code + ' — ' + name;
    return name;
  }

  /* ═══════════════════════════════════════════════════════════
     NAVIGATION
     ═══════════════════════════════════════════════════════════ */
  function switchPage(page) {
    state.activePage = page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.page === page));
    buildAll();
    saveState();
  }

  function switchMode(mode) {
    state.mode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    buildAll();
    saveState();
  }

  function switchLang(lang) {
    state.lang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    /* Update nav tab labels */
    document.querySelectorAll('.nav-tab').forEach(t => { t.textContent = T('nav.' + t.dataset.page); });
    document.querySelectorAll('.mode-btn').forEach(b => { b.textContent = T('mode.' + b.dataset.mode); });
    document.getElementById('teacherBtn').textContent = T('teacher');
    /* Update mobile tab labels */
    document.querySelectorAll('.mobile-tab').forEach(t => { t.textContent = T('mobile.' + t.dataset.mtab); });
    buildAll();
    saveState();
  }

  function switchFramework(fw) {
    state.framework = fw;
    document.getElementById('frameworkSelect').value = fw;
    buildAll();
    saveState();
  }

  function toggleTeacher() {
    state.teacherMode = !state.teacherMode;
    document.getElementById('teacherBtn').classList.toggle('active', state.teacherMode);
    buildAll();
    saveState();
  }

  /* ═══════════════════════════════════════════════════════════
     PERSISTENCE
     ═══════════════════════════════════════════════════════════ */
  const STORAGE_KEY = 'journalEntryPlayground_v1';
  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        mode: state.mode, teacherMode: state.teacherMode, lang: state.lang,
        activePage: state.activePage, currency: state.currency, framework: state.framework,
        playground: {
          activeStage: state.playground.activeStage,
          entries: state.playground.entries,
          draft: state.playground.draft,
          editingEntryId: state.playground.editingEntryId,
          lastLoadedScenarioId: state.playground.lastLoadedScenarioId,
          mobileTab: state.playground.mobileTab,
          selectedAccount: state.playground.selectedAccount,
          selectedEntryId: state.playground.selectedEntryId,
          filter: state.playground.filter,
          tbFormat: state.playground.tbFormat
        },
        customAccounts: JECore.getCustomAccounts(),
        scenariosProgress: state.scenarios.progress,
        coa: { searchFilter: state.coa.searchFilter, expandedClasses: state.coa.expandedClasses, compareMode: state.coa.compareMode },
        tutorialDismissed: state.tutorialDismissed
      }));
    } catch (e) { /* quota exceeded — ignore */ }
  }

  function loadState() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (saved) {
        if (saved.mode) state.mode = saved.mode;
        if (saved.teacherMode !== undefined) state.teacherMode = saved.teacherMode;
        if (saved.lang) state.lang = saved.lang;
        if (saved.activePage) state.activePage = saved.activePage;
        if (saved.currency) state.currency = saved.currency;
        if (saved.framework) state.framework = saved.framework;
        if (saved.playground) {
          if (saved.playground.entries) state.playground.entries = saved.playground.entries;
          if (saved.playground.activeStage) state.playground.activeStage = saved.playground.activeStage;
          if (saved.playground.draft && saved.playground.draft.lines && saved.playground.draft.lines.length >= 2) {
            state.playground.draft = saved.playground.draft;
          }
          if (saved.playground.editingEntryId) state.playground.editingEntryId = saved.playground.editingEntryId;
          if (saved.playground.lastLoadedScenarioId) state.playground.lastLoadedScenarioId = saved.playground.lastLoadedScenarioId;
          if (saved.playground.mobileTab) state.playground.mobileTab = saved.playground.mobileTab;
          if (saved.playground.tbFormat) state.playground.tbFormat = saved.playground.tbFormat;
        }
        if (saved.customAccounts) JECore.setCustomAccounts(saved.customAccounts);
        if (saved.scenariosProgress) state.scenarios.progress = saved.scenariosProgress;
        if (saved.tutorialDismissed !== undefined) state.tutorialDismissed = saved.tutorialDismissed;
        if (saved.coa) {
          if (saved.coa.searchFilter !== undefined) state.coa.searchFilter = saved.coa.searchFilter;
          if (saved.coa.expandedClasses) state.coa.expandedClasses = saved.coa.expandedClasses;
          if (saved.coa.compareMode !== undefined) state.coa.compareMode = saved.coa.compareMode;
        }
      }
    } catch (e) { /* corrupted data — ignore */ }
  }

  /* ═══════════════════════════════════════════════════════════
     PIPELINE COMPUTATION
     ═══════════════════════════════════════════════════════════ */
  let _ledger = new Map();
  let _tb = [];
  let _is = null;
  let _bs = null;
  let _cf = null;
  let _eq = { assets: 0, liabilities: 0, equity: 0, balanced: true };

  function recomputePipeline() {
    const fw = state.framework;
    const entries = state.playground.entries;
    _ledger = JELedger.buildLedger(entries, fw);
    _tb = JELedger.buildTrialBalance(_ledger);
    _is = JEStatements.buildIncomeStatement(_tb, fw);
    _bs = JEStatements.buildBalanceSheet(_tb, _is.netIncome, fw);
    _cf = JEStatements.buildCashFlow(entries, fw);
    _eq = JEStatements.getAccountingEquation(_bs);
  }

  /* ═══════════════════════════════════════════════════════════
     RENDER: LEFT PANEL (Entry Form)
     ═══════════════════════════════════════════════════════════ */
  function renderLeftPanel() {
    const panel = document.getElementById('leftPanel');
    const draft = state.playground.draft;

    let html = '';

    /* ── Entry Form (Primary) ── */
    html += `
      <div class="panel-section" style="border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <div style="width:4px;height:20px;border-radius:2px;background:linear-gradient(180deg,var(--accent),#8b5cf6)"></div>
          <div class="panel-section-title" style="margin:0;font-size:11px">${state.playground.editingEntryId ? T('play.editing') : T('play.newEntry')}</div>
        </div>
        <div class="input-group">
          <input type="date" class="ctrl-input" id="draftDate" value="${draft.date}">
        </div>
        <div class="input-group">
          <input type="text" class="ctrl-input" id="draftDesc" placeholder="${T('play.description')}" value="${draft.description}">
        </div>
      </div>
      <div class="panel-section">
        <div class="panel-section-title">${T('play.account')} Lines</div>
        <div class="je-form">
          <table class="je-lines-table">
            <thead><tr>
              <th>${T('play.account')}</th>
              <th>${T('play.debit')}</th>
              <th>${T('play.credit')}</th>
              <th></th>
            </tr></thead>
            <tbody id="draftLines">
    `;

    draft.lines.forEach((line, i) => {
      const acct = line.accountKey ? JECore.getAccount(line.accountKey, state.framework) : null;
      const displayName = acct ? acctLabel(acct) : '';
      const normalBalBadge = (state.teacherMode && acct) ? `<span class="normal-bal-indicator ${acct.normalBalance}">${T('teacher.normalBal')}: ${acct.normalBalance}</span>` : '';
      html += `
        <tr data-idx="${i}">
          <td>
            <div class="account-picker-wrap">
              <input type="text" class="account-picker-input" data-idx="${i}" placeholder="${T('search.placeholder')}" value="${displayName}" autocomplete="off">
              <div class="account-picker-dropdown" id="picker-${i}"></div>
            </div>
            ${normalBalBadge}
            <div id="playground-warn-${i}"></div>
          </td>
          <td><input type="number" min="0" data-idx="${i}" data-field="debit" value="${line.debit || ''}" placeholder="0"></td>
          <td><input type="number" min="0" data-idx="${i}" data-field="credit" value="${line.credit || ''}" placeholder="0"></td>
          <td>${draft.lines.length > 2 ? `<button class="remove-line" data-idx="${i}">×</button>` : ''}</td>
        </tr>
      `;
    });

    const totalDebit = draft.lines.reduce((s, l) => s + (parseFloat(l.debit) || 0), 0);
    const totalCredit = draft.lines.reduce((s, l) => s + (parseFloat(l.credit) || 0), 0);
    const isBalanced = Math.abs(totalDebit - totalCredit) < 0.005 && totalDebit > 0;
    const diff = totalDebit - totalCredit;
    const diffAbs = Math.abs(diff);

    html += `
            </tbody>
          </table>
          <button class="add-line-btn" id="addLineBtn">${T('play.addLine')}</button>
          <div class="draft-diff-bar" id="draftDiffBar">
            <span>${T('draft.debit')}: <strong>${fmt(totalDebit)}</strong></span>
            <span>${T('draft.credit')}: <strong>${fmt(totalCredit)}</strong></span>
            <span class="${isBalanced ? 'diff-balanced' : 'diff-unbalanced'}">${T('draft.diff')}: ${isBalanced ? '0' : fmt(diff)}</span>
          </div>`;

    if (!isBalanced && (totalDebit > 0 || totalCredit > 0)) {
      const side = diff > 0 ? (state.lang === 'fr' ? 'crédit' : 'credit') : (state.lang === 'fr' ? 'débit' : 'debit');
      html += `<div class="draft-diff-hint">${T('draft.needMore').replace('{amt}', fmt(diffAbs)).replace('{side}', side)}</div>`;
    }

    html += `
          <div class="je-totals">
            <span>${T('play.totalDebit')}: <strong>${fmt(totalDebit)}</strong></span>
            <span>${T('play.totalCredit')}: <strong>${fmt(totalCredit)}</strong></span>
            <span class="${isBalanced ? 'balanced' : 'unbalanced'}">${isBalanced ? T('play.balanced') : T('play.unbalanced')}</span>
          </div>
          ${state.playground.editingEntryId
            ? `<div style="display:flex;gap:6px;margin-top:10px">
                <button class="post-btn" id="postBtn" style="flex:1" ${isBalanced ? '' : 'disabled'}>${T('play.post')}</button>
                <button class="post-btn" id="cancelEditBtn" style="flex:0 0 auto;background:#334155;padding:10px 16px">${T('play.cancelEdit')}</button>
              </div>`
            : `<button class="post-btn" id="postBtn" ${isBalanced ? '' : 'disabled'}>${T('play.post')}</button>`
          }
        </div>
      </div>
    `;

    /* Posted entries list */
    html += `<div class="panel-section">
      <div class="panel-section-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>${T('play.postedEntries')} (${state.playground.entries.length})</span>
        <span style="display:flex;gap:6px;align-items:center">
          <button id="undoBtn" style="border:none;background:transparent;color:var(--accent);cursor:pointer;font-size:10px;font-weight:700;opacity:${_undoStack.length > 0 ? '1' : '0.3'}" ${_undoStack.length === 0 ? 'disabled' : ''}>${T('play.undo')}</button>
          ${state.playground.entries.length > 0 ? `<button id="clearAllBtn" style="border:none;background:transparent;color:var(--error);cursor:pointer;font-size:10px;font-weight:700">${T('play.clearAll')}</button>` : ''}
        </span>
      </div>
      <div class="entries-list">`;

    if (state.playground.entries.length === 0) {
      html += `<div style="font-size:11px;color:var(--text-muted);padding:10px 0">${T('play.noEntries')}</div>`;
    } else {
      state.playground.entries.slice().reverse().forEach(entry => {
        const isSelected = state.playground.selectedEntryId === entry.id;
        const isEditing = state.playground.editingEntryId === entry.id;
        html += `
          <div class="entry-card ${isSelected ? 'selected' : ''} ${isEditing ? 'editing' : ''}" data-id="${entry.id}" data-editing-label="${T('play.editing')}">
            <div class="entry-card-header">
              <span class="entry-card-date">${entry.date}</span>
              ${!isEditing ? `<div class="entry-card-actions">
                <button class="edit-entry-btn" data-id="${entry.id}" title="${T('play.edit')}">✏️</button>
                <button class="delete-btn" data-id="${entry.id}" title="Delete">🗑</button>
              </div>` : ''}
            </div>
            <div class="entry-card-desc">${state.lang === 'fr' && entry.descriptionFr ? entry.descriptionFr : entry.description}</div>
            <div class="entry-card-lines">
              ${entry.lines.map(l => {
                const a = JECore.getAccount(l.accountKey, state.framework);
                return a ? `<div style="display:flex;justify-content:space-between;padding:2px 0">
                  <span>${l.debit > 0 ? '' : '    '}${acctName(a)}</span>
                  <span class="entry-card-amount">${l.debit > 0 ? fmt(l.debit) : fmt(l.credit)}</span>
                </div>` : '';
              }).join('')}
            </div>
          </div>
        `;
      });
    }

    html += `</div></div>`;

    /* ── Link to CoA tab (custom account management moved there) ── */
    html += `<div class="panel-section" style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px">
      <button class="toggle-custom-form-btn" onclick="JEUI.switchPage('coa')" style="opacity:.7;font-size:10px">
        ${T('nav.coa')} →
      </button>
    </div>`;

    /* Preserve the resize handle — re-append after innerHTML set */
    panel.innerHTML = html + '<div class="resize-handle left-handle" id="leftResizeHandle"></div>';
    bindLeftPanelEvents();
  }

  function bindLeftPanelEvents() {
    /* Date & description */
    const dateEl = document.getElementById('draftDate');
    const descEl = document.getElementById('draftDesc');
    if (dateEl) dateEl.addEventListener('change', e => { state.playground.draft.date = e.target.value; });
    if (descEl) descEl.addEventListener('input', e => { state.playground.draft.description = e.target.value; });

    /* Account pickers */
    document.querySelectorAll('.account-picker-input').forEach(input => {
      const idx = parseInt(input.dataset.idx);
      input.addEventListener('focus', () => openAccountPicker(idx, input.value));
      input.addEventListener('input', () => openAccountPicker(idx, input.value));
      input.addEventListener('keydown', e => handlePickerKeyboard(e, idx));
    });

    /* Debit/credit inputs */
    document.querySelectorAll('.je-lines-table input[type="number"]').forEach(input => {
      input.addEventListener('input', e => {
        const idx = parseInt(e.target.dataset.idx);
        const field = e.target.dataset.field;
        const val = parseFloat(e.target.value) || 0;
        /* Reject negative values */
        if (val < 0) {
          e.target.value = 0;
          state.playground.draft.lines[idx][field] = 0;
          showFlash(T('play.negativeRejected'));
          updateTotals();
          return;
        }
        state.playground.draft.lines[idx][field] = val;
        /* Auto-clear the other field */
        if (field === 'debit' && parseFloat(e.target.value) > 0) {
          state.playground.draft.lines[idx].credit = 0;
          const creditInput = e.target.closest('tr').querySelector('input[data-field="credit"]');
          if (creditInput) creditInput.value = '';
        } else if (field === 'credit' && parseFloat(e.target.value) > 0) {
          state.playground.draft.lines[idx].debit = 0;
          const debitInput = e.target.closest('tr').querySelector('input[data-field="debit"]');
          if (debitInput) debitInput.value = '';
        }
        updateTotals();
        /* Semantic warnings */
        const line = state.playground.draft.lines[idx];
        if (line.accountKey) {
          const side = (parseFloat(line.debit) || 0) > 0 ? 'debit' : ((parseFloat(line.credit) || 0) > 0 ? 'credit' : null);
          const warnContainer = document.getElementById('playground-warn-' + idx);
          if (warnContainer && side) {
            const warnMsg = getSemanticWarnings(line.accountKey, side);
            warnContainer.innerHTML = warnMsg ? `<div class="semantic-warning"><span>⚠ ${warnMsg}</span><button class="dismiss-warn" onclick="this.closest('.semantic-warning').remove()">×</button></div>` : '';
          }
        }
      });
    });

    /* Remove line */
    document.querySelectorAll('.remove-line').forEach(btn => {
      btn.addEventListener('click', e => {
        const idx = parseInt(e.target.dataset.idx);
        state.playground.draft.lines.splice(idx, 1);
        renderLeftPanel();
      });
    });

    /* Add line */
    const addBtn = document.getElementById('addLineBtn');
    if (addBtn) addBtn.addEventListener('click', () => {
      state.playground.draft.lines.push({ accountKey: '', debit: 0, credit: 0 });
      renderLeftPanel();
    });

    /* Post entry */
    const postBtn = document.getElementById('postBtn');
    if (postBtn) postBtn.addEventListener('click', postEntry);

    /* Delete entry */
    document.querySelectorAll('.entry-card .delete-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const id = e.target.dataset.id || e.target.closest('button').dataset.id;
        pushUndo();
        state.playground.entries = state.playground.entries.filter(en => en.id !== id);
        if (state.playground.selectedEntryId === id) state.playground.selectedEntryId = null;
        recomputePipeline();
        buildAll();
        saveState();
      });
    });

    /* Edit entry (pencil button) — safe editing: keep entry in list, mark as editing */
    document.querySelectorAll('.entry-card .edit-entry-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const id = e.target.dataset.id || e.target.closest('button').dataset.id;
        const entry = state.playground.entries.find(en => en.id === id);
        if (!entry) return;
        pushUndo();
        /* Load into draft but keep entry in array */
        state.playground.draft = {
          date: entry.date,
          description: entry.description,
          lines: entry.lines.map(l => ({ accountKey: l.accountKey, debit: l.debit, credit: l.credit }))
        };
        state.playground.editingEntryId = id;
        if (state.playground.selectedEntryId === id) state.playground.selectedEntryId = null;
        buildAll();
        saveState();
      });
    });

    /* Entry card selection */
    document.querySelectorAll('.entry-card').forEach(card => {
      card.addEventListener('click', e => {
        if (e.target.closest('.entry-card-actions')) return;
        const id = card.dataset.id;
        state.playground.selectedEntryId = state.playground.selectedEntryId === id ? null : id;
        buildAll();
        saveState();
      });
    });

    /* Clear all */
    const clearAllBtn = document.getElementById('clearAllBtn');
    if (clearAllBtn) clearAllBtn.addEventListener('click', () => {
      if (confirm(T('play.clearConfirm'))) {
        pushUndo();
        state.playground.entries = [];
        state.playground.selectedEntryId = null;
        state.playground.editingEntryId = null;
        recomputePipeline();
        buildAll();
        saveState();
      }
    });

    /* Undo button */
    const undoBtn = document.getElementById('undoBtn');
    if (undoBtn) undoBtn.addEventListener('click', () => { popUndo(); });

    /* Cancel edit button */
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    if (cancelEditBtn) cancelEditBtn.addEventListener('click', () => {
      state.playground.editingEntryId = null;
      state.playground.draft = {
        date: new Date().toISOString().slice(0, 10),
        description: '',
        lines: [{ accountKey: '', debit: 0, credit: 0 }, { accountKey: '', debit: 0, credit: 0 }]
      };
      /* The entry is still in the array, so just rebuild */
      buildAll();
      saveState();
    });

  }

  function openAccountPicker(idx, filter) {
    const dropdown = document.getElementById('picker-' + idx);
    if (!dropdown) return;
    const tree = JECore.getAccountTree(state.framework);
    const query = (filter || '').toLowerCase();
    let html = '';
    Object.keys(tree).sort().forEach(cls => {
      const group = tree[cls];
      const matches = group.accounts.filter(a => {
        const label = (state.lang === 'fr' ? a.name : a.nameEn).toLowerCase();
        return !query || label.includes(query) || a.code.includes(query) || a.key.toLowerCase().includes(query);
      });
      if (matches.length === 0) return;
      const groupLabel = state.lang === 'fr' ? group.labelFr : group.label;
      html += `<div class="account-picker-group">${groupLabel}</div>`;
      matches.forEach(a => {
        const typeClass = 'acct-type-' + a.type;
        html += `<div class="account-picker-item" data-key="${a.key}" data-idx="${idx}">
          <span>${a.code !== '-' ? '<span class="acct-code">' + a.code + '</span> ' : ''}${state.lang === 'fr' ? a.name : a.nameEn}</span>
          <span class="acct-type ${typeClass}">${a.type}</span>
        </div>`;
      });
    });
    dropdown.innerHTML = html || '<div style="padding:10px;color:var(--text-muted);font-size:11px">No matches</div>';
    dropdown.classList.add('open');

    dropdown.querySelectorAll('.account-picker-item').forEach(item => {
      item.addEventListener('click', e => {
        const key = e.currentTarget.dataset.key;
        const i = parseInt(e.currentTarget.dataset.idx);
        state.playground.draft.lines[i].accountKey = key;
        dropdown.classList.remove('open');
        const input = document.querySelector(`.account-picker-input[data-idx="${i}"]`);
        const acct = JECore.getAccount(key, state.framework);
        if (input && acct) input.value = acctLabel(acct);
        /* Semantic warning check */
        const line = state.playground.draft.lines[i];
        const side = (parseFloat(line.debit) || 0) > 0 ? 'debit' : ((parseFloat(line.credit) || 0) > 0 ? 'credit' : null);
        const warnContainer = document.getElementById('playground-warn-' + i);
        if (warnContainer && side) {
          const warnMsg = getSemanticWarnings(key, side);
          warnContainer.innerHTML = warnMsg ? `<div class="semantic-warning"><span>⚠ ${warnMsg}</span><button class="dismiss-warn" onclick="this.closest('.semantic-warning').remove()">×</button></div>` : '';
        }
      });
    });
  }

  function handlePickerKeyboard(e, idx) {
    const dropdown = document.getElementById('picker-' + idx);
    if (!dropdown || !dropdown.classList.contains('open')) {
      if (e.key === 'ArrowDown') { openAccountPicker(idx, e.target.value); e.preventDefault(); }
      return;
    }
    const items = dropdown.querySelectorAll('.account-picker-item');
    if (items.length === 0) return;
    const active = dropdown.querySelector('.account-picker-item.kb-active');
    let activeIdx = active ? Array.from(items).indexOf(active) : -1;

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (active) active.classList.remove('kb-active');
      activeIdx = Math.min(activeIdx + 1, items.length - 1);
      items[activeIdx].classList.add('kb-active');
      items[activeIdx].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (active) active.classList.remove('kb-active');
      activeIdx = Math.max(activeIdx - 1, 0);
      items[activeIdx].classList.add('kb-active');
      items[activeIdx].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (active) active.click();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      dropdown.classList.remove('open');
      e.target.blur();
    } else if (e.key === 'Tab') {
      dropdown.classList.remove('open');
    }
  }

  function updateTotals() {
    const draft = state.playground.draft;
    const totalDebit = draft.lines.reduce((s, l) => s + (parseFloat(l.debit) || 0), 0);
    const totalCredit = draft.lines.reduce((s, l) => s + (parseFloat(l.credit) || 0), 0);
    const isBalanced = Math.abs(totalDebit - totalCredit) < 0.005 && totalDebit > 0;
    const diff = totalDebit - totalCredit;
    const diffAbs = Math.abs(diff);

    const totalsEl = document.querySelector('.je-totals');
    if (totalsEl) {
      totalsEl.innerHTML = `
        <span>${T('play.totalDebit')}: <strong>${fmt(totalDebit)}</strong></span>
        <span>${T('play.totalCredit')}: <strong>${fmt(totalCredit)}</strong></span>
        <span class="${isBalanced ? 'balanced' : 'unbalanced'}">${isBalanced ? T('play.balanced') : T('play.unbalanced')}</span>
      `;
    }

    /* Update live diff bar */
    const diffBar = document.getElementById('draftDiffBar');
    if (diffBar) {
      diffBar.innerHTML = `
        <span>${T('draft.debit')}: <strong>${fmt(totalDebit)}</strong></span>
        <span>${T('draft.credit')}: <strong>${fmt(totalCredit)}</strong></span>
        <span class="${isBalanced ? 'diff-balanced' : 'diff-unbalanced'}">${T('draft.diff')}: ${isBalanced ? '0' : fmt(diff)}</span>
      `;
    }
    /* Update hint */
    const hintEl = document.querySelector('.draft-diff-hint');
    if (hintEl) {
      if (!isBalanced && (totalDebit > 0 || totalCredit > 0)) {
        const side = diff > 0 ? (state.lang === 'fr' ? 'crédit' : 'credit') : (state.lang === 'fr' ? 'débit' : 'debit');
        hintEl.textContent = T('draft.needMore').replace('{amt}', fmt(diffAbs)).replace('{side}', side);
        hintEl.style.display = 'block';
      } else {
        hintEl.style.display = 'none';
      }
    }

    const postBtn = document.getElementById('postBtn');
    if (postBtn) postBtn.disabled = !isBalanced;
  }

  function postEntry() {
    const draft = state.playground.draft;
    const entry = JECore.createEntry(draft.date, draft.description, '', draft.lines.filter(l => l.accountKey), [], 'operating');
    const validation = JECore.validateEntry(entry);
    if (!validation.valid) { alert(validation.errors.join('\n')); return; }

    pushUndo();

    if (state.playground.editingEntryId) {
      /* Replace the old entry at the same position */
      const idx = state.playground.entries.findIndex(en => en.id === state.playground.editingEntryId);
      if (idx !== -1) {
        state.playground.entries[idx] = entry;
      } else {
        state.playground.entries.push(entry);
      }
      state.playground.editingEntryId = null;
    } else {
      state.playground.entries.push(entry);
    }

    /* Reset draft */
    state.playground.draft = {
      date: new Date().toISOString().slice(0, 10),
      description: '',
      lines: [{ accountKey: '', debit: 0, credit: 0 }, { accountKey: '', debit: 0, credit: 0 }]
    };
    recomputePipeline();
    buildAll();
    saveState();
  }

  /* ═══════════════════════════════════════════════════════════
     TRANSACTION IMPACT ANALYSIS
     ═══════════════════════════════════════════════════════════ */
  function computeEntryImpact(entryId) {
    const entry = state.playground.entries.find(e => e.id === entryId);
    if (!entry) return null;

    const fw = state.framework;
    const impacts = { assets: 0, liabilities: 0, equity: 0, revenue: 0, expenses: 0, cash: 0, lines: [] };

    entry.lines.forEach(line => {
      const acct = JECore.getAccount(line.accountKey, fw);
      if (!acct) return;
      const d = parseFloat(line.debit) || 0;
      const c = parseFloat(line.credit) || 0;

      /* Compute the net effect on the account balance based on normal balance */
      let balanceEffect = 0;
      if (acct.normalBalance === 'debit') {
        balanceEffect = d - c; /* positive = increase, negative = decrease */
      } else {
        balanceEffect = c - d;
      }

      const direction = balanceEffect > 0 ? 'up' : 'down';
      const absAmount = Math.abs(balanceEffect);

      impacts.lines.push({
        account: acct,
        debit: d,
        credit: c,
        balanceEffect,
        direction,
        absAmount
      });

      /* Aggregate by type */
      if (acct.type === 'asset') impacts.assets += balanceEffect;
      else if (acct.type === 'liability') impacts.liabilities += balanceEffect;
      else if (acct.type === 'equity') impacts.equity += balanceEffect;
      else if (acct.type === 'revenue') impacts.revenue += balanceEffect;
      else if (acct.type === 'expense') impacts.expenses += balanceEffect;

      /* Cash impact */
      if (JECore.isCashAccount(line.accountKey)) {
        impacts.cash += (acct.normalBalance === 'debit') ? (d - c) : (c - d);
      }
    });

    /* Net income effect */
    impacts.netIncomeEffect = impacts.revenue - impacts.expenses;

    /* Determine statement effects */
    impacts.affectsIS = impacts.revenue !== 0 || impacts.expenses !== 0;
    impacts.affectsBS = impacts.assets !== 0 || impacts.liabilities !== 0 || impacts.equity !== 0 || impacts.affectsIS;
    impacts.affectsCF = impacts.cash !== 0;

    return impacts;
  }

  function renderImpactCard(entryId, statementType) {
    const impact = computeEntryImpact(entryId);
    if (!impact) return '';

    const entry = state.playground.entries.find(e => e.id === entryId);
    const desc = state.lang === 'fr' && entry.descriptionFr ? entry.descriptionFr : entry.description;
    const isFr = state.lang === 'fr';

    let title = '';
    let icon = '';
    let lines = '';
    let summary = '';

    if (statementType === 'journal') {
      title = isFr ? 'Analyse de l\'écriture' : 'Entry Analysis';
      icon = '🔍';
      impact.lines.forEach(l => {
        const dir = l.direction === 'up' ? 'impact-dir-up' : 'impact-dir-down';
        const arrow = l.direction === 'up' ? '↑' : '↓';
        const verb = l.direction === 'up' ? (isFr ? 'Augmente' : 'Increases') : (isFr ? 'Diminue' : 'Decreases');
        lines += `<div class="impact-row">
          <span class="impact-acct">${acctLabel(l.account)}</span>
          <span class="impact-direction ${dir}">${arrow} ${verb} (${l.account.type})</span>
          <span class="impact-amt">${fmtCurrency(l.absAmount)}</span>
        </div>`;
      });
    }

    else if (statementType === 'incomeStatement') {
      if (!impact.affectsIS) {
        return `<div class="impact-card" style="border-color:var(--text-muted)"><div class="impact-card-header"><span class="impact-icon">ℹ️</span> ${isFr ? 'Pas d\'impact sur le Compte de Résultat' : 'No Income Statement Impact'}</div><div style="font-size:11px;color:var(--text-secondary)">${isFr ? 'Cette écriture ne contient aucun compte de charge ou de produit.' : 'This entry has no revenue or expense accounts.'}</div></div>`;
      }
      title = isFr ? 'Impact sur le Compte de Résultat' : 'Income Statement Impact';
      icon = '📊';
      impact.lines.filter(l => l.account.type === 'revenue' || l.account.type === 'expense').forEach(l => {
        const dir = l.account.type === 'revenue' ? 'impact-dir-up' : 'impact-dir-down';
        const arrow = l.account.type === 'revenue' ? '↑' : '↓';
        const effect = l.account.type === 'revenue' ? (isFr ? 'Produit ↑' : 'Revenue ↑') : (isFr ? 'Charge ↑' : 'Expense ↑');
        lines += `<div class="impact-row">
          <span class="impact-acct">${acctLabel(l.account)}</span>
          <span class="impact-direction ${dir}">${effect}</span>
          <span class="impact-amt">${fmtCurrency(l.absAmount)}</span>
        </div>`;
      });
      const niEffect = impact.netIncomeEffect;
      const niDir = niEffect >= 0 ? 'up' : 'down';
      const niColor = niEffect >= 0 ? 'positive' : 'negative';
      summary = `<strong>${isFr ? 'Résultat net' : 'Net Income'}:</strong> <span class="${niColor}">${niEffect >= 0 ? '+' : ''}${fmtCurrency(niEffect)}</span>`;
    }

    else if (statementType === 'balanceSheet') {
      title = isFr ? 'Impact sur le Bilan' : 'Balance Sheet Impact';
      icon = '🏛️';
      impact.lines.filter(l => l.account.type === 'asset' || l.account.type === 'liability' || l.account.type === 'equity').forEach(l => {
        const dir = l.direction === 'up' ? 'impact-dir-up' : 'impact-dir-down';
        const arrow = l.direction === 'up' ? '↑' : '↓';
        lines += `<div class="impact-row">
          <span class="impact-acct">${acctLabel(l.account)}</span>
          <span class="impact-direction ${dir}">${arrow} ${l.account.type}</span>
          <span class="impact-amt">${fmtCurrency(l.absAmount)}</span>
        </div>`;
      });
      /* Show equation change */
      const aDir = impact.assets > 0 ? 'up' : impact.assets < 0 ? 'down' : 'neutral';
      const lDir = impact.liabilities > 0 ? 'up' : impact.liabilities < 0 ? 'down' : 'neutral';
      /* Equity effect includes net income from revenue/expense */
      const eqTotal = impact.equity + impact.netIncomeEffect;
      const eDir = eqTotal > 0 ? 'up' : eqTotal < 0 ? 'down' : 'neutral';
      lines += `<div class="impact-equation-change">
        <div class="impact-eq-item"><div class="impact-eq-label">${isFr ? 'Actifs' : 'Assets'}</div><div class="impact-eq-val ${aDir}">${impact.assets > 0 ? '+' : ''}${impact.assets !== 0 ? fmtCurrency(impact.assets) : '—'}</div></div>
        <span class="impact-eq-sign">=</span>
        <div class="impact-eq-item"><div class="impact-eq-label">${isFr ? 'Passifs' : 'Liabilities'}</div><div class="impact-eq-val ${lDir}">${impact.liabilities > 0 ? '+' : ''}${impact.liabilities !== 0 ? fmtCurrency(impact.liabilities) : '—'}</div></div>
        <span class="impact-eq-sign">+</span>
        <div class="impact-eq-item"><div class="impact-eq-label">${isFr ? 'Cap. Propres' : 'Equity'}</div><div class="impact-eq-val ${eDir}">${eqTotal > 0 ? '+' : ''}${eqTotal !== 0 ? fmtCurrency(eqTotal) : '—'}</div></div>
      </div>`;
    }

    else if (statementType === 'cashFlow') {
      if (!impact.affectsCF) {
        return `<div class="impact-card" style="border-color:var(--text-muted)"><div class="impact-card-header"><span class="impact-icon">ℹ️</span> ${isFr ? 'Pas d\'impact sur les flux de trésorerie' : 'No Cash Flow Impact'}</div><div style="font-size:11px;color:var(--text-secondary)">${isFr ? 'Cette écriture ne touche aucun compte de trésorerie.' : 'This entry does not touch any cash accounts.'}</div></div>`;
      }
      title = isFr ? 'Impact sur les Flux de Trésorerie' : 'Cash Flow Impact';
      icon = '💰';
      const cashDir = impact.cash >= 0 ? 'impact-dir-up' : 'impact-dir-down';
      const cashArrow = impact.cash >= 0 ? '↑' : '↓';
      const cashVerb = impact.cash >= 0 ? (isFr ? 'Entrée de trésorerie' : 'Cash inflow') : (isFr ? 'Sortie de trésorerie' : 'Cash outflow');

      /* Show which non-cash accounts caused the flow */
      impact.lines.filter(l => !JECore.isCashAccount(l.account.key)).forEach(l => {
        const cfClass = l.account.cfClass || 'operating';
        const cfLabel = cfClass === 'investing' ? (isFr ? 'Investissement' : 'Investing') : cfClass === 'financing' ? (isFr ? 'Financement' : 'Financing') : (isFr ? 'Opérationnel' : 'Operating');
        lines += `<div class="impact-row">
          <span class="impact-acct">${acctLabel(l.account)}</span>
          <span class="impact-direction" style="background:#7c7fff22;color:var(--accent)">${cfLabel}</span>
          <span class="impact-amt">${fmtCurrency(l.absAmount)}</span>
        </div>`;
      });

      summary = `<strong>${cashVerb}:</strong> <span class="${impact.cash >= 0 ? 'positive' : 'negative'}">${fmtCurrency(Math.abs(impact.cash))}</span>`;
    }

    else if (statementType === 'trialBalance') {
      title = isFr ? 'Impact sur la Balance' : 'Trial Balance Impact';
      icon = '⚖️';
      impact.lines.forEach(l => {
        const dStr = l.debit > 0 ? fmtCurrency(l.debit) : '';
        const cStr = l.credit > 0 ? fmtCurrency(l.credit) : '';
        lines += `<div class="impact-row">
          <span class="impact-acct">${acctLabel(l.account)}</span>
          <span class="impact-amt" style="color:var(--asset)">${dStr}</span>
          <span class="impact-amt" style="color:var(--green)">${cStr}</span>
        </div>`;
      });
    }

    return `<div class="impact-card">
      <div class="impact-card-header"><span class="impact-icon">${icon}</span> ${title}</div>
      <div class="impact-card-title">${entry.date} — ${desc}</div>
      ${lines}
      ${summary ? `<div class="impact-summary">${summary}</div>` : ''}
    </div>`;
  }

          else { creditBal = fmt(Math.abs(netBalance)); totalCreditBal += Math.abs(netBalance); }
        } else {
          if (netBalance <= 0) { creditBal = fmt(Math.abs(netBalance)); totalCreditBal += Math.abs(netBalance); }
          else { debitBal = fmt(netBalance); totalDebitBal += netBalance; }
        }
        html += `<tr data-key="${row.accountKey}" style="cursor:pointer" class="${hlClass}">
          <td>${acctLabel(row.account)}</td>

        state.playground.showClosePreview = false;
        renderTrialBalanceView(body);
      });
    }
  }

  /* ─── CLOSING ENTRIES HELPERS ─── */
  function buildClosingEntries() {
    const fw = state.framework;
    const closingEntries = [];
    const revenueRows = _tb.filter(r => r.account.type === 'revenue' && r.balance !== 0);
    const expenseRows = _tb.filter(r => r.account.type === 'expense' && r.balance !== 0);
    const today = new Date().toISOString().slice(0, 10);

    /* 1. Close revenue accounts to Income Summary */
    if (revenueRows.length > 0) {
      const lines = [];
      let totalRevenue = 0;
      revenueRows.forEach(r => {
        /* Revenue accounts have credit normal balance; balance = creditTotal - debitTotal */
        const bal = r.creditTotal - r.debitTotal;
        if (bal > 0) {
          lines.push({ accountKey: r.accountKey, debit: bal, credit: 0 });
          totalRevenue += bal;
        } else if (bal < 0) {
          lines.push({ accountKey: r.accountKey, debit: 0, credit: Math.abs(bal) });
          totalRevenue += bal; /* negative */
        }
      });
      if (totalRevenue > 0) {
        lines.push({ accountKey: 'incomeSummary', debit: 0, credit: totalRevenue });
      } else if (totalRevenue < 0) {
        lines.push({ accountKey: 'incomeSummary', debit: Math.abs(totalRevenue), credit: 0 });
      }
      if (lines.length > 0) {
        closingEntries.push({ date: today, description: T('close.revenueToIS'), descriptionFr: T('close.revenueToIS'), lines, type: 'revenue' });
      }
    }

    /* 2. Close expense accounts to Income Summary */
    if (expenseRows.length > 0) {
      const lines = [];
      let totalExpense = 0;
      expenseRows.forEach(r => {
        /* Expense accounts have debit normal balance; balance = debitTotal - creditTotal */
        const bal = r.debitTotal - r.creditTotal;
        if (bal > 0) {
          lines.push({ accountKey: r.accountKey, debit: 0, credit: bal });
          totalExpense += bal;
        } else if (bal < 0) {
          lines.push({ accountKey: r.accountKey, debit: Math.abs(bal), credit: 0 });
          totalExpense += bal; /* negative */
        }
      });
      if (totalExpense > 0) {
        lines.push({ accountKey: 'incomeSummary', debit: totalExpense, credit: 0 });
      } else if (totalExpense < 0) {
        lines.push({ accountKey: 'incomeSummary', debit: 0, credit: Math.abs(totalExpense) });
      }
      if (lines.length > 0) {
        closingEntries.push({ date: today, description: T('close.expenseToIS'), descriptionFr: T('close.expenseToIS'), lines, type: 'expense' });
      }
    }

    /* 3. Close Income Summary to Retained Earnings */
    /* Net Income Summary = revenue credited - expenses debited */
    let isBalance = 0;
    closingEntries.forEach(ce => {
      ce.lines.forEach(l => {
        if (l.accountKey === 'incomeSummary') {
          isBalance += (l.credit || 0) - (l.debit || 0);
        }
      });
    });
    if (Math.abs(isBalance) > 0.005) {
      const lines = [];
      if (isBalance > 0) {
        /* Net income: debit IS, credit RE */
        lines.push({ accountKey: 'incomeSummary', debit: isBalance, credit: 0 });
        lines.push({ accountKey: 'retainedEarnings', debit: 0, credit: isBalance });
      } else {
        /* Net loss: credit IS, debit RE */
        lines.push({ accountKey: 'incomeSummary', debit: 0, credit: Math.abs(isBalance) });
        lines.push({ accountKey: 'retainedEarnings', debit: Math.abs(isBalance), credit: 0 });
      }
      closingEntries.push({ date: today, description: T('close.isToRE'), descriptionFr: T('close.isToRE'), lines, type: 'summary' });
    }

    return closingEntries;
  }

  function renderClosePreview() {
    const closingEntries = buildClosingEntries();
    if (closingEntries.length === 0) {
      return `<div class="close-preview"><h4>${T('close.preview.title')}</h4><p style="font-size:12px;color:var(--text-muted)">${T('close.noActivity')}</p></div>`;
    }

    const fw = state.framework;
    let html = `<div class="close-preview"><h4>${T('close.preview.title')}</h4>`;

    /* List closing entries */
    closingEntries.forEach(ce => {
      html += `<div style="margin-bottom:8px;font-size:11px;font-weight:700;color:var(--text-secondary)">${ce.description}</div>`;
      ce.lines.forEach(l => {
        const acct = JECore.getAccount(l.accountKey, fw);
        const name = acct ? acctLabel(acct) : l.accountKey;
        const isCredit = (l.credit || 0) > 0;
        html += `<div class="close-preview-entry" style="${isCredit ? 'padding-left:20px' : ''}">
          <span class="acct-name">${name}</span>
          ${l.debit > 0 ? `<span class="amt dr" style="float:right">${fmt(l.debit)}</span>` : ''}
          ${l.credit > 0 ? `<span class="amt cr" style="float:right">${fmt(l.credit)}</span>` : ''}
        </div>`;
      });
    });

    /* Before/After TB comparison */
    const revenueRows = _tb.filter(r => r.account.type === 'revenue' && r.balance !== 0);
    const expenseRows = _tb.filter(r => r.account.type === 'expense' && r.balance !== 0);
    const reAcct = JECore.getAccount('retainedEarnings', fw);
    const reName = reAcct ? acctLabel(reAcct) : 'Retained Earnings';
    const currentRE = _tb.find(r => r.accountKey === 'retainedEarnings');
    const currentREBal = currentRE ? currentRE.balance : 0;

    /* Compute net income from closing entries */
    let netIncome = 0;
    revenueRows.forEach(r => { netIncome += (r.creditTotal - r.debitTotal); });
    expenseRows.forEach(r => { netIncome -= (r.debitTotal - r.creditTotal); });

    html += `<div class="close-tb-comparison">
      <div class="close-tb-col"><h5>${T('close.preview.before')}</h5><table>`;
    revenueRows.forEach(r => {
      html += `<tr><td>${acctLabel(r.account)}</td><td>${fmtCurrency(r.creditTotal - r.debitTotal)}</td></tr>`;
    });
    expenseRows.forEach(r => {
      html += `<tr><td>${acctLabel(r.account)}</td><td>${fmtCurrency(r.debitTotal - r.creditTotal)}</td></tr>`;
    });
    html += `<tr><td>${reName}</td><td>${fmtCurrency(currentREBal)}</td></tr>`;
    html += `</table></div>`;

    html += `<div class="close-tb-col"><h5>${T('close.preview.after')}</h5><table>`;
    revenueRows.forEach(r => {
      html += `<tr><td>${acctLabel(r.account)}</td><td>${fmtCurrency(0)}</td></tr>`;
    });
    expenseRows.forEach(r => {
      html += `<tr><td>${acctLabel(r.account)}</td><td>${fmtCurrency(0)}</td></tr>`;
    });
    html += `<tr><td style="font-weight:700">${reName}</td><td style="font-weight:700">${fmtCurrency(currentREBal + netIncome)}</td></tr>`;
    html += `</table></div></div>`;

    html += `<div class="close-confirm-actions">
      <button class="close-confirm-btn" id="closeConfirmBtn">${T('close.confirm')}</button>
      <button class="close-cancel-btn" id="closeCancelBtn">${T('close.cancel')}</button>
    </div></div>`;

    return html;
  }

  function executeClosingEntries() {
    const closingEntries = buildClosingEntries();
    if (closingEntries.length === 0) return;

    pushUndo();

    const revenueCount = _tb.filter(r => r.account.type === 'revenue' && r.balance !== 0).length;
    const expenseCount = _tb.filter(r => r.account.type === 'expense' && r.balance !== 0).length;

    closingEntries.forEach(ce => {
      const entry = JECore.createEntry(ce.date, ce.description, ce.descriptionFr, ce.lines, ['closing'], 'operating');
      state.playground.entries.push(entry);
    });

    recomputePipeline();
    buildAll();
    saveState();
    showFlash(T('close.success').replace('{x}', revenueCount).replace('{y}', expenseCount), 'success');
  }
