<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JournalCalc — Interactive Journal Entry Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=JetBrains+Mono:wght@400;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════════════
     CSS VARIABLES & RESET
     ═══════════════════════════════════════════════════════════ */
  :root {
    --bg: #0a0c14;
    --bg-subtle: #0f1219;
    --panel: #151823;
    --panel-hover: #1a1e2e;
    --border: #232840;
    --border-subtle: #1c2035;
    --accent: #7c7fff;
    --accent-dim: #6366f1;
    --accent-glow: #7c7fff30;
    --amber: #f5a623;
    --amber-glow: #f5a62320;
    --green: #34d399;
    --green-glow: #34d39920;
    --error: #f06070;
    --inflow: #34d399;
    --outflow: #f06070;
    --text-primary: #eef0f6;
    --text-secondary: #8b92a8;
    --text-muted: #555c74;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --shadow-sm: 0 2px 8px rgba(0,0,0,.25);
    --shadow-md: 0 4px 20px rgba(0,0,0,.35);
    --shadow-lg: 0 8px 40px rgba(0,0,0,.45);
    --shadow-glow: 0 0 20px var(--accent-glow);
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
    --transition-fast: 150ms cubic-bezier(.4,0,.2,1);
    --transition-smooth: 250ms cubic-bezier(.4,0,.2,1);
    --transition-spring: 350ms cubic-bezier(.34,1.56,.64,1);
    /* JE-specific semantic colors */
    --asset: #60a5fa;
    --liability: #f5a623;
    --equity: #34d399;
    --revenue: #22d3ee;
    --expense: #f06070;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ═══════════════════════════════════════════════════════════
     TOP NAV
     ═══════════════════════════════════════════════════════════ */
  .top-nav {
    display: flex;
    align-items: center;
    height: 56px;
    padding: 0 20px;
    background: rgba(21,24,35,.85);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border-bottom: 1px solid var(--border-subtle);
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .brand {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    font-style: italic;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent) 0%, #c4b5fd 50%, var(--accent) 100%);
    background-size: 200% 200%;
    animation: brandShimmer 6s ease-in-out infinite;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-right: 20px;
    white-space: nowrap;
  }
  @keyframes brandShimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    padding: 7px 16px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-muted);
    transition: all var(--transition-smooth);
    white-space: nowrap;
  }
  .nav-tab:hover { color: var(--text-secondary); background: var(--panel-hover); }
  .nav-tab.active {
    background: linear-gradient(135deg, var(--accent-dim), #8b5cf6);
    color: #fff;
    box-shadow: 0 2px 12px var(--accent-glow);
  }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .mode-toggle {
    display: flex;
    background: var(--bg);
    border-radius: 8px;
    padding: 2px;
    border: 1px solid var(--border);
  }
  .mode-btn {
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: transparent;
    color: #64748b;
    transition: all 0.2s;
  }
  .mode-btn.active { background: var(--accent); color: #fff; }
  .teacher-btn {
    padding: 5px 14px;
    font-size: 11px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #1e293b;
    color: #94a3b8;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .teacher-btn:hover { background: #0f766e; color: #fff; }
  .teacher-btn.active { background: #0f766e; color: #fff; }
  .nav-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: #94a3b8;
    font-size: 10px;
    padding: 4px 6px;
    cursor: pointer;
    outline: none;
  }
  .nav-select:focus { border-color: var(--accent); }
  .lang-toggle {
    display: flex;
    background: var(--bg);
    border-radius: 8px;
    padding: 2px;
    border: 1px solid var(--border);
  }
  .lang-btn {
    padding: 4px 10px;
    font-size: 10px;
    font-weight: 700;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: transparent;
    color: #64748b;
    transition: all 0.2s;
  }
  .lang-btn.active { background: var(--accent); color: #fff; }

  /* ═══════════════════════════════════════════════════════════
     PAGES
     ═══════════════════════════════════════════════════════════ */
  .page { display: none; }
  .page.active { display: block; }

  /* ═══════════════════════════════════════════════════════════
     LEARN PAGE
     ═══════════════════════════════════════════════════════════ */
  .learn-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }
  .hero-banner {
    text-align: center;
    padding: 48px 20px 40px;
    position: relative;
  }
  .hero-banner::before {
    content: '';
    position: absolute;
    top: -40px; left: 50%; transform: translateX(-50%);
    width: 500px; height: 500px;
    background: radial-gradient(circle, #6366f122 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-banner h1 {
    font-family: var(--font-display);
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #f0f0ff 0%, #c4b5fd 40%, var(--accent) 80%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 14px;
    line-height: 1.15;
  }
  .hero-banner p {
    font-size: 16px;
    color: var(--text-secondary);
    max-width: 580px;
    margin: 0 auto;
    line-height: 1.8;
    font-weight: 400;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    margin: 52px 0 22px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title .num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    font-weight: 800;
  }
  .method-cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .method-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    transition: transform var(--transition-spring), border-color var(--transition-smooth), box-shadow var(--transition-smooth);
    cursor: pointer;
  }
  .method-card:hover {
    transform: translateY(-3px);
    border-color: #4b5078;
    box-shadow: var(--shadow-md);
  }
  .method-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .method-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px; height: 36px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .method-card-name { font-size: 15px; font-weight: 700; color: #e2e8f0; }
  .method-card-desc { font-size: 12px; color: #94a3b8; line-height: 1.7; margin-bottom: 14px; }
  .key-concept-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .key-concept-card h4 { font-size: 15px; font-weight: 700; color: #e2e8f0; margin-bottom: 8px; }
  .key-concept-card p { font-size: 12px; color: #94a3b8; line-height: 1.7; }
  .comparison-table {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-top: 10px;
  }
  .grid-table { width: 100%; border-collapse: collapse; }
  .grid-table th, .grid-table td { border: 1px solid var(--border); padding: 8px 12px; }
  .grid-table th {
    background: var(--bg);
    color: var(--accent);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .grid-table td { font-size: 12px; color: #cbd5e1; }
  .grid-table tr:nth-child(odd) td { background: #1a1d2e; }
  .grid-table tr:nth-child(even) td { background: #1e293b55; }
  .grid-table tr:hover td { background: #2d314866; }
  .grid-table .total-row td { border-top: 2px solid var(--accent); font-weight: 700; color: #fff; }
  .grid-table .highlight-row td { background: #6366f122; }
  .cta-wrap { text-align: center; margin-top: 48px; padding-bottom: 20px; }
  .cta-btn {
    display: inline-block;
    padding: 16px 40px;
    background: linear-gradient(135deg, var(--accent-dim), #8b5cf6);
    color: #fff;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: transform var(--transition-spring), box-shadow var(--transition-smooth);
    box-shadow: 0 4px 24px var(--accent-glow);
    letter-spacing: 0.01em;
    position: relative;
    overflow: hidden;
  }
  .cta-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
    transition: left 0.5s ease;
  }
  .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,127,255,.35); }
  .cta-btn:hover::before { left: 100%; }

  /* ═══════════════════════════════════════════════════════════
     PLAYGROUND LAYOUT (three-column)
     ═══════════════════════════════════════════════════════════ */
  .app-layout { display: flex; height: calc(100vh - 56px); overflow: hidden; }
  .left-panel { width: 300px; flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 14px; position: relative; min-width: 250px; max-width: 500px; }
  .center-panel { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; }
  .center-body { padding: 14px; flex: 1; }
  .right-panel { width: 300px; flex-shrink: 0; background: var(--panel); border-left: 1px solid var(--border); overflow-y: auto; padding: 14px; position: relative; min-width: 200px; max-width: 500px; }

  /* ─── INPUT STYLES ─── */
  .panel-section { margin-bottom: 18px; }
  .panel-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #64748b; margin-bottom: 8px; }
  .input-group { margin-bottom: 9px; }
  .input-label { font-size: 11px; color: #94a3b8; margin-bottom: 3px; display: flex; justify-content: space-between; }
  .input-label .unit { color: var(--accent); font-weight: 600; }
  .ctrl-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 6px 9px; color: #e2e8f0; font-size: 12px; outline: none; font-family: var(--font-body); }
  .ctrl-input:focus { border-color: var(--accent); }
  .ctrl-input.input-error { border-color: var(--error); }
  .ctrl-select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 6px 9px; color: #e2e8f0; font-size: 12px; outline: none; cursor: pointer; }
  .ctrl-select:focus { border-color: var(--accent); }
  .error-message { font-size: 10px; color: var(--error); margin-top: 2px; display: none; }
  .error-message.show { display: block; }

  /* ─── JOURNAL ENTRY FORM ─── */
  .je-form { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .je-lines-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
  .je-lines-table th { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #64748b; text-align: left; padding: 4px 4px 6px; }
  .je-lines-table th:nth-child(2), .je-lines-table th:nth-child(3) { text-align: right; }
  .je-lines-table td { padding: 3px 4px; }
  .je-lines-table input[type="number"] { width: 90px; background: var(--panel); border: 1px solid var(--border); border-radius: 5px; padding: 5px 6px; color: #e2e8f0; font-size: 11px; font-family: var(--font-mono); text-align: right; outline: none; }
  .je-lines-table input[type="number"]:focus { border-color: var(--accent); }
  .je-lines-table .remove-line { width: 22px; height: 22px; border: none; background: transparent; color: var(--error); cursor: pointer; font-size: 14px; border-radius: 4px; opacity: 0.5; }
  .je-lines-table .remove-line:hover { background: #3a1e1e; opacity: 1; }
  .add-line-btn { width: 100%; padding: 5px 0; background: var(--panel); border: 1px dashed var(--border); border-radius: 7px; color: #64748b; font-size: 11px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .add-line-btn:hover { border-color: var(--accent); color: var(--accent); }
  .je-totals { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px; border-top: 1px solid var(--border); margin-top: 8px; font-size: 11px; font-family: var(--font-mono); }
  .je-totals .balanced { color: var(--green); font-weight: 700; }
  .je-totals .unbalanced { color: var(--error); font-weight: 700; }
  .post-btn { width: 100%; padding: 10px 0; margin-top: 10px; background: linear-gradient(135deg, var(--accent-dim), #8b5cf6); color: #fff; font-size: 13px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: all .2s; }
  .post-btn:hover { box-shadow: 0 4px 20px var(--accent-glow); transform: translateY(-1px); }
  .post-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ─── ACCOUNT PICKER ─── */
  .account-picker-wrap { position: relative; }
  .account-picker-input { width: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: 5px; padding: 5px 6px; color: #e2e8f0; font-size: 11px; outline: none; }
  .account-picker-input:focus { border-color: var(--accent); }
  .account-picker-input::placeholder { color: var(--text-muted); }
  .account-picker-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    max-height: 250px;
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 8px;
    z-index: 200;
    display: none;
    box-shadow: var(--shadow-lg);
  }
  .account-picker-dropdown.open { display: block; }
  .account-picker-group { padding: 4px 8px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--accent); background: var(--bg); border-top: 1px solid var(--border); }
  .account-picker-group:first-child { border-top: none; }
  .account-picker-item { padding: 6px 10px; font-size: 11px; color: #cbd5e1; cursor: pointer; transition: background .15s; display: flex; justify-content: space-between; }
  .account-picker-item:hover { background: var(--panel-hover); }
  .account-picker-item .acct-code { color: var(--accent); font-family: var(--font-mono); font-size: 10px; font-weight: 600; }
  .account-picker-item .acct-type { font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 700; }
  .acct-type-asset { background: #1e3a5f33; color: var(--asset); }
  .acct-type-liability { background: #78350f33; color: var(--liability); }
  .acct-type-equity { background: #064e3b33; color: var(--equity); }
  .acct-type-revenue { background: #164e6333; color: var(--revenue); }
  .acct-type-expense { background: #7f1d1d33; color: var(--expense); }

  /* ─── POSTED ENTRIES LIST ─── */
  .entries-list { margin-top: 14px; }
  .entry-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color .2s;
  }
  .entry-card:hover { border-color: var(--accent); }
  .entry-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .entry-card-date { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
  .entry-card-actions { display: flex; gap: 4px; }
  .entry-card-actions button { border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 2px 4px; border-radius: 4px; }
  .entry-card-actions button:hover { color: var(--accent); background: var(--panel-hover); }
  .entry-card-actions .delete-btn:hover { color: var(--error); background: #3a1e1e; }
  .entry-card-desc { font-size: 11px; color: #cbd5e1; margin-bottom: 4px; font-weight: 600; }
  .entry-card-lines { font-size: 10px; color: var(--text-secondary); }
  .entry-card-amount { font-family: var(--font-mono); font-weight: 600; color: #e2e8f0; }

  /* ═══════════════════════════════════════════════════════════
     EQUATION BAR
     ═══════════════════════════════════════════════════════════ */
  .equation-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  .equation-segment {
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    font-family: var(--font-mono);
    color: #fff;
    transition: width .5s cubic-bezier(.4,0,.2,1);
    min-width: 60px;
    overflow: hidden;
    white-space: nowrap;
    padding: 0 8px;
  }
  .equation-segment.assets { background: linear-gradient(135deg, #1e3a5f, #2563eb44); border: 1px solid var(--asset); color: var(--asset); }
  .equation-segment.liabilities { background: linear-gradient(135deg, #78350f44, #d9770644); border: 1px solid var(--liability); color: var(--liability); }
  .equation-segment.equity { background: linear-gradient(135deg, #064e3b44, #34d39944); border: 1px solid var(--equity); color: var(--equity); }
  .equation-equals { font-size: 18px; font-weight: 800; color: var(--text-muted); }
  .equation-plus { font-size: 16px; font-weight: 700; color: var(--text-muted); }
  .equation-check { font-size: 14px; margin-left: 8px; }
  .equation-check.balanced { color: var(--green); }
  .equation-check.unbalanced { color: var(--error); }
  .equation-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-right: 4px; }

  /* ═══════════════════════════════════════════════════════════
     PIPELINE STAGE TABS
     ═══════════════════════════════════════════════════════════ */
  .stage-tabs { display: flex; gap: 3px; padding: 8px 14px; background: var(--panel); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .stage-tab {
    padding: 6px 14px;
    border-radius: 7px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: var(--bg);
    color: #64748b;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .stage-tab:hover { color: #94a3b8; }
  .stage-tab.active { background: var(--accent); color: #fff; }
  .stage-tab .stage-icon { font-size: 12px; }
  .stage-tab .stage-count {
    font-size: 9px;
    background: rgba(255,255,255,.2);
    padding: 1px 5px;
    border-radius: 4px;
    font-weight: 700;
  }

  /* ═══════════════════════════════════════════════════════════
     STAGE VIEWS
     ═══════════════════════════════════════════════════════════ */
  .stage-view { display: none; }
  .stage-view.active { display: block; }

  /* Journal view */
  .journal-table { width: 100%; border-collapse: collapse; }
  .journal-table th {
    background: var(--bg);
    color: var(--accent);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 8px 10px;
    text-align: left;
    border: 1px solid var(--border);
  }
  .journal-table td { font-size: 11px; color: #cbd5e1; padding: 6px 10px; border: 1px solid var(--border); }
  .journal-table tr:nth-child(odd) td { background: #1a1d2e; }
  .journal-table tr:nth-child(even) td { background: #1e293b55; }
  .journal-table .je-debit-cell { font-weight: 600; font-family: var(--font-mono); color: var(--asset); text-align: right; }
  .journal-table .je-credit-cell { font-weight: 600; font-family: var(--font-mono); color: var(--green); text-align: right; }
  .journal-table .je-indent { padding-left: 28px; color: #94a3b8; font-style: italic; }
  .journal-table .je-narration { font-size: 10px; color: var(--text-muted); font-style: italic; padding: 4px 10px 8px; border-bottom: 2px solid var(--border); }

  /* Ledger view */
  .ledger-account { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
  .ledger-account-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; cursor: pointer; }
  .ledger-account-name { font-size: 13px; font-weight: 700; color: #e2e8f0; }
  .ledger-account-code { font-size: 10px; font-family: var(--font-mono); color: var(--accent); }
  .ledger-account-balance { font-size: 14px; font-family: var(--font-mono); font-weight: 700; }

  /* Trial balance */
  .tb-table { width: 100%; border-collapse: collapse; }
  .tb-table th { background: var(--bg); color: var(--accent); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 8px 10px; text-align: right; border: 1px solid var(--border); }
  .tb-table th:first-child { text-align: left; }
  .tb-table td { font-size: 11px; color: #cbd5e1; padding: 6px 10px; border: 1px solid var(--border); }
  .tb-table td:nth-child(2), .tb-table td:nth-child(3) { text-align: right; font-family: var(--font-mono); font-weight: 600; }
  .tb-table tr:nth-child(odd) td { background: #1a1d2e; }
  .tb-table tr:nth-child(even) td { background: #1e293b55; }
  .tb-table .total-row td { border-top: 2px solid var(--accent); font-weight: 700; color: #fff; background: var(--bg); }

  /* ─── TRIAL BALANCE FORMAT TOGGLE ─── */
  .tb-format-toggle { display: flex; gap: 0; margin-bottom: 12px; background: var(--bg); border-radius: 8px; padding: 2px; border: 1px solid var(--border); width: fit-content; }
  .tb-format-pill { padding: 5px 14px; font-size: 11px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; background: transparent; color: var(--text-muted); transition: all .2s; }
  .tb-format-pill.active { background: var(--accent); color: #fff; }

  /* ─── CLOSE PERIOD BUTTON & DIALOG ─── */
  .close-period-btn { width: 100%; padding: 12px; margin-top: 16px; background: linear-gradient(135deg, #0f766e, #14b8a6); color: #fff; font-size: 13px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; transition: all .2s; }
  .close-period-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px #14b8a644; }
  .close-period-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .close-preview { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-top: 16px; }
  .close-preview h4 { font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 12px; }
  .close-preview-entry { padding: 8px 0; border-bottom: 1px solid var(--border-subtle); font-size: 11px; }
  .close-preview-entry:last-child { border-bottom: none; }
  .close-preview-entry .acct-name { color: var(--text-primary); font-weight: 600; }
  .close-preview-entry .amt { font-family: var(--font-mono); font-weight: 600; }
  .close-preview-entry .dr { color: var(--asset); }
  .close-preview-entry .cr { color: var(--green); margin-left: 16px; }
  .close-confirm-actions { display: flex; gap: 8px; margin-top: 16px; }
  .close-confirm-actions button { padding: 10px 20px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; }
  .close-confirm-btn { background: linear-gradient(135deg, #0f766e, #14b8a6); color: #fff; }
  .close-confirm-btn:hover { box-shadow: 0 4px 16px #14b8a644; }
  .close-cancel-btn { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border) !important; }
  .close-tb-comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  .close-tb-col h5 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 6px; }
  .close-tb-col table { width: 100%; font-size: 10px; border-collapse: collapse; }
  .close-tb-col td { padding: 3px 6px; border-bottom: 1px solid var(--border-subtle); }
  .close-tb-col td:nth-child(2) { text-align: right; font-family: var(--font-mono); }

  /* ─── DIFFICULTY FILTER & LEARNING PATH ─── */
  .difficulty-filter { display: flex; gap: 0; margin-bottom: 12px; background: var(--bg); border-radius: 8px; padding: 2px; border: 1px solid var(--border); width: fit-content; }
  .difficulty-pill { padding: 5px 14px; font-size: 11px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; background: transparent; color: var(--text-muted); transition: all .2s; white-space: nowrap; }
  .difficulty-pill.active { background: var(--accent); color: #fff; }
  .learning-path { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 20px; }
  .learning-path-title { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 8px; }
  .learning-path-steps { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; font-size: 11px; color: var(--text-secondary); }
  .learning-path-steps .lp-step { padding: 3px 8px; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); white-space: nowrap; }
  .learning-path-steps .lp-arrow { color: var(--text-muted); font-size: 10px; }
  .scenario-card.locked { opacity: 0.55; pointer-events: none; position: relative; }
  .scenario-card.locked::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 14px; background: rgba(10,12,20,.3); pointer-events: none; }
  .scenario-lock-icon { font-size: 14px; color: var(--text-muted); margin-right: 6px; }
  .scenario-difficulty-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 700; margin-left: 6px; }
  .diff-1 { background: #34d39922; color: #34d399; }
  .diff-2 { background: #f5a62322; color: #f5a623; }
  .diff-3 { background: #f0607022; color: #f06070; }

  /* Statement cards */
  .statement-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .statement-card h4 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .statement-card h4 .stmt-icon { font-size: 14px; }
  .statement-line { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12px; border-bottom: 1px solid var(--border-subtle); }
  .statement-line:last-child { border-bottom: none; }
  .statement-line .line-label { color: #94a3b8; }
  .statement-line .line-value { font-family: var(--font-mono); font-weight: 600; color: #e2e8f0; }
  .statement-line.indent .line-label { padding-left: 16px; font-size: 11px; }
  .statement-line.subtotal { border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }
  .statement-line.subtotal .line-label { font-weight: 700; color: #e2e8f0; }
  .statement-line.subtotal .line-value { font-weight: 800; }
  .statement-line.grand-total { border-top: 2px solid var(--accent); padding-top: 10px; margin-top: 8px; }
  .statement-line.grand-total .line-label { font-weight: 800; color: #fff; font-size: 13px; }
  .statement-line.grand-total .line-value { font-weight: 800; color: var(--accent); font-size: 14px; }
  .stmt-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--accent); padding: 10px 0 6px; border-bottom: 1px dashed var(--border); margin-bottom: 4px; }
  .positive { color: var(--green) !important; }
  .negative { color: var(--error) !important; }

  /* ─── IMPACT INDICATORS ─── */
  .impact-arrow { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-family: var(--font-mono); font-weight: 700; animation: fadeImpact 3s forwards; }
  .impact-arrow.up { color: var(--green); }
  .impact-arrow.down { color: var(--error); }
  @keyframes fadeImpact { 0%,70% { opacity: 1; } 100% { opacity: 0; } }

  /* ─── RIGHT PANEL: T-ACCOUNT ─── */
  .t-account-container { margin-bottom: 16px; }
  .context-section { margin-bottom: 16px; }
  .context-section h5 {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .account-detail-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .account-detail-row { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-bottom: 1px solid var(--border-subtle); }
  .account-detail-row:last-child { border-bottom: none; }
  .account-detail-row .label { color: #64748b; }
  .account-detail-row .value { color: #e2e8f0; font-weight: 600; }

  /* ═══════════════════════════════════════════════════════════
     PIPELINE PAGE
     ═══════════════════════════════════════════════════════════ */
  .pipeline-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
  }
  .pipeline-flow-svg { width: 100%; margin-bottom: 24px; }
  .pipeline-stage-box { cursor: pointer; transition: all .2s; }
  .pipeline-stage-box:hover rect { stroke-width: 2; }
  @keyframes dashFlow { to { stroke-dashoffset: -20; } }

  /* ═══════════════════════════════════════════════════════════
     SCENARIOS PAGE
     ═══════════════════════════════════════════════════════════ */
  .scenarios-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }
  .category-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; }
  .category-pill {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    transition: all .2s;
  }
  .category-pill:hover { border-color: var(--accent); color: var(--text-secondary); }
  .category-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .scenarios-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .scenarios-grid.exercise-layout { grid-template-columns: 1fr; max-width: 800px; }
  .scenario-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    transition: all var(--transition-spring);
    cursor: pointer;
  }
  .scenario-card:hover { transform: translateY(-2px); border-color: #4b5078; box-shadow: var(--shadow-md); }
  .scenario-badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; margin-bottom: 8px; }
  .scenario-title { font-size: 15px; font-weight: 700; color: #e2e8f0; margin-bottom: 8px; }
  .scenario-narrative { font-size: 12px; color: #94a3b8; line-height: 1.7; margin-bottom: 12px; }
  .scenario-actions { display: flex; gap: 8px; }
  .scenario-actions button { padding: 6px 14px; border-radius: 7px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: #a5b4fc; transition: all .2s; }
  .scenario-actions button:hover { border-color: var(--accent); }
  .scenario-solution { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 12px; color: #94a3b8; line-height: 1.7; display: none; }
  .scenario-solution.show { display: block; }

  /* ═══════════════════════════════════════════════════════════
     PLACEHOLDER / EMPTY STATES
     ═══════════════════════════════════════════════════════════ */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
  .empty-state p { font-size: 12px; }

  /* ═══════════════════════════════════════════════════════════
     SCROLLBAR
     ═══════════════════════════════════════════════════════════ */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3d4260; }

  /* ─── RESIZE HANDLES ─── */
  .resize-handle {
    position: absolute; top: 0; bottom: 0; width: 8px; cursor: col-resize; z-index: 10;
    background: transparent; transition: background .15s;
  }
  .resize-handle:hover, .resize-handle.dragging { background: var(--accent); opacity: 0.4; }
  .resize-handle.left-handle { right: -4px; }
  .resize-handle.right-handle { left: -4px; }

  /* ─── ENTRY SELECTION & HIGHLIGHTING ─── */
  .entry-highlight { background: #7c7fff15 !important; border-left: 3px solid var(--accent) !important; }
  .entry-card.selected { border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow), 0 0 24px var(--accent-glow); }

  /* ─── LIVE DRAFT DIFFERENCE BAR ─── */
  /* ─── TRANSACTION IMPACT CARD ─── */
  .impact-card {
    background: linear-gradient(145deg, #0f1a2e, #151823);
    border: 1.5px solid var(--accent);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .impact-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }
  .impact-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--accent);
  }
  .impact-card-header .impact-icon { font-size: 14px; }
  .impact-card-title { font-size: 12px; font-weight: 600; color: #e2e8f0; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px dashed var(--border); }
  .impact-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 12px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .impact-row:last-child { border-bottom: none; }
  .impact-row .impact-acct { color: #94a3b8; flex: 1; }
  .impact-row .impact-direction {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    margin: 0 8px;
  }
  .impact-dir-up { background: #34d39922; color: var(--green); }
  .impact-dir-down { background: #f0607022; color: var(--error); }
  .impact-row .impact-amt {
    font-family: var(--font-mono);
    font-weight: 600;
    color: #e2e8f0;
    text-align: right;
    min-width: 80px;
  }
  .impact-equation-change {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    padding: 10px;
    background: var(--bg);
    border-radius: 8px;
    justify-content: center;
    align-items: center;
  }
  .impact-eq-item {
    text-align: center;
    font-size: 11px;
  }
  .impact-eq-label { font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 2px; }
  .impact-eq-val { font-family: var(--font-mono); font-weight: 700; font-size: 13px; }
  .impact-eq-val.up { color: var(--green); }
  .impact-eq-val.down { color: var(--error); }
  .impact-eq-val.neutral { color: var(--text-muted); }
  .impact-eq-sign { font-size: 16px; font-weight: 800; color: var(--text-muted); }
  .impact-summary { font-size: 11px; color: var(--text-secondary); line-height: 1.7; margin-top: 10px; padding: 8px 10px; background: var(--bg); border-radius: 6px; border-left: 3px solid var(--accent); }

  .draft-diff-bar {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 6px 10px; margin-top: 6px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
    font-size: 10px; font-family: var(--font-mono); font-weight: 600;
  }
  .draft-diff-bar .diff-balanced { color: var(--green); }
  .draft-diff-bar .diff-unbalanced { color: var(--error); }
  .draft-diff-hint { font-size: 9px; color: var(--text-muted); font-style: italic; margin-top: 2px; }

  /* ─── PIPELINE FLOW IN CENTER ─── */
  .center-pipeline-flow { padding: 8px 14px; border-bottom: 1px solid var(--border); background: var(--panel); }

  /* ─── CUSTOM ACCOUNT FORM ─── */
  .custom-acct-form { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-top: 8px; }
  .custom-acct-form .input-group { margin-bottom: 6px; }
  .custom-acct-form .ctrl-input, .custom-acct-form .ctrl-select { font-size: 11px; padding: 5px 7px; }
  .custom-acct-list { margin-top: 8px; }
  .custom-acct-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 6px; font-size: 10px; color: var(--text-secondary); border-bottom: 1px solid var(--border-subtle); }
  .custom-acct-item button { border: none; background: transparent; color: var(--error); cursor: pointer; font-size: 12px; padding: 2px 4px; border-radius: 4px; opacity: 0.6; }
  .custom-acct-item button:hover { opacity: 1; background: #3a1e1e; }
  .toggle-custom-form-btn { width: 100%; padding: 6px 0; background: var(--panel); border: 1px dashed var(--border); border-radius: 7px; color: #64748b; font-size: 11px; font-weight: 600; cursor: pointer; transition: all .2s; margin-top: 8px; }
  .toggle-custom-form-btn:hover { border-color: var(--accent); color: var(--accent); }
  .save-custom-acct-btn { width: 100%; padding: 6px 0; margin-top: 6px; background: linear-gradient(135deg, var(--accent-dim), #8b5cf6); color: #fff; font-size: 11px; font-weight: 700; border: none; border-radius: 6px; cursor: pointer; transition: all .2s; }
  .save-custom-acct-btn:hover { box-shadow: 0 2px 12px var(--accent-glow); }

  /* ═══════════════════════════════════════════════════════════
     EXERCISE MODE
     ═══════════════════════════════════════════════════════════ */
  .exercise-form { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-top: 12px; }
  .grade-result { padding: 16px; border-radius: 10px; margin-top: 12px; }
  .grade-result.pass { background: #064e3b33; border: 1px solid var(--green); }
  .grade-result.partial { background: #78350f33; border: 1px solid var(--amber); }
  .grade-result.fail { background: #7f1d1d33; border: 1px solid var(--error); }
  .grade-score-badge { display: inline-block; padding: 4px 12px; border-radius: 6px; font-size: 14px; font-weight: 800; font-family: var(--font-mono); }
  .grade-score-badge.pass { background: #064e3b; color: var(--green); }
  .grade-score-badge.partial { background: #78350f; color: var(--amber); }
  .grade-score-badge.fail { background: #7f1d1d; color: var(--error); }
  .exercise-comparison-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  .exercise-comparison-table th { font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  .exercise-comparison-table td { font-size: 11px; padding: 6px 8px; border-bottom: 1px solid var(--border-subtle); }
  .exercise-comparison-table .line-correct { color: var(--green); }
  .exercise-comparison-table .line-partial { color: var(--amber); }
  .exercise-comparison-table .line-wrong { color: var(--error); }
  .semantic-warning { padding: 6px 10px; margin: 4px 0; border-radius: 6px; font-size: 10px; font-weight: 600; background: #78350f33; color: #fbbf24; border: 1px solid #78350f; display: flex; align-items: center; gap: 6px; }
  .semantic-warning .dismiss-warn { border: none; background: transparent; color: #fbbf24; cursor: pointer; font-size: 14px; margin-left: auto; opacity: 0.6; padding: 0 2px; }
  .semantic-warning .dismiss-warn:hover { opacity: 1; }
  .exercise-toggle { display: flex; gap: 4px; margin-bottom: 16px; }
  .exercise-toggle button { padding: 6px 16px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); transition: all .2s; }
  .exercise-toggle button.active { background: var(--green); color: #fff; border-color: var(--green); }
  .progress-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; font-family: var(--font-mono); }
  .progress-badge.completed { background: #064e3b44; color: var(--green); }
  .progress-badge.not-attempted { background: var(--bg); color: var(--text-muted); }
  .exercise-progress-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; font-size: 12px; color: var(--text-secondary); }
  .exercise-progress-bar .progress-fill { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .exercise-progress-bar .progress-fill-inner { height: 100%; background: var(--green); border-radius: 3px; transition: width .3s; }
  .exercise-entry-block { background: var(--bg-subtle); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
  .exercise-entry-block-title { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }

  /* ═══════════════════════════════════════════════════════════
     FOCUS & ACCESSIBILITY
     ═══════════════════════════════════════════════════════════ */
  .nav-tab:focus-visible, .mode-btn:focus-visible, .lang-btn:focus-visible,
  .stage-tab:focus-visible, .category-pill:focus-visible, .difficulty-pill:focus-visible,
  .tb-format-pill:focus-visible, .teacher-btn:focus-visible,
  .post-btn:focus-visible, .cta-btn:focus-visible, .close-period-btn:focus-visible,
  .add-line-btn:focus-visible, .toggle-custom-form-btn:focus-visible,
  .save-custom-acct-btn:focus-visible, .scenario-actions button:focus-visible,
  .exercise-toggle button:focus-visible, .mobile-tab:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .ctrl-input:focus-visible, .ctrl-select:focus-visible,
  .account-picker-input:focus-visible,
  .je-lines-table input:focus-visible,
  .nav-select:focus-visible {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  /* ═══════════════════════════════════════════════════════════
     MICRO-INTERACTIONS & POLISH
     ═══════════════════════════════════════════════════════════ */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .scenario-card {
    animation: fadeInUp 0.35s ease both;
  }
  .scenarios-grid .scenario-card:nth-child(2) { animation-delay: 0.04s; }
  .scenarios-grid .scenario-card:nth-child(3) { animation-delay: 0.08s; }
  .scenarios-grid .scenario-card:nth-child(4) { animation-delay: 0.12s; }
  .scenarios-grid .scenario-card:nth-child(5) { animation-delay: 0.16s; }
  .scenarios-grid .scenario-card:nth-child(6) { animation-delay: 0.2s; }
  .scenarios-grid .scenario-card:nth-child(n+7) { animation-delay: 0.24s; }

  .method-card {
    animation: fadeInUp 0.3s ease both;
  }
  .method-cards-grid .method-card:nth-child(2) { animation-delay: 0.05s; }
  .method-cards-grid .method-card:nth-child(3) { animation-delay: 0.1s; }
  .method-cards-grid .method-card:nth-child(4) { animation-delay: 0.15s; }
  .method-cards-grid .method-card:nth-child(5) { animation-delay: 0.2s; }

  .key-concept-card {
    animation: fadeIn 0.4s ease both;
  }

  .entry-card { transition: border-color .2s, transform .15s, box-shadow .2s; }
  .entry-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .entry-card.selected { transform: translateY(-1px); }

  .post-btn { position: relative; overflow: hidden; }
  .post-btn::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,.15);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width .4s, height .4s;
  }
  .post-btn:active::after { width: 200px; height: 200px; }

  /* Account picker hover highlight */
  .account-picker-item { transition: background .12s, padding-left .12s; }
  .account-picker-item:hover, .account-picker-item.kb-active {
    background: var(--panel-hover);
    padding-left: 14px;
  }
  .account-picker-item.kb-active {
    background: var(--accent-glow);
    border-left: 2px solid var(--accent);
  }

  /* ═══════════════════════════════════════════════════════════
     RESPONSIVE
     ═══════════════════════════════════════════════════════════ */
  /* ─── EDITING STATE ─── */
  .entry-card.editing {
    opacity: 0.45;
    border: 1px dashed var(--accent) !important;
    pointer-events: none;
    position: relative;
  }
  .entry-card.editing::after {
    content: attr(data-editing-label);
    position: absolute;
    top: 6px; right: 8px;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--accent);
    pointer-events: none;
  }

  /* ─── FLASH MESSAGE ─── */
  .flash-msg {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 20px;
    background: var(--error);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    border-radius: 8px;
    z-index: 500;
    animation: flashIn 0.3s ease, flashOut 0.3s ease 1.5s forwards;
    pointer-events: none;
  }
  @keyframes flashIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes flashOut { from { opacity: 1; } to { opacity: 0; } }

  /* ─── TEACHER MODE INDICATORS ─── */
  .normal-bal-indicator {
    display: inline-block;
    font-size: 8px;
    font-weight: 800;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 4px;
    text-transform: uppercase;
    letter-spacing: .04em;
    vertical-align: middle;
  }
  .normal-bal-indicator.debit { background: #1e3a5f44; color: var(--asset); }
  .normal-bal-indicator.credit { background: #064e3b44; color: var(--green); }
  .teacher-tip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--panel-hover);
    color: var(--text-muted);
    font-size: 9px;
    cursor: help;
    margin-left: 4px;
    position: relative;
    vertical-align: middle;
  }
  .teacher-tip:hover { color: var(--accent); background: var(--accent-glow); }
  .teacher-tip .teacher-tip-text {
    display: none;
    position: absolute;
    bottom: 120%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 9px;
    font-weight: 600;
    color: var(--text-secondary);
    white-space: nowrap;
    z-index: 300;
    box-shadow: var(--shadow-md);
    pointer-events: none;
  }
  .teacher-tip:hover .teacher-tip-text { display: block; }

  /* ─── TEACHING POINT IN RIGHT PANEL ─── */
  .teaching-point-card {
    background: linear-gradient(145deg, #0f2a1a, #151823);
    border: 1px solid var(--green);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 14px;
    font-size: 11px;
    color: #94a3b8;
    line-height: 1.7;
  }
  .teaching-point-card strong {
    display: block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--green);
    margin-bottom: 6px;
  }

  @media (max-width: 900px) {
    .app-layout { flex-direction: column; height: auto; }
    .left-panel, .right-panel { width: 100% !important; max-width: 100% !important; min-width: 0 !important; border: none !important; }
    .center-panel { min-height: 60vh; }
    .mobile-tabs { display: flex; gap: 0; background: var(--panel); border-bottom: 1px solid var(--border); padding: 4px; }
    .mobile-tab { flex: 1; padding: 8px; border: none; background: var(--bg); color: var(--text-muted); font-size: 11px; font-weight: 700; cursor: pointer; border-radius: 6px; text-align: center; }
    .mobile-tab.active { background: var(--accent); color: #fff; }
    .mobile-hidden { display: none !important; }
    .top-nav { padding: 0 10px; gap: 6px; }
    .brand { font-size: 15px; margin-right: 10px; }
    .nav-tab { padding: 6px 10px; font-size: 11px; }
    .hero-banner h1 { font-size: 28px; }
    .method-cards-grid { grid-template-columns: 1fr; }
    .resize-handle { display: none; }
  }
  @media (min-width: 901px) {
    .mobile-tabs { display: none !important; }
  }

  /* ─── SETTINGS POPOVER ─── */
  .settings-btn {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text-muted); cursor: pointer; font-size: 16px;
    transition: all .2s; position: relative;
  }
  .settings-btn:hover { color: var(--accent); border-color: var(--accent); }
  .settings-btn.open { color: var(--accent); border-color: var(--accent); background: var(--panel-hover); }
  .settings-popover {
    position: absolute; top: calc(100% + 8px); right: 0;
    width: 240px; background: var(--surface, var(--panel));
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px; box-shadow: var(--shadow-lg);
    z-index: 300; display: none;
    animation: fadeInUp .2s ease;
  }
  .settings-popover.open { display: block; }
  .settings-popover .settings-group {
    margin-bottom: 12px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .settings-popover .settings-group:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .settings-popover .settings-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: var(--text-muted); margin-bottom: 6px;
  }
  .settings-popover select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: #e2e8f0; font-size: 11px; padding: 6px 8px;
    cursor: pointer; outline: none;
  }
  .settings-popover select:focus { border-color: var(--accent); }

  /* ═══════════════════════════════════════════════════════════
     COA PAGE
     ═══════════════════════════════════════════════════════════ */
  .coa-container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 20px;
  }
  .coa-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .coa-search {
    flex: 1; min-width: 200px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-primary);
    font-family: var(--font-body); font-size: 12px;
    padding: 8px 12px; outline: none;
  }
  .coa-search:focus { border-color: var(--accent); }
  .coa-search::placeholder { color: var(--text-muted); }
  .coa-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-secondary);
    font-family: var(--font-body); font-size: 11px; font-weight: 600;
    padding: 7px 14px; cursor: pointer; transition: all var(--transition-fast);
    white-space: nowrap;
  }
  .coa-btn:hover { background: var(--panel-hover); color: var(--text-primary); border-color: var(--accent); }
  .coa-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .coa-btn.primary { background: var(--accent-dim); color: #fff; border-color: var(--accent); }
  .coa-btn.primary:hover { background: var(--accent); }
  .coa-btn.danger { color: var(--error); }
  .coa-btn.danger:hover { background: rgba(240,96,112,0.1); border-color: var(--error); }
  .coa-class-accordion {
    border: 1px solid var(--border); border-radius: var(--radius-md);
    margin-bottom: 8px; overflow: hidden;
    background: var(--panel);
  }
  .coa-class-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; cursor: pointer;
    font-family: var(--font-display); font-size: 13px; font-weight: 600;
    color: var(--text-primary);
    transition: background var(--transition-fast);
  }
  .coa-class-header:hover { background: var(--panel-hover); }
  .coa-class-header .coa-class-count {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--text-muted); background: var(--bg);
    padding: 2px 8px; border-radius: 10px;
  }
  .coa-class-header .coa-chevron {
    transition: transform var(--transition-fast);
    color: var(--text-muted); font-size: 10px;
  }
  .coa-class-accordion.open .coa-chevron { transform: rotate(90deg); }
  .coa-class-body {
    display: none; border-top: 1px solid var(--border-subtle);
  }
  .coa-class-accordion.open .coa-class-body { display: block; }
  .coa-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px 8px 24px; cursor: pointer;
    font-size: 12px; color: var(--text-secondary);
    transition: background var(--transition-fast);
    border-bottom: 1px solid var(--border-subtle);
  }
  .coa-row:last-child { border-bottom: none; }
  .coa-row:hover { background: var(--bg-subtle); }
  .coa-row.expanded { background: var(--bg-subtle); }
  .coa-row-code {
    font-family: var(--font-mono); font-size: 12px; font-weight: 600;
    color: var(--text-primary); min-width: 50px;
  }
  .coa-row-name { flex: 1; color: var(--text-primary); }
  .coa-row-type {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .05em; padding: 2px 8px;
    border-radius: 10px;
  }
  .coa-row-type.asset { background: rgba(96,165,250,0.12); color: var(--asset); }
  .coa-row-type.liability { background: rgba(245,166,35,0.12); color: var(--liability); }
  .coa-row-type.equity { background: rgba(52,211,153,0.12); color: var(--equity); }
  .coa-row-type.revenue { background: rgba(34,211,238,0.12); color: var(--revenue); }
  .coa-row-type.expense { background: rgba(240,96,112,0.12); color: var(--expense); }
  .coa-row-nb {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
  }
  .coa-row-nb.debit { background: #1e3a5f44; color: var(--asset); }
  .coa-row-nb.credit { background: #064e3b44; color: var(--green); }
  .coa-row-actions {
    display: flex; gap: 4px;
  }
  .coa-row-actions button {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 12px; padding: 2px 4px;
    border-radius: 4px; transition: all var(--transition-fast);
  }
  .coa-row-actions button:hover { color: var(--text-primary); background: var(--panel-hover); }
  .coa-row-actions button.delete:hover { color: var(--error); }
  .coa-detail {
    padding: 12px 24px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border-subtle);
    animation: fadeInUp .2s ease;
  }
  .coa-detail-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px; font-size: 11px;
  }
  .coa-detail-item .coa-detail-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: var(--text-muted); margin-bottom: 2px;
  }
  .coa-detail-item .coa-detail-value {
    color: var(--text-primary); font-weight: 500;
  }
  .coa-compare-table {
    width: 100%; border-collapse: collapse; font-size: 11px;
    margin-top: 10px;
  }
  .coa-compare-table th {
    text-align: left; font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em;
    color: var(--text-muted); padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }
  .coa-compare-table td {
    padding: 6px 10px; border-bottom: 1px solid var(--border-subtle);
    color: var(--text-secondary);
  }
  .coa-compare-table tr:nth-child(even) td { background: var(--bg-subtle); }
  .coa-compare-table .fw-name { font-weight: 600; color: var(--text-primary); }
  .coa-compare-table .fw-code { font-family: var(--font-mono); font-weight: 600; color: var(--accent); }
  .coa-compare-table .fw-note { font-style: italic; color: var(--text-muted); font-size: 10px; }
  .coa-teacher-note {
    background: linear-gradient(145deg, #0f2a1a, #151823);
    border: 1px solid var(--green); border-radius: 8px;
    padding: 10px 12px; margin-top: 10px;
    font-size: 11px; color: #94a3b8; line-height: 1.6;
  }
  .coa-teacher-note strong {
    display: block; font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em;
    color: var(--green); margin-bottom: 4px;
  }
  .coa-form {
    background: var(--panel); border: 1px solid var(--accent);
    border-radius: var(--radius-md); padding: 16px 20px;
    margin-bottom: 16px; animation: fadeInUp .2s ease;
  }
  .coa-form-title {
    font-family: var(--font-display); font-size: 14px; font-weight: 600;
    color: var(--text-primary); margin-bottom: 12px;
  }
  .coa-form-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .coa-form-group { display: flex; flex-direction: column; gap: 3px; }
  .coa-form-group.full-width { grid-column: 1 / -1; }
  .coa-form-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: var(--text-muted);
  }
  .coa-form-actions {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-top: 14px;
  }
  .coa-no-results {
    text-align: center; padding: 40px 20px;
    color: var(--text-muted); font-size: 13px;
  }
  @media (max-width: 900px) {
    .coa-container { padding: 16px 12px; }
    .coa-toolbar { flex-direction: column; align-items: stretch; }
    .coa-form-grid { grid-template-columns: 1fr; }
    .coa-detail-grid { grid-template-columns: 1fr; }
    .coa-row { flex-wrap: wrap; gap: 6px; padding: 10px 12px 10px 16px; }
  }

  /* ═══════════════════════════════════════════════════════════
     PRINT
     ═══════════════════════════════════════════════════════════ */
  @media print {
    body { background: #fff; color: #000; }
    body::before { display: none; }
    .top-nav, .left-panel, .right-panel { display: none; }
    .page { display: block !important; }
    .center-panel { overflow: visible; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     TOP NAVIGATION
     ═══════════════════════════════════════════════════════════ -->
<nav class="top-nav">

      <button class="settings-btn" id="settingsBtn" title="Settings">⚙</button>
      <div class="settings-popover" id="settingsPopover">
        <div class="settings-group">
          <div class="settings-label">Framework</div>
          <select id="frameworkSelect">
            <option value="ohada">OHADA / SYSCOHADA</option>

</nav>

<!-- ═══════════════════════════════════════════════════════════
     PAGE: LEARN
     ═══════════════════════════════════════════════════════════ -->
<div id="page-learn" class="page active">
  <div class="learn-container" id="learnContent"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     PAGE: PLAYGROUND
     ═══════════════════════════════════════════════════════════ -->
<div id="page-play" class="page">
  <div class="mobile-tabs" id="mobileTabs">
    <button class="mobile-tab active" data-mtab="entry">Entry</button>
    <button class="mobile-tab" data-mtab="pipeline">Pipeline</button>
    <button class="mobile-tab" data-mtab="account">Account</button>
  </div>
  <div class="app-layout">
    <!-- Left Panel: Entry Input -->
    <div class="left-panel" id="leftPanel">
      <div class="resize-handle left-handle" id="leftResizeHandle"></div>
    </div>

     ═══════════════════════════════════════════════════════════ -->
<script>
const JELedger = (() => {
  'use strict';

  function buildLedger(entries, fw) {
    const ledger = new Map();
    entries.forEach(entry => {
      entry.lines.forEach(line => {
        if (!line.accountKey) return;
        if (!ledger.has(line.accountKey)) {
          const acct = JECore.getAccount(line.accountKey, fw);
          ledger.set(line.accountKey, {
            accountKey: line.accountKey,
            account: acct,
            entries: [],
            debitTotal: 0,
            creditTotal: 0,
            balance: 0
          });
        }
        const la = ledger.get(line.accountKey);
        const d = parseFloat(line.debit) || 0;
        const c = parseFloat(line.credit) || 0;
        la.entries.push({ entryId: entry.id, date: entry.date, description: entry.description, debit: d, credit: c });
        la.debitTotal += d;
        la.creditTotal += c;
        la.balance = la.account.normalBalance === 'debit'
          ? la.debitTotal - la.creditTotal
          : la.creditTotal - la.debitTotal;
      });
    });
    return ledger;
  }

  function buildTrialBalance(ledger) {
    const tb = [];
    ledger.forEach((la, key) => {
      if (la.debitTotal === 0 && la.creditTotal === 0) return;
      tb.push({
        accountKey: key,
        account: la.account,
        debitTotal: la.debitTotal,
        creditTotal: la.creditTotal,
        balance: la.balance
      });
    });
    /* Sort by account code */
    tb.sort((a, b) => {
      const ca = a.account.code || '';
      const cb = b.account.code || '';
      return ca.localeCompare(cb, undefined, { numeric: true });
    });
    return tb;
  }

  function getTAccount(ledger, accountKey) {
    const la = ledger.get(accountKey);
    if (!la) return null;
    return {
      account: la.account,
      debits: la.entries.filter(e => e.debit > 0),
      credits: la.entries.filter(e => e.credit > 0),
      debitTotal: la.debitTotal,
      creditTotal: la.creditTotal,
      balance: la.balance,
      normalBalance: la.account.normalBalance
    };
  }

  function verifyBalance(tb) {
    let totalDebit = 0, totalCredit = 0;
    tb.forEach(row => {
      totalDebit += row.debitTotal;
      totalCredit += row.creditTotal;
    });
    return {
      balanced: Math.abs(totalDebit - totalCredit) < 0.005,
      totalDebit,
      totalCredit,
      diff: totalDebit - totalCredit
    };
  }

  return { buildLedger, buildTrialBalance, getTAccount, verifyBalance };
})();
</script>
