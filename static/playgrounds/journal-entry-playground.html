     EXERCISE GRADING ENGINE
     ═══════════════════════════════════════════════════════════ */
  function getSemanticWarnings(accountKey, side) {
    const acct = JECore.getAccount(accountKey, state.framework);
    if (!acct) return null;
    const creditNormalTypes = ['revenue', 'equity', 'liability'];
    const debitNormalTypes = ['asset', 'expense'];
    if (side === 'debit' && creditNormalTypes.includes(acct.type) && acct.normalBalance === 'credit') {
      return T('warn.debitCreditNormal');
    }
    if (side === 'credit' && debitNormalTypes.includes(acct.type) && acct.normalBalance === 'debit') {
      return T('warn.creditDebitNormal');
    }
    return null;
  }

  function gradeExercise(scenarioId) {
    const scenario = JEScenarios.getById(scenarioId);
    if (!scenario) return null;
    const drafts = state.scenarios.exerciseDrafts[scenarioId] || {};
    const entryResults = [];
    let totalCorrect = 0, totalLines = 0;

    scenario.entries.forEach((modelEntry, eIdx) => {
      const studentLines = (drafts[eIdx] || { lines: [] }).lines.filter(l => l.accountKey);
      const modelLines = modelEntry.lines;
      totalLines += modelLines.length;

      /* Track which model lines have been matched */
      const modelMatched = new Array(modelLines.length).fill(false);
      const studentFeedback = [];
      const studentMatched = new Array(studentLines.length).fill(false);

      /* Pass 1: exact matches (account + amount + side) */
      studentLines.forEach((sl, si) => {
        modelLines.forEach((ml, mi) => {
          if (modelMatched[mi] || studentMatched[si]) return;
          if (sl.accountKey === ml.accountKey) {
            const sDebit = parseFloat(sl.debit) || 0;
            const sCredit = parseFloat(sl.credit) || 0;
            const mDebit = parseFloat(ml.debit) || 0;
            const mCredit = parseFloat(ml.credit) || 0;
            const sameDebitSide = (sDebit > 0 && mDebit > 0);
            const sameCreditSide = (sCredit > 0 && mCredit > 0);
            if (sameDebitSide || sameCreditSide) {
              const sAmt = sameDebitSide ? sDebit : sCredit;
              const mAmt = sameDebitSide ? mDebit : mCredit;
              const tolerance = mAmt * 0.01;
              if (Math.abs(sAmt - mAmt) <= tolerance) {
                /* Full match */
                modelMatched[mi] = true;
                studentMatched[si] = true;
                totalCorrect++;
                studentFeedback.push({ studentLine: sl, modelLine: ml, status: 'correct' });
              }
            }
          }
        });
      });

      /* Pass 2: partial matches (correct account, wrong amount or side) */
      studentLines.forEach((sl, si) => {
        if (studentMatched[si]) return;
        modelLines.forEach((ml, mi) => {
          if (modelMatched[mi] || studentMatched[si]) return;
          if (sl.accountKey === ml.accountKey) {
            modelMatched[mi] = true;
            studentMatched[si] = true;
            studentFeedback.push({ studentLine: sl, modelLine: ml, status: 'partial' });
          }
        });
      });

      /* Unmatched student lines = extra */
      studentLines.forEach((sl, si) => {
        if (!studentMatched[si]) {
          studentFeedback.push({ studentLine: sl, modelLine: null, status: 'extra' });
        }
      });

      /* Unmatched model lines = missing */
      modelLines.forEach((ml, mi) => {
        if (!modelMatched[mi]) {
          studentFeedback.push({ studentLine: null, modelLine: ml, status: 'missing' });
        }
      });

      entryResults.push({ modelEntry, feedback: studentFeedback });
    });

    const pct = totalLines > 0 ? Math.round((totalCorrect / totalLines) * 100) : 0;
    return { totalCorrect, totalLines, pct, entryResults };
  }

  const FR_ACCOUNT_TYPES = { asset: 'actif', liability: 'passif', equity: 'capitaux propres', revenue: 'produit', expense: 'charge' };
  function typeLabel(acct) {
    return acct ? (state.lang === 'fr' ? (FR_ACCOUNT_TYPES[acct.type] || acct.type) : acct.type) : '';
  }

  function getExplanation(fb) {
    const sLine = fb.studentLine;
    const mLine = fb.modelLine;
    const fw = state.framework;

    if (fb.status === 'correct') return '';

    if (fb.status === 'partial' && sLine && mLine) {
      const sAcct = JECore.getAccount(sLine.accountKey, fw);
      const sD = parseFloat(sLine.debit) || 0;
      const sC = parseFloat(sLine.credit) || 0;
      const mD = parseFloat(mLine.debit) || 0;
      const mC = parseFloat(mLine.credit) || 0;
      const studentSide = sD > 0 ? 'debit' : 'credit';
      const modelSide = mD > 0 ? 'debit' : 'credit';

      if (studentSide !== modelSide) {
        const reason = sAcct ? (state.lang === 'fr'
          ? (modelSide === 'debit' ? 'le débiter augmente son solde' : 'le créditer augmente son solde')
          : (modelSide === 'debit' ? 'debiting increases its balance' : 'crediting increases its balance'))
          : '';
        return T('exercise.wrongSide')
          .replace('{student}', studentSide).replace('{account}', sAcct ? acctName(sAcct) : '')
          .replace('{type}', typeLabel(sAcct)).replace('{expected}', modelSide).replace('{reason}', reason);
      }
      const sAmt = sD > 0 ? sD : sC;
      const mAmt = mD > 0 ? mD : mC;
      return T('exercise.wrongAmount').replace('{expected}', fmt(mAmt)).replace('{student}', fmt(sAmt));
    }

    if (fb.status === 'extra' && sLine) {
      const sAcct = JECore.getAccount(sLine.accountKey, fw);
      return T('exercise.wrongAccount')
        .replace('{expected}', '—').replace('{expectedType}', typeLabel(sAcct));
    }

    if (fb.status === 'missing' && mLine) {
      const mAcct = JECore.getAccount(mLine.accountKey, fw);
      const mD = parseFloat(mLine.debit) || 0;
      const mC = parseFloat(mLine.credit) || 0;
      const side = mD > 0 ? (state.lang === 'fr' ? 'débit' : 'debit') : (state.lang === 'fr' ? 'crédit' : 'credit');
      const amount = mD > 0 ? mD : mC;
      return T('exercise.missingExplain')
        .replace('{account}', mAcct ? acctName(mAcct) : '').replace('{type}', typeLabel(mAcct))
        .replace('{side}', side).replace('{amount}', fmt(amount));
    }

    return '';
  }

  /* ═══════════════════════════════════════════════════════════
     RENDER: SCENARIOS PAGE
     ═══════════════════════════════════════════════════════════ */
  function renderScenariosPage() {
    const container = document.getElementById('scenariosContent');
    const cat = state.scenarios.activeCategory;
    const diffFilter = state.scenarios.difficultyFilter || 0;
    let scenarios = JEScenarios.getByCategory(cat);
    if (diffFilter > 0) {
      scenarios = scenarios.filter(s => s.difficulty === diffFilter);
    }
    const isExercise = state.scenarios.exerciseMode;

    /* Progress stats */
    const progress = state.scenarios.progress || {};
    const allScenarios = JEScenarios.getAll();
    const completedCount = Object.keys(progress).filter(k => progress[k] && progress[k].attempted).length;

    let html = `
      <div class="hero-banner" style="padding:32px 20px 24px">
        <h1 style="font-size:32px">${T('scenarios.title')}</h1>
        <p>${T('scenarios.subtitle')}</p>
      </div>
      <div class="exercise-toggle">
        <button class="${!isExercise ? 'active' : ''}" data-exmode="view">${T('exercise.viewMode')}</button>
        <button class="${isExercise ? 'active' : ''}" data-exmode="exercise">${T('exercise.mode')}</button>
      </div>
    `;

    if (isExercise) {
      const pct = allScenarios.length > 0 ? Math.round((completedCount / allScenarios.length) * 100) : 0;
      html += `<div class="exercise-progress-bar">
        <span style="font-weight:700">${T('exercise.progress')}:</span>
        <span>${completedCount}/${allScenarios.length}</span>
        <div class="progress-fill"><div class="progress-fill-inner" style="width:${pct}%"></div></div>
        <span style="font-family:var(--font-mono);font-weight:700">${pct}%</span>
      </div>`;

      /* Learning path */
      const lp = JEScenarios.LEARNING_PATH;
      html += `<div class="learning-path">
        <div class="learning-path-title">${T('diff.learningPath')}</div>
        <div class="learning-path-steps">
          <span class="lp-step" style="background:var(--green);color:#fff;border-color:var(--green)">${T('diff.startHere')}</span>
          <span class="lp-arrow">&rarr;</span>`;
      lp.forEach((step, i) => {
        const stepLabel = state.lang === 'fr' ? step.labelFr : step.label;
        /* Check if all IDs in this step are completed */
        const allDone = step.ids.every(id => progress[id] && progress[id].attempted);
        const stepStyle = allDone ? 'border-color:var(--green);color:var(--green)' : '';
        html += `<span class="lp-step" style="${stepStyle}">${allDone ? '&#10003; ' : ''}${stepLabel}</span>`;
        if (i < lp.length - 1) html += `<span class="lp-arrow">&rarr;</span>`;
      });
      html += `</div></div>`;
    }

    /* Difficulty filter */
    const diffLabels = [
      { key: 0, label: T('diff.all') },
      { key: 1, label: '\u2B50 ' + T('diff.beginner') },
      { key: 2, label: '\u2B50\u2B50 ' + T('diff.intermediate') },
      { key: 3, label: '\u2B50\u2B50\u2B50 ' + T('diff.advanced') }
    ];
    html += `<div class="difficulty-filter">`;
    diffLabels.forEach(d => {
      html += `<button class="difficulty-pill ${diffFilter === d.key ? 'active' : ''}" data-diff="${d.key}">${d.label}</button>`;
    });
    html += `</div>`;

    html += `<div class="category-pills">`;
    JEScenarios.CATEGORIES.forEach(c => {
      html += `<button class="category-pill ${cat === c.key ? 'active' : ''}" data-cat="${c.key}" style="${cat === c.key ? 'background:' + c.color + ';border-color:' + c.color : ''}">${T('cat.' + c.key)}</button>`;
    });
    html += `</div><div class="scenarios-grid${isExercise ? ' exercise-layout' : ''}">`;

    scenarios.forEach(s => {
      const title = state.lang === 'fr' ? s.titleFr : s.title;
      const narrative = state.lang === 'fr' ? s.narrativeFr : s.narrative;
      const solution = state.lang === 'fr' ? (s.solutionFr || s.solution) : s.solution;
      const tip = state.lang === 'fr' ? (s.teachingPointFr || s.teachingPoint) : s.teachingPoint;
      const expanded = state.scenarios.expandedId === s.id;
      const sp = progress[s.id];
      const gradeResult = state.scenarios.gradeResults[s.id];

      /* Check prerequisites */
      let isLocked = false;
      let lockTooltip = '';
      if (isExercise && s.prerequisite && s.prerequisite.length > 0) {
        const unmet = s.prerequisite.filter(pid => !(progress[pid] && progress[pid].attempted));
        if (unmet.length > 0) {
          isLocked = true;
          lockTooltip = T('diff.locked').replace('{id}', unmet[0]);
        }
      }

      /* Progress badge */
      let badgeHtml = '';
      if (isExercise) {
        if (sp && sp.attempted) {
          badgeHtml = `<span class="progress-badge completed">${sp.bestScore}%</span>`;
        } else {
          badgeHtml = `<span class="progress-badge not-attempted">${T('exercise.notAttempted')}</span>`;
        }
      }

      /* Difficulty badge */
      const diffBadge = `<span class="scenario-difficulty-badge diff-${s.difficulty}">${'\u2B50'.repeat(s.difficulty)}</span>`;

      html += `
        <div class="scenario-card ${isLocked ? 'locked' : ''}" data-id="${s.id}" ${isLocked ? 'title="' + lockTooltip + '"' : ''} style="border-left:3px solid ${s.badge.color}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div style="display:flex;align-items:center;gap:6px">
              ${isLocked ? '<span class="scenario-lock-icon">&#128274;</span>' : ''}
              <span class="scenario-badge" style="background:${s.badge.color}22;color:${s.badge.color};border:1px solid ${s.badge.color}44">${s.badge.text}</span>
              ${diffBadge}
            </div>
            ${badgeHtml}
          </div>
          <div class="scenario-title">${title}</div>
          <div class="scenario-narrative">${narrative}</div>
      `;

      if (isExercise) {
        /* Exercise form */
        html += `<div class="exercise-form" data-scenario-id="${s.id}">`;
        const drafts = state.scenarios.exerciseDrafts[s.id] || {};

        s.entries.forEach((modelEntry, eIdx) => {
          const draft = drafts[eIdx] || { date: modelEntry.date, description: '', lines: [{ accountKey: '', debit: 0, credit: 0 }, { accountKey: '', debit: 0, credit: 0 }] };
          /* Ensure draft is stored */
          if (!drafts[eIdx]) {
            if (!state.scenarios.exerciseDrafts[s.id]) state.scenarios.exerciseDrafts[s.id] = {};
            state.scenarios.exerciseDrafts[s.id][eIdx] = draft;
          }

          if (s.entries.length > 1) {
            html += `<div class="exercise-entry-block-title">${T('exercise.entryN').replace('{n}', eIdx + 1)}</div>`;
          }
          html += `<div class="exercise-entry-block" data-entry-idx="${eIdx}">`;
          html += `<table class="je-lines-table" style="width:100%">
            <thead><tr><th>${T('play.account')}</th><th>${T('play.debit')}</th><th>${T('play.credit')}</th><th></th></tr></thead><tbody>`;

          draft.lines.forEach((line, li) => {
            const acct = line.accountKey ? JECore.getAccount(line.accountKey, state.framework) : null;
            const displayName = acct ? acctLabel(acct) : '';
            html += `<tr>
              <td><div class="account-picker-wrap">
                <input type="text" class="account-picker-input ex-acct-input" data-scenario="${s.id}" data-entry="${eIdx}" data-line="${li}" placeholder="${T('search.placeholder')}" value="${displayName}" autocomplete="off">
                <div class="account-picker-dropdown" id="ex-picker-${s.id}-${eIdx}-${li}"></div>
              </div>
              <div class="ex-semantic-warn" id="ex-warn-${s.id}-${eIdx}-${li}"></div>
              </td>
              <td><input type="number" min="0" class="ex-amount-input" data-scenario="${s.id}" data-entry="${eIdx}" data-line="${li}" data-field="debit" value="${line.debit || ''}" placeholder="0"></td>
              <td><input type="number" min="0" class="ex-amount-input" data-scenario="${s.id}" data-entry="${eIdx}" data-line="${li}" data-field="credit" value="${line.credit || ''}" placeholder="0"></td>
              <td>${draft.lines.length > 2 ? `<button class="remove-line ex-remove-line" data-scenario="${s.id}" data-entry="${eIdx}" data-line="${li}">×</button>` : ''}</td>
            </tr>`;
          });

          html += `</tbody></table>`;
          html += `<button class="add-line-btn ex-add-line" data-scenario="${s.id}" data-entry="${eIdx}">${T('play.addLine')}</button>`;
          html += `</div>`;
        });

        html += `<div style="display:flex;gap:8px;margin-top:10px">
          <button class="post-btn ex-submit-btn" data-id="${s.id}" style="flex:1">${T('exercise.submit')}</button>
        </div>`;

        /* Grade result display */
        if (gradeResult) {
          const gradeClass = gradeResult.pct >= 80 ? 'pass' : (gradeResult.pct >= 50 ? 'partial' : 'fail');
          html += `<div class="grade-result ${gradeClass}">`;
          html += `<div style="margin-bottom:10px"><span class="grade-score-badge ${gradeClass}">${T('exercise.linesCorrect').replace('{n}', gradeResult.totalCorrect).replace('{total}', gradeResult.totalLines).replace('{pct}', gradeResult.pct)}</span></div>`;

          gradeResult.entryResults.forEach((er, erIdx) => {
            if (gradeResult.entryResults.length > 1) {
              html += `<div style="font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;margin:8px 0 4px">${T('exercise.entryN').replace('{n}', erIdx + 1)}</div>`;
            }
            html += `<table class="exercise-comparison-table">
              <thead><tr><th>${T('exercise.yourAnswer')}</th><th>${T('exercise.modelAnswer')}</th><th>${T('exercise.result')}</th></tr></thead><tbody>`;

            er.feedback.forEach(fb => {
              let statusClass = '', statusIcon = '', statusText = '';
              if (fb.status === 'correct') { statusClass = 'line-correct'; statusIcon = '✓'; statusText = T('exercise.correct'); }
              else if (fb.status === 'partial') { statusClass = 'line-partial'; statusIcon = '⚠'; statusText = T('exercise.incorrect') + ' (amount/side)'; }
              else if (fb.status === 'extra') { statusClass = 'line-wrong'; statusIcon = '✗'; statusText = T('exercise.extraLine'); }
              else if (fb.status === 'missing') { statusClass = 'line-wrong'; statusIcon = '✗'; statusText = T('exercise.missingLine'); }

              const sLine = fb.studentLine;
              const mLine = fb.modelLine;
              const sAcct = sLine ? JECore.getAccount(sLine.accountKey, state.framework) : null;
              const mAcct = mLine ? JECore.getAccount(mLine.accountKey, state.framework) : null;
              const sName = sAcct ? acctName(sAcct) : '—';
              const mName = mAcct ? acctName(mAcct) : '—';
              const sD = sLine ? (parseFloat(sLine.debit) || 0) : 0;
              const sC = sLine ? (parseFloat(sLine.credit) || 0) : 0;
              const mD = mLine ? (parseFloat(mLine.debit) || 0) : 0;
              const mC = mLine ? (parseFloat(mLine.credit) || 0) : 0;

              const explanation = getExplanation(fb);
              html += `<tr>
                <td>${sLine ? `${sName} <span style="font-family:var(--font-mono);font-size:10px">${sD > 0 ? 'Dr ' + fmt(sD) : 'Cr ' + fmt(sC)}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
                <td>${mLine ? `${mName} <span style="font-family:var(--font-mono);font-size:10px">${mD > 0 ? 'Dr ' + fmt(mD) : 'Cr ' + fmt(mC)}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
                <td class="${statusClass}">${statusIcon} ${statusText}</td>
              </tr>`;
              if (explanation) {
                html += `<tr><td colspan="3" style="padding:4px 8px 8px;font-size:11px;color:#94a3b8;border-top:none;line-height:1.5;background:rgba(124,127,255,.05)">${explanation}</td></tr>`;
              }
            });
            html += `</tbody></table>`;
          });

          /* Teaching point revealed after submission */
          html += `<div style="margin-top:10px;padding:8px;background:var(--bg);border-radius:6px;border-left:3px solid var(--green);font-size:12px;color:#94a3b8;line-height:1.7">
            <strong>${state.lang === 'fr' ? 'Point pédagogique :' : 'Teaching point:'}</strong> ${tip}
          </div>`;

          html += `<div style="display:flex;gap:8px;margin-top:10px">
            <button class="scenario-actions ex-try-again-btn" data-id="${s.id}" style="padding:6px 14px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:#a5b4fc">${T('exercise.tryAgain')}</button>
            <button class="scenario-actions ex-show-solution-btn" data-id="${s.id}" style="padding:6px 14px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:#a5b4fc">${T('exercise.showSolution')}</button>
          </div>`;
          html += `</div>`;
        }

        html += `</div>`; /* close exercise-form */
      } else {
        /* View mode (original) */
        const solutionVisible = expanded || state.teacherMode;
        html += `
          <div class="scenario-actions">
            <button class="load-scenario-btn" data-id="${s.id}">${T('scenarios.load')}</button>
            ${!state.teacherMode ? `<button class="show-solution-btn" data-id="${s.id}">${T('scenarios.showSolution')}</button>` : ''}
          </div>
          <div class="scenario-solution ${solutionVisible ? 'show' : ''}" id="solution-${s.id}">
            <div style="margin-bottom:8px"><strong>${state.lang === 'fr' ? 'Solution :' : 'Solution:'}</strong> ${solution}</div>
            <div style="margin-bottom:8px;padding:8px;background:var(--bg);border-radius:6px;border-left:3px solid var(--green)"><strong>${state.lang === 'fr' ? 'Point pédagogique :' : 'Teaching point:'}</strong> ${tip}</div>
            ${s.relatedStandards ? `<div style="font-size:10px;color:var(--text-muted)">📚 ${s.relatedStandards.join(' · ')}</div>` : ''}
          </div>
        `;
      }

      html += `</div>`; /* close scenario-card */
    });
    html += `</div>`;
    container.innerHTML = html;

    /* ── Bind events ── */
    /* Mode toggle */
    document.querySelectorAll('.exercise-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        state.scenarios.exerciseMode = btn.dataset.exmode === 'exercise';
        state.scenarios.gradeResults = {};
        renderScenariosPage();
      });
    });

    /* Difficulty filter */
    document.querySelectorAll('.difficulty-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        state.scenarios.difficultyFilter = parseInt(pill.dataset.diff, 10);
        renderScenariosPage();
      });
    });

    /* Category pills */
    document.querySelectorAll('.category-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        state.scenarios.activeCategory = pill.dataset.cat;
        renderScenariosPage();
      });
    });

    /* View mode buttons */
    document.querySelectorAll('.load-scenario-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        loadScenario(parseInt(btn.dataset.id));
      });
    });
    document.querySelectorAll('.show-solution-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const id = parseInt(btn.dataset.id);
        state.scenarios.expandedId = state.scenarios.expandedId === id ? null : id;
        renderScenariosPage();
      });
    });

    /* Exercise mode event binding */
    if (isExercise) {
      bindExerciseEvents();
    }
  }

  function bindExerciseEvents() {
    /* Account pickers in exercise forms */
    document.querySelectorAll('.ex-acct-input').forEach(input => {
      input.addEventListener('focus', () => openExerciseAccountPicker(input));
      input.addEventListener('input', () => openExerciseAccountPicker(input));
      input.addEventListener('keydown', e => handleExPickerKeyboard(e, input));
    });

    /* Amount inputs */
    document.querySelectorAll('.ex-amount-input').forEach(input => {
      input.addEventListener('input', e => {
        const sId = parseInt(e.target.dataset.scenario);
        const eIdx = parseInt(e.target.dataset.entry);
        const lIdx = parseInt(e.target.dataset.line);
        const field = e.target.dataset.field;
        if (!state.scenarios.exerciseDrafts[sId]) return;
        const draft = state.scenarios.exerciseDrafts[sId][eIdx];
        if (!draft || !draft.lines[lIdx]) return;
        const exVal = parseFloat(e.target.value) || 0;
        /* Reject negative values */
        if (exVal < 0) {
          e.target.value = 0;
          draft.lines[lIdx][field] = 0;
          showFlash(T('play.negativeRejected'));
          return;
        }
        draft.lines[lIdx][field] = exVal;
        /* Auto-clear other field */
        if (field === 'debit' && parseFloat(e.target.value) > 0) {
          draft.lines[lIdx].credit = 0;
          const creditInput = e.target.closest('tr').querySelector('input[data-field="credit"]');
          if (creditInput) creditInput.value = '';
        } else if (field === 'credit' && parseFloat(e.target.value) > 0) {
          draft.lines[lIdx].debit = 0;
          const debitInput = e.target.closest('tr').querySelector('input[data-field="debit"]');
          if (debitInput) debitInput.value = '';
        }
        /* Show semantic warning */
        const acctKey = draft.lines[lIdx].accountKey;
        if (acctKey) {
          const side = (parseFloat(draft.lines[lIdx].debit) || 0) > 0 ? 'debit' : ((parseFloat(draft.lines[lIdx].credit) || 0) > 0 ? 'credit' : null);
          const warnEl = document.getElementById(`ex-warn-${sId}-${eIdx}-${lIdx}`);
          if (warnEl && side) {
            const warnMsg = getSemanticWarnings(acctKey, side);
            warnEl.innerHTML = warnMsg ? `<div class="semantic-warning"><span>⚠ ${warnMsg}</span><button class="dismiss-warn" onclick="this.closest('.semantic-warning').remove()">×</button></div>` : '';
          }
        }
      });
    });

    /* Add line */
    document.querySelectorAll('.ex-add-line').forEach(btn => {
      btn.addEventListener('click', () => {
        const sId = parseInt(btn.dataset.scenario);
        const eIdx = parseInt(btn.dataset.entry);
        if (!state.scenarios.exerciseDrafts[sId] || !state.scenarios.exerciseDrafts[sId][eIdx]) return;
        state.scenarios.exerciseDrafts[sId][eIdx].lines.push({ accountKey: '', debit: 0, credit: 0 });
        renderScenariosPage();
      });
    });

    /* Remove line */
    document.querySelectorAll('.ex-remove-line').forEach(btn => {
      btn.addEventListener('click', () => {
        const sId = parseInt(btn.dataset.scenario);
        const eIdx = parseInt(btn.dataset.entry);
        const lIdx = parseInt(btn.dataset.line);
        if (!state.scenarios.exerciseDrafts[sId] || !state.scenarios.exerciseDrafts[sId][eIdx]) return;
        state.scenarios.exerciseDrafts[sId][eIdx].lines.splice(lIdx, 1);
        renderScenariosPage();
      });
    });

    /* Submit answer */
    document.querySelectorAll('.ex-submit-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const sId = parseInt(btn.dataset.id);
        const result = gradeExercise(sId);
        if (!result) return;
        state.scenarios.gradeResults[sId] = result;
        /* Update progress */
        if (!state.scenarios.progress[sId]) {
          state.scenarios.progress[sId] = { attempted: true, bestScore: result.pct };
        } else {
          state.scenarios.progress[sId].attempted = true;
          if (result.pct > state.scenarios.progress[sId].bestScore) {
            state.scenarios.progress[sId].bestScore = result.pct;
          }
        }
        saveState();
        renderScenariosPage();
      });
    });

    /* Try again */
    document.querySelectorAll('.ex-try-again-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const sId = parseInt(btn.dataset.id);
        delete state.scenarios.gradeResults[sId];
        delete state.scenarios.exerciseDrafts[sId];
        renderScenariosPage();
      });
    });

    /* Show solution (from exercise mode) */
    document.querySelectorAll('.ex-show-solution-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const sId = parseInt(btn.dataset.id);
        state.scenarios.expandedId = state.scenarios.expandedId === sId ? null : sId;
        /* Show solution section by toggling expandedId and re-render would lose exercise state,
           so just toggle the solution inline */
        const scenario = JEScenarios.getById(sId);
        if (!scenario) return;
        const existing = btn.parentElement.querySelector('.scenario-solution-inline');
        if (existing) { existing.remove(); return; }
        const sol = state.lang === 'fr' ? (scenario.solutionFr || scenario.solution) : scenario.solution;
        const div = document.createElement('div');
        div.className = 'scenario-solution-inline';
        div.style.cssText = 'margin-top:10px;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--border);font-size:12px;color:#94a3b8;line-height:1.7';
        div.innerHTML = `<strong>${state.lang === 'fr' ? 'Solution :' : 'Solution:'}</strong> ${sol}`;
        btn.parentElement.appendChild(div);
      });
    });

    /* Close exercise pickers on outside click */
    document.addEventListener('click', e => {
      if (!e.target.closest('.account-picker-wrap')) {
        document.querySelectorAll('.account-picker-dropdown').forEach(d => d.classList.remove('open'));
      }
    }, { once: false });
  }

  function openExerciseAccountPicker(input) {
    const sId = parseInt(input.dataset.scenario);
    const eIdx = parseInt(input.dataset.entry);
    const lIdx = parseInt(input.dataset.line);
    const dropdownId = `ex-picker-${sId}-${eIdx}-${lIdx}`;
    const dropdown = document.getElementById(dropdownId);
    if (!dropdown) return;

    const tree = JECore.getAccountTree(state.framework);
    const query = (input.value || '').toLowerCase();
    let html = '';
    Object.keys(tree).sort().forEach(cls => {
      const group = tree[cls];
      const matches = group.accounts.filter(a => {
        const label = (state.lang === 'fr' ? a.name : a.nameEn).toLowerCase();
        return !query || label.includes(query) || a.code.includes(query) || a.key.toLowerCase().includes(query);
      });
      if (matches.length === 0) return;
      const groupLabel = state.lang === 'fr' ? group.labelFr : group.label;
      html += `<div class="account-picker-group">${groupLabel}</div>`;
      matches.forEach(a => {
        const typeClass = 'acct-type-' + a.type;
        html += `<div class="account-picker-item ex-picker-item" data-key="${a.key}" data-scenario="${sId}" data-entry="${eIdx}" data-line="${lIdx}">
          <span>${a.code !== '-' ? '<span class="acct-code">' + a.code + '</span> ' : ''}${state.lang === 'fr' ? a.name : a.nameEn}</span>
          <span class="acct-type ${typeClass}">${a.type}</span>
        </div>`;
      });
    });
    dropdown.innerHTML = html || '<div style="padding:10px;color:var(--text-muted);font-size:11px">No matches</div>';
    dropdown.classList.add('open');

    dropdown.querySelectorAll('.ex-picker-item').forEach(item => {
      item.addEventListener('click', () => {
        const key = item.dataset.key;
        const s = parseInt(item.dataset.scenario);
        const e = parseInt(item.dataset.entry);
        const l = parseInt(item.dataset.line);
        if (!state.scenarios.exerciseDrafts[s] || !state.scenarios.exerciseDrafts[s][e]) return;
        state.scenarios.exerciseDrafts[s][e].lines[l].accountKey = key;
        dropdown.classList.remove('open');
        const acct = JECore.getAccount(key, state.framework);
        if (acct) input.value = acctLabel(acct);
        /* Check semantic warning */
        const line = state.scenarios.exerciseDrafts[s][e].lines[l];
        const side = (parseFloat(line.debit) || 0) > 0 ? 'debit' : ((parseFloat(line.credit) || 0) > 0 ? 'credit' : null);
        const warnEl = document.getElementById(`ex-warn-${s}-${e}-${l}`);
        if (warnEl && side) {
          const warnMsg = getSemanticWarnings(key, side);
          warnEl.innerHTML = warnMsg ? `<div class="semantic-warning"><span>⚠ ${warnMsg}</span><button class="dismiss-warn" onclick="this.closest('.semantic-warning').remove()">×</button></div>` : '';
        }
      });
    });
  }

  function handleExPickerKeyboard(e, input) {
    const sId = input.dataset.scenario, eIdx = input.dataset.entry, lIdx = input.dataset.line;
    const dropdown = document.getElementById(`ex-picker-${sId}-${eIdx}-${lIdx}`);
    if (!dropdown || !dropdown.classList.contains('open')) {
      if (e.key === 'ArrowDown') { openExerciseAccountPicker(input); e.preventDefault(); }
      return;
    }
    const items = dropdown.querySelectorAll('.account-picker-item');
    if (items.length === 0) return;
    const active = dropdown.querySelector('.account-picker-item.kb-active');
    let activeIdx = active ? Array.from(items).indexOf(active) : -1;

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (active) active.classList.remove('kb-active');
      activeIdx = Math.min(activeIdx + 1, items.length - 1);
      items[activeIdx].classList.add('kb-active');
      items[activeIdx].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (active) active.classList.remove('kb-active');
      activeIdx = Math.max(activeIdx - 1, 0);
      items[activeIdx].classList.add('kb-active');
      items[activeIdx].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (active) active.click();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      dropdown.classList.remove('open');
    } else if (e.key === 'Tab') {
      dropdown.classList.remove('open');
    }
  }

  function loadScenario(id) {
    const scenario = JEScenarios.getById(id);
    if (!scenario) return;

    const hasEntries = state.playground.entries.length > 0;

    function doLoad(clearFirst) {
      pushUndo();
      if (clearFirst) state.playground.entries = [];
      scenario.entries.forEach(e => {
        const entry = JECore.createEntry(e.date, e.description, e.descriptionFr || '', e.lines, [], 'operating');
        state.playground.entries.push(entry);
      });
      state.playground.lastLoadedScenarioId = id;
      state.playground.activeStage = 'journal';
      switchPage('play');
      saveState();
      /* Remove dialog if present */
      const dialog = document.getElementById('scenarioLoadDialog');
      if (dialog) dialog.remove();
    }

    if (!hasEntries) {
      doLoad(false);
      return;
    }

    /* Show confirmation dialog */
    const existing = document.getElementById('scenarioLoadDialog');
    if (existing) existing.remove();

    const dialog = document.createElement('div');
    dialog.id = 'scenarioLoadDialog';
    dialog.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)';
    dialog.innerHTML = `<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:360px;width:90%;box-shadow:0 20px 50px rgba(0,0,0,.4)">
      <div style="font-weight:700;font-size:14px;margin-bottom:12px;color:var(--text-secondary)">${T('scenarios.loadConfirm')}</div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button id="loadReplace" style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-weight:700;cursor:pointer;font-size:12px">${T('scenarios.loadReplace')}</button>
        <button id="loadAppend" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--accent);font-weight:700;cursor:pointer;font-size:12px">${T('scenarios.loadAppend')}</button>
        <button id="loadCancel" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text-muted);font-weight:700;cursor:pointer;font-size:12px">${T('scenarios.loadCancel')}</button>
      </div>
    </div>`;
    document.body.appendChild(dialog);

    document.getElementById('loadReplace').addEventListener('click', () => doLoad(true));
    document.getElementById('loadAppend').addEventListener('click', () => doLoad(false));
    document.getElementById('loadCancel').addEventListener('click', () => dialog.remove());
    dialog.addEventListener('click', (e) => { if (e.target === dialog) dialog.remove(); });
  }

  /* ═══════════════════════════════════════════════════════════
     RENDER: PIPELINE PAGE (placeholder)
     ═══════════════════════════════════════════════════════════ */
  function renderPipelinePage() {
    const container = document.getElementById('pipelineContent');
    const entries = state.playground.entries;
    let html = `
      <div class="hero-banner" style="padding:32px 20px 24px">
        <h1 style="font-size:32px">${T('pipeline.title')}</h1>
        <p>${T('pipeline.subtitle')}</p>
      </div>
      <div id="pipelineFlowDiagram" style="margin-bottom:24px"></div>
    `;
    if (entries.length === 0) {
      html += `<div class="empty-state"><div class="empty-icon">🔄</div><h3>${T('pipeline.noEntries')}</h3></div>`;
    } else {
      html += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">`;
      /* Mini IS */
      if (_is) {
        html += `<div class="statement-card"><h4><span class="stmt-icon">📊</span> ${T('stage.incomeStatement')}</h4>`;
        _is.sections.filter(s => s.type === 'subtotal' || s.type === 'grand-total').forEach(s => {
          const lbl = state.lang === 'fr' ? s.label : s.labelEn;
          html += `<div class="statement-line ${s.type === 'grand-total' ? 'grand-total' : ''}"><span class="line-label">${lbl}</span><span class="line-value ${s.amount < 0 ? 'negative' : ''}">${fmtCurrency(s.amount)}</span></div>`;
        });
        html += `</div>`;
      }
      /* Mini BS */
      if (_bs) {
        html += `<div class="statement-card"><h4><span class="stmt-icon">🏛️</span> ${T('stage.balanceSheet')}</h4>
          <div class="statement-line"><span class="line-label">${T('bs.totalAssets')}</span><span class="line-value">${fmtCurrency(_bs.totalAssets)}</span></div>
          <div class="statement-line"><span class="line-label">${T('bs.equity')}</span><span class="line-value">${fmtCurrency(_bs.totalEquity)}</span></div>
          <div class="statement-line"><span class="line-label">${state.lang === 'fr' ? 'Dettes' : 'Liabilities'}</span><span class="line-value">${fmtCurrency(_bs.totalNcLiab + _bs.totalCLiab)}</span></div>
          <div class="statement-line grand-total"><span class="line-label">A = L + E</span><span class="line-value ${_bs.balanced ? 'positive' : 'negative'}">${_bs.balanced ? '✓' : '✗'}</span></div>
        </div>`;
      }
      /* Mini CF */
      if (_cf) {
        html += `<div class="statement-card"><h4><span class="stmt-icon">💰</span> ${T('stage.cashFlow')}</h4>
          <div class="statement-line"><span class="line-label">${T('cf.operating')}</span><span class="line-value ${_cf.totalOperating >= 0 ? 'positive' : 'negative'}">${fmtCurrency(_cf.totalOperating)}</span></div>
          <div class="statement-line"><span class="line-label">${T('cf.investing')}</span><span class="line-value ${_cf.totalInvesting >= 0 ? 'positive' : 'negative'}">${fmtCurrency(_cf.totalInvesting)}</span></div>
          <div class="statement-line"><span class="line-label">${T('cf.financing')}</span><span class="line-value ${_cf.totalFinancing >= 0 ? 'positive' : 'negative'}">${fmtCurrency(_cf.totalFinancing)}</span></div>
          <div class="statement-line grand-total"><span class="line-label">${T('cf.netChange')}</span><span class="line-value ${_cf.netChange >= 0 ? 'positive' : 'negative'}">${fmtCurrency(_cf.netChange)}</span></div>
        </div>`;
      }
      html += `</div>`;
    }
    container.innerHTML = html;

    /* Render pipeline flow SVG */
    const flowDiagram = document.getElementById('pipelineFlowDiagram');
    if (flowDiagram) {
      JECharts.renderPipelineFlow(flowDiagram, state.playground.activeStage, {
        journal: entries.length,
        ledger: _ledger.size,
        trialBalance: _tb.length,
        incomeStatement: _is ? 1 : 0,
        balanceSheet: _bs ? 1 : 0,
        cashFlow: _cf ? 1 : 0
      });
    }
  }

  /* ═══════════════════════════════════════════════════════════
     MASTER BUILD
     ═══════════════════════════════════════════════════════════ */
  function buildAll() {
    recomputePipeline();
    const page = state.activePage;
    if (page === 'learn') {
      renderLearnPage();
    } else if (page === 'play') {
      renderLeftPanel();
      /* Equation bar must use freshly computed _eq — read values explicitly */
      const eqBar = document.getElementById('equationBar');
      if (eqBar) {
        const freshEq = {
          assets: _eq.assets,
          liabilities: _eq.liabilities,
          equity: _eq.equity,
          balanced: _eq.balanced
        };
        JECharts.renderEquationBar(eqBar, freshEq, fmtCurrency);
      }
      renderStageTabs();

      /* Render pipeline flow diagram in center panel */
      const centerFlow = document.getElementById('centerPipelineFlow');
      if (centerFlow) {
        const counts = {
          journal: state.playground.entries.length,
          ledger: _ledger.size,
          trialBalance: _tb.length,
          incomeStatement: _is ? _is.sections.length : 0,
          balanceSheet: _bs ? 1 : 0,
          cashFlow: _cf ? 1 : 0
        };
        JECharts.renderPipelineFlow(centerFlow, state.playground.activeStage, counts);
        /* Bind click on pipeline stage boxes */
        centerFlow.querySelectorAll('.pipeline-stage-box').forEach(box => {
          box.addEventListener('click', () => {
            const stg = box.getAttribute('data-stage');
            if (stg) {
              state.playground.activeStage = stg;
              renderStageTabs();
              renderCenterBody();
              /* Re-render the flow to update active highlight */
              const c2 = document.getElementById('centerPipelineFlow');
              if (c2) JECharts.renderPipelineFlow(c2, stg, counts);
              saveState();
            }
          });
        });
      }

      renderCenterBody();
      renderRightPanel();

      /* Reapply mobile tab visibility after DOM re-render */
      const mTab = state.playground.mobileTab;
      const mLeft = document.getElementById('leftPanel');
      const mCenter = document.querySelector('.center-panel');
      const mRight = document.getElementById('rightPanel');
      if (mLeft && mCenter && mRight) {
        mLeft.classList.toggle('mobile-hidden', mTab !== 'entry');
        mCenter.classList.toggle('mobile-hidden', mTab !== 'pipeline');
        mRight.classList.toggle('mobile-hidden', mTab !== 'account');
      }
    } else if (page === 'scenarios') {
      renderScenariosPage();
    } else if (page === 'coa') {
      const coaContainer = document.getElementById('coaContent');
      if (coaContainer) { JECoA.render(coaContainer); JECoA.bindEvents(coaContainer); }
    } else if (page === 'pipeline') {
      renderPipelinePage();
    }
  }

  /* ═══════════════════════════════════════════════════════════
     INIT
     ═══════════════════════════════════════════════════════════ */
  function init() {
    loadState();

    /* Sync JECore _nextId with restored entries */
    if (state.playground.entries.length > 0) {
      let maxId = 0;
      state.playground.entries.forEach(e => {
        const num = parseInt((e.id || '').replace('je-', ''), 10);
        if (num > maxId) maxId = num;
      });
      JECore._syncNextId(maxId + 1);
    }

    /* Close account pickers on outside click — registered once */
    document.addEventListener('click', e => {
      if (!e.target.closest('.account-picker-wrap')) {
        document.querySelectorAll('.account-picker-dropdown').forEach(d => d.classList.remove('open'));
      }
      /* Close settings popover on outside click */
      if (!e.target.closest('.settings-btn') && !e.target.closest('.settings-popover')) {
        const pop = document.getElementById('settingsPopover');
        const btn = document.getElementById('settingsBtn');
        if (pop) pop.classList.remove('open');
        if (btn) btn.classList.remove('open');
      }
    });

    /* Settings popover toggle */
    document.getElementById('settingsBtn').addEventListener('click', () => {
      const pop = document.getElementById('settingsPopover');
      const btn = document.getElementById('settingsBtn');
      pop.classList.toggle('open');
      btn.classList.toggle('open');
    });

    /* Apply loaded state to DOM */
    document.getElementById('frameworkSelect').value = state.framework;
    document.getElementById('currencySelect').value = state.currency;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === state.lang));
    document.getElementById('teacherBtn').classList.toggle('active', state.teacherMode);

    /* Nav tab events */
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', () => switchPage(tab.dataset.page));
    });
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => switchMode(btn.dataset.mode));
    });
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => switchLang(btn.dataset.lang));
    });
    document.getElementById('teacherBtn').addEventListener('click', toggleTeacher);
    document.getElementById('frameworkSelect').addEventListener('change', e => switchFramework(e.target.value));
    document.getElementById('currencySelect').addEventListener('change', e => {
      state.currency = e.target.value;
      buildAll();
      saveState();
    });

    /* Update nav labels for current language */
    document.querySelectorAll('.nav-tab').forEach(t => { t.textContent = T('nav.' + t.dataset.page); });
    document.querySelectorAll('.mode-btn').forEach(b => { b.textContent = T('mode.' + b.dataset.mode); });
    document.getElementById('teacherBtn').textContent = T('teacher');

    /* ── Mobile tab logic ── */
    function applyMobileTab(tab) {
      state.playground.mobileTab = tab;
      const left = document.getElementById('leftPanel');
      const center = document.querySelector('.center-panel');
      const right = document.getElementById('rightPanel');
      if (!left || !center || !right) return;
      left.classList.toggle('mobile-hidden', tab !== 'entry');
      center.classList.toggle('mobile-hidden', tab !== 'pipeline');
      right.classList.toggle('mobile-hidden', tab !== 'account');
      document.querySelectorAll('.mobile-tab').forEach(t => t.classList.toggle('active', t.dataset.mtab === tab));
    }
    document.querySelectorAll('.mobile-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        applyMobileTab(tab.dataset.mtab);
        saveState();
      });
    });
    /* Apply initial mobile tab state */
    applyMobileTab(state.playground.mobileTab);
    /* Update mobile tab labels for current language */
    document.querySelectorAll('.mobile-tab').forEach(t => {
      t.textContent = T('mobile.' + t.dataset.mtab);
    });

    /* ── Ctrl+Z undo keyboard shortcut ── */
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
        /* Only undo when not typing in an input/textarea */
        const tag = document.activeElement ? document.activeElement.tagName : '';
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        e.preventDefault();
        popUndo();
      }
    });

    /* ── Resize handle logic (document-level delegation) ── */
    let _resizeDragging = null; /* { panelId, isLeft, startX, startW } */

    document.addEventListener('mousedown', e => {
      if (e.target.id === 'leftResizeHandle') {
        e.preventDefault();
        const panel = document.getElementById('leftPanel');
        _resizeDragging = { panelId: 'leftPanel', isLeft: true, startX: e.clientX, startW: panel.getBoundingClientRect().width };
        e.target.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      } else if (e.target.id === 'rightResizeHandle') {
        e.preventDefault();
        const panel = document.getElementById('rightPanel');
        _resizeDragging = { panelId: 'rightPanel', isLeft: false, startX: e.clientX, startW: panel.getBoundingClientRect().width };
        e.target.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      }
    });

    document.addEventListener('mousemove', e => {
      if (!_resizeDragging) return;
      const dx = e.clientX - _resizeDragging.startX;
      let newW = _resizeDragging.isLeft ? _resizeDragging.startW + dx : _resizeDragging.startW - dx;
      const min = _resizeDragging.isLeft ? 250 : 200;
      newW = Math.max(min, Math.min(500, newW));
      const panel = document.getElementById(_resizeDragging.panelId);
      if (panel) panel.style.width = newW + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (!_resizeDragging) return;
      const handleId = _resizeDragging.isLeft ? 'leftResizeHandle' : 'rightResizeHandle';
      const handle = document.getElementById(handleId);
      if (handle) handle.classList.remove('dragging');
      _resizeDragging = null;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });

    /* Set active page */
    switchPage(state.activePage);
  }

  return { switchPage, switchMode, switchLang, switchFramework, toggleTeacher, buildAll, init, state, T, fmt, fmtCurrency, acctName, acctLabel, saveState };
})();

/* ═══════════════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', JEUI.init);
</script>
